<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayleigh Workout - Haki Final</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(15, 20, 25, 0.7);
            --primary: #00ffaa; 
            --silver: #f8fafc;
            --text-dim: #64748b;
            --haki-red: #ff0000;
            --zoro-color: #00ff88;
            --luffy-color: #ffaa00;
            --shanks-color: #ff1100;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: var(--silver);
            margin: 0; padding-bottom: 80px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 255, 170, 0.05) 0%, transparent 50%);
        }

        /* Haki Lightning SVG */
        .haki-lightning-svg {
            position: absolute; top: 50%; left: 50%;
            width: 140%; height: 140%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 1000;
            filter: drop-shadow(0 0 3px var(--haki-red));
        }

        header { 
            padding: 30px 20px; max-width: 600px; margin: 0 auto; 
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .week-selector {
            background: #111; border: 1px solid #333;
            color: var(--primary); padding: 8px 12px; border-radius: 6px; 
            font-size: 0.75rem; font-weight: 700; outline: none;
        }

        /* Navigazione Personaggi */
        nav {
            display: flex; gap: 12px; padding: 10px 15px; overflow-x: auto;
            max-width: 600px; margin: 0 auto; justify-content: center;
            scrollbar-width: none;
        }
        .nav-item {
            background: transparent; border: none; padding: 5px;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            cursor: pointer; min-width: 80px; position: relative;
        }
        
        /* Immagini Personaggi */
        .char-img {
            width: 55px; height: 55px;
            background-size: cover; background-position: center;
            border-radius: 8px; border: 2px solid #222;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .nav-item.active .char-img { border-color: #fff; transform: scale(1.1); box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .nav-item span.day-label { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        .nav-item.active span.day-label { color: #fff; }
        
        /* Titoli Leggendari */
        .legend-title { font-size: 0.55rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.4; text-align: center; }
        .nav-item.active .legend-title { opacity: 1; }
        .zoro .legend-title { color: var(--zoro-color); }
        .shanks .legend-title { color: var(--shanks-color); }
        .luffy .legend-title { color: var(--luffy-color); }

        /* Container & Cards */
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .day-section { display: none; }
        .active-day { display: block; animation: fadeIn 0.4s ease; }

        .card {
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 12px; padding: 20px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05); position: relative;
        }
        
        /* JoyBoy/Luffy Softness */
        .joyboy-card {
            border-radius: 25px; border-color: rgba(255, 170, 0, 0.2);
            animation: rubberPulse 4s infinite alternate ease-in-out;
        }
        @keyframes rubberPulse {
            0% { transform: scale(1); border-radius: 25px; }
            100% { transform: scale(1.01); border-radius: 35px; }
        }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-header h3 { margin: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        .timer-btn {
            background: transparent; color: var(--primary); border: 1px solid var(--primary);
            padding: 5px 12px; border-radius: 6px; font-size: 0.65rem; font-weight: 700;
        }

        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
        .input-box { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #222; padding: 4px 0; }
        .input-box input { background: transparent; border: none; color: #fff; width: 100%; font-size: 1.1rem; outline: none; text-align: right; }
        .input-box span { font-size: 0.55rem; color: var(--text-dim); font-weight: 700; }

        .chart-container { height: 60px; margin-top: 15px; opacity: 0.4; }

        #timer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        #timer-val { font-size: 6rem; font-weight: 200; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 700; letter-spacing: 2px; font-size: 0.8rem; opacity: 0.6;">PROGRESSION</div>
    <select class="week-selector" id="weekSelect" onchange="loadWeekData()"></select>
</header>

<nav id="dayNav">
    <button onclick="switchDay('lun', 'zoro')" id="n-lun" class="nav-item active zoro interactive">
        <div class="char-img" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS8X3zUv_iS02Pq4pMv7Xm4pL2_XW0Kk6-p8A&s')"></div>
        <span class="day-label">Lun</span>
        <span class="legend-title">King of Hell</span>
    </button>
    <button onclick="switchDay('mar', 'shanks')" id="n-mar" class="nav-item shanks interactive">
        <div class="char-img" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A6R4EOnr6CgW6S_wLqK08YvjY27pB6mGvg&s')"></div>
        <span class="day-label">Mar</span>
        <span class="legend-title">Akagami</span>
    </button>
    <button onclick="switchDay('mer', 'luffy')" id="n-mer" class="nav-item luffy interactive">
        <div class="char-img" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6-60xV68lA9_Y7mY0G2f99X6V-p1K16uXtg&s')"></div>
        <span class="day-label">Mer</span>
        <span class="legend-title">God of Liberation</span>
    </button>
    <button onclick="switchDay('gio', 'zoro')" id="n-gio" class="nav-item zoro interactive">
        <div class="char-img" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS8X3zUv_iS02Pq4pMv7Xm4pL2_XW0Kk6-p8A&s')"></div>
        <span class="day-label">Gio</span>
        <span class="legend-title">King of Hell</span>
    </button>
    <button onclick="switchDay('ven', 'shanks')" id="n-ven" class="nav-item shanks interactive">
        <div class="char-img" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A6R4EOnr6CgW6S_wLqK08YvjY27pB6mGvg&s')"></div>
        <span class="day-label">Ven</span>
        <span class="legend-title">Akagami</span>
    </button>
</nav>

<div class="container" id="mainContainer"></div>

<div id="timer-overlay"><div id="timer-val">00:00</div></div>

<script>
// EFFETTO HAKI JOY BOY (Fulmini Neri/Rossi)
function createHakiLightning() {
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("class", "haki-lightning-svg");
    svg.setAttribute("viewBox", "0 0 200 200");
    let paths = "";
    for(let i=0; i<6; i++) {
        let angle = (i/6)*Math.PI*2; let r=80+Math.random()*20;
        let x=100+Math.cos(angle)*r, y=100+Math.sin(angle)*r;
        let d=`M ${x} ${y} `;
        for(let j=0; j<3; j++) {
            x+=(Math.random()-0.5)*50; y+=(Math.random()-0.5)*50;
            d+=`L ${x} ${y} `;
        }
        paths += `<path d="${d}" stroke="black" stroke-width="4" fill="none" opacity="0.8"/>`;
        paths += `<path d="${d}" stroke="red" stroke-width="1.2" fill="none"/>`;
    }
    svg.innerHTML = paths;
    return svg;
}

function triggerHaki(e) {
    const target = e.currentTarget;
    const bolt = createHakiLightning();
    target.appendChild(bolt);
    setTimeout(() => bolt.remove(), 300);
}

// Inizializzazione Settimane
const weekSelect = document.getElementById('weekSelect');
for(let i=1; i<=16; i++) {
    let opt = document.createElement('option');
    opt.value = i; opt.innerText = `Settimana ${i.toString().padStart(2, '0')}`;
    weekSelect.appendChild(opt);
}

const workout = {
    lun: { ex: [{n:"Panca Inclinata", s:4, r:90}, {n:"Chest Press", s:3, r:60}, {n:"Alzate Laterali", s:4, r:60}, {n:"Pushdown", s:4, r:60}, {n:"Addome", s:3, r:60, spec:true}] },
    mar: { ex: [{n:"Trazioni Zavorra", s:5, r:120}, {n:"Rematore", s:3, r:90}, {n:"Curl EZ", s:4, r:60}, {n:"Facepull", s:3, r:60}] },
    mer: { joyboy: true, ex: [{n:"Hack Squat", s:4, r:120}, {n:"Leg Press", s:3, r:90}, {n:"Leg Curl", s:4, r:60}, {n:"Calf Raise", s:4, r:60}] },
    gio: { ex: [{n:"Panca Piana", s:4, r:90}, {n:"Croci Cavi", s:3, r:60}, {n:"Shoulder Press", s:3, r:90}, {n:"French Press", s:3, r:60}] },
    ven: { ex: [{n:"Trazioni Volume", s:4, r:120}, {n:"Lat Machine", s:3, r:90}, {n:"Hammer Curl", s:3, r:60}, {n:"Curl Cavi", s:3, r:60}] }
};

let charts = {};

function init() {
    const main = document.getElementById('mainContainer');
    for(let day in workout) {
        let section = `<div id="${day}" class="day-section ${day==='lun'?'active-day':''}">`;
        workout[day].ex.forEach((e, idx) => {
            const id = `${day}_${idx}`;
            let cardClass = workout[day].joyboy ? 'card joyboy-card' : 'card';
            section += `<div class="${cardClass}"><div class="card-header"><h3>${e.n}</h3><button class="timer-btn interactive" onclick="startTimer(${e.r})">${e.r}s</button></div>`;
            for(let s=0; s<e.s; s++) {
                section += `<div class="inputs"><div class="input-box"><input type="number" id="${id}_w${s}" onchange="saveData('${id}')" placeholder="0"><span>KG</span></div><div class="input-box"><input type="number" id="${id}_r${s}" onchange="saveData('${id}')" placeholder="0"><span>RE</span></div></div>`;
            }
            if(!e.spec) section += `<div class="chart-container"><canvas id="c_${id}"></canvas></div>`;
            section += `</div>`;
        });
        main.innerHTML += section + `</div>`;
    }
    loadWeekData();
    document.querySelectorAll('.interactive').forEach(el => {
        el.addEventListener('mousedown', triggerHaki);
        el.addEventListener('touchstart', triggerHaki);
    });
}

function switchDay(id) {
    document.querySelectorAll('.day-section').forEach(d => d.classList.remove('active-day'));
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active-day');
    document.getElementById('n-'+id).classList.add('active');
    window.scrollTo(0,0);
}

function saveData(exId) {
    const week = weekSelect.value;
    const entry = { w: [], r: [] };
    const [day, idx] = exId.split('_');
    for(let i=0; i<workout[day].ex[idx].s; i++) {
        entry.w.push(document.getElementById(`${exId}_w${i}`).value || 0);
        entry.r.push(document.getElementById(`${exId}_r${i}`).value || 0);
    }
    localStorage.setItem(`RayFinal_${week}_${exId}`, JSON.stringify(entry));
    updateChart(exId);
}

function loadWeekData() {
    const week = weekSelect.value;
    for(let day in workout) {
        workout[day].ex.forEach((e, idx) => {
            const id = `${day}_${idx}`;
            const saved = JSON.parse(localStorage.getItem(`RayFinal_${week}_${id}`));
            for(let i=0; i<e.s; i++) {
                document.getElementById(`${id}_w${i}`).value = saved ? saved.w[i] : "";
                document.getElementById(`${id}_r${i}`).value = saved ? saved.r[i] : "";
            }
            if(!e.spec) updateChart(id);
        });
    }
}

function updateChart(id) {
    const history = [];
    for(let w=1; w<=16; w++) {
        const d = JSON.parse(localStorage.getItem(`RayFinal_${w}_${id}`));
        let vol = 0; if(d) d.w.forEach((weight, i) => vol += (weight * (d.r[i] || 0)));
        history.push(vol);
    }
    const ctx = document.getElementById(`c_${id}`);
    if(!ctx) return;
    if(charts[id]) charts[id].destroy();
    charts[id] = new Chart(ctx, {
        type: 'line', data: { labels: history.map((_, i) => i + 1), datasets: [{ data: history, borderColor: '#00ffaa', fill: false, tension: 0.4, borderWidth: 1, pointRadius: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
    });
}

function startTimer(s) {
    const ov = document.getElementById('timer-overlay');
    ov.style.display = 'flex';
    let time = s;
    const interval = setInterval(() => {
        document.getElementById('timer-val').innerText = `${Math.floor(time/60)}:${(time%60).toString().padStart(2, '0')}`;
        if(time-- <= 0) { clearInterval(interval); ov.style.display = 'none'; }
    }, 1000);
    ov.onclick = () => { clearInterval(interval); ov.style.display = 'none'; };
}

window.onload = init;
</script>
</body>
</html>

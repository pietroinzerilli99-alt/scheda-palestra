<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayleigh Legacy v7.0 - Ultra Instinct</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0c0c0c;
            --primary: #00ffaa;
            --zoro: #00ff88;
            --shanks: #ff1100;
            --luffy: #ffffff;
            --gold: #ffcc00;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: #fff;
            margin: 0; padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* Header e Settimane */
        header { 
            padding: 30px 20px; text-align: center; 
            border-bottom: 1px solid #1a1a1a;
            background: linear-gradient(to bottom, #0a0a0a, transparent);
        }
        .week-select {
            background: #111; border: 1px solid #333; color: var(--primary);
            padding: 10px 20px; border-radius: 8px; font-weight: 700;
            margin-top: 15px; width: 80%; max-width: 300px;
        }

        /* Navigazione Personaggi */
        nav { 
            display: flex; gap: 15px; padding: 20px; 
            overflow-x: auto; justify-content: center;
            position: sticky; top: 0; z-index: 100;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }
        .nav-item {
            background: transparent; border: none; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .char-frame {
            width: 65px; height: 85px; border-radius: 12px;
            border: 1px solid #222; position: relative;
            background: #050505; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        /* Rappresentazione Astratta Personaggi (No Broken Links) */
        .char-gradient {
            position: absolute; width: 150%; height: 150%; opacity: 0.4;
            transition: 0.5s; filter: blur(15px);
        }
        .zoro-grad { background: radial-gradient(circle, var(--zoro), transparent); }
        .shanks-grad { background: radial-gradient(circle, var(--shanks), transparent); }
        .luffy-grad { background: radial-gradient(circle, var(--gold), transparent); }

        .nav-item.active .char-frame { transform: scale(1.1); border-color: #fff; }
        .nav-item.active .char-gradient { opacity: 0.8; transform: scale(1.2); }

        /* Haki Lightning Animation */
        .haki-bolt {
            position: absolute; background: white; pointer-events: none;
            box-shadow: 0 0 10px #fff, 0 0 20px var(--bolt-color);
            z-index: 1000; animation: bolt-fade 0.4s ease-out forwards;
        }
        @keyframes bolt-fade { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(2); } }

        /* Container & Cards */
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .day-content { display: none; }
        .day-content.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card-bg); border: 1px solid #1a1a1a;
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
        }
        .card h3 { 
            margin: 0 0 20px 0; font-size: 0.85rem; letter-spacing: 2px;
            text-transform: uppercase; color: #666; display: flex; justify-content: space-between;
        }
        
        /* Inputs */
        .set-row { 
            display: flex; align-items: center; gap: 15px; margin-bottom: 12px;
            padding-bottom: 12px; border-bottom: 1px solid #151515;
        }
        .set-num { font-size: 0.7rem; color: var(--primary); font-weight: 800; width: 25px; }
        .input-group { flex: 1; display: flex; align-items: baseline; gap: 5px; }
        .input-group input { 
            background: transparent; border: none; color: #fff; 
            font-size: 1.4rem; font-weight: 700; width: 100%; outline: none;
        }
        .input-group label { font-size: 0.5rem; color: #444; font-weight: 800; }

        /* Timer */
        .timer-trigger {
            background: #111; border: 1px solid #222; color: var(--primary);
            padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800;
        }

        /* Grafico */
        .chart-container { background: #080808; border-radius: 20px; padding: 20px; margin-top: 30px; border: 1px dotted #222; }

        /* Timer Overlay */
        #t-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        #t-count { font-size: 10rem; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; letter-spacing: 5px; font-size: 1rem;">RAYLEIGH</div>
    <select id="weekPicker" class="week-select">
        <option>SETTIMANA 1 - RISVEGLIO</option>
        <option>SETTIMANA 2 - AVANZAMENTO</option>
    </select>
</header>

<nav>
    <div onclick="changeDay('lun', 'zoro')" id="btn-lun" class="nav-item active">
        <div class="char-frame"><div class="char-gradient zoro-grad"></div><span style="font-size:1.5rem">⚔️</span></div>
        <span class="day-label">LUN</span>
    </div>
    <div onclick="changeDay('mar', 'shanks')" id="btn-mar" class="nav-item">
        <div class="char-frame"><div class="char-gradient shanks-grad"></div><span style="font-size:1.5rem">🍷</span></div>
        <span class="day-label">MAR</span>
    </div>
    <div onclick="changeDay('mer', 'luffy')" id="btn-mer" class="nav-item">
        <div class="char-frame"><div class="char-gradient luffy-grad"></div><span style="font-size:1.5rem">🍖</span></div>
        <span class="day-label">MER</span>
    </div>
    <div onclick="changeDay('gio', 'zoro')" id="btn-gio" class="nav-item">
        <div class="char-frame"><div class="char-gradient zoro-grad"></div><span style="font-size:1.5rem">⚔️</span></div>
        <span class="day-label">GIO</span>
    </div>
    <div onclick="changeDay('ven', 'shanks')" id="btn-ven" class="nav-item">
        <div class="char-frame"><div class="char-gradient shanks-grad"></div><span style="font-size:1.5rem">🍷</span></div>
        <span class="day-label">VEN</span>
    </div>
</nav>

<div class="container">
    <div id="content-area"></div>

    <div class="chart-container">
        <div style="font-size: 0.6rem; color: #444; margin-bottom: 15px; letter-spacing: 2px; font-weight: 800;">PROGRESSI VOLUME TOTALI</div>
        <canvas id="progressChart"></canvas>
    </div>
</div>

<div id="t-overlay" onclick="stopTimer()">
    <div id="t-count">00</div>
    <div style="color:var(--primary); letter-spacing: 5px; font-weight: 800;">RESTING...</div>
</div>

<script>
const data = {
    lun: { char: 'zoro', exercises: [{n:"Panca Inclinata", s:4, r:90}, {n:"Chest Press", s:3, r:60}, {n:"Alzate Laterali", s:4, r:60}] },
    mar: { char: 'shanks', exercises: [{n:"Trazioni", s:5, r:120}, {n:"Rematore", s:3, r:90}, {n:"Curl EZ", s:4, r:60}] },
    mer: { char: 'luffy', exercises: [{n:"Hack Squat", s:4, r:120}, {n:"Leg Press", s:3, r:90}, {n:"Leg Curl", s:4, r:60}] },
    gio: { char: 'zoro', exercises: [{n:"Panca Piana", s:4, r:90}, {n:"Croci Cavi", s:3, r:60}, {n:"Shoulder Press", s:3, r:90}] },
    ven: { char: 'shanks', exercises: [{n:"Lat Machine", s:4, r:90}, {n:"Rematore Man.", s:3, r:90}, {n:"Hammer Curl", s:3, r:60}] }
};

function renderDay(dayKey) {
    const area = document.getElementById('content-area');
    const day = data[dayKey];
    let html = `<div class="day-content active">`;
    
    day.exercises.forEach(ex => {
        html += `<div class="card">
            <h3>${ex.n} <button class="timer-trigger" onclick="startTimer(${ex.r})">${ex.r}s</button></h3>`;
        for(let i=1; i<=ex.s; i++) {
            html += `<div class="set-row">
                <div class="set-num">0${i}</div>
                <div class="input-group"><input type="number" placeholder="0"><label>KG</label></div>
                <div class="input-group"><input type="number" placeholder="0"><label>REPS</label></div>
            </div>`;
        }
        html += `</div>`;
    });

    // Finisher
    html += `<div style="margin:40px 0 15px; font-size:0.7rem; letter-spacing:3px; color:var(--primary); font-weight:800; text-align:center;">--- FINISHER ---</div>`;
    html += `<div class="card"><h3>Addome Core<button class="timer-trigger" onclick="startTimer(60)">60s</button></h3><div class="set-row"><div class="set-num">MAX</div><div class="input-group"><input type="number" placeholder="3"><label>SETS</label></div></div></div>`;
    html += `<div class="card"><h3>Cardio LISS<button class="timer-trigger" onclick="startTimer(900)">15m</button></h3><div class="set-row"><div class="set-num">15'</div><div class="input-group"><input type="number" placeholder="1"><label>SESSIONE</label></div></div></div>`;
    
    html += `</div>`;
    area.innerHTML = html;
}

function startTimer(sec) {
    const overlay = document.getElementById('t-overlay');
    const display = document.getElementById('t-count');
    overlay.style.display = 'flex';
    let t = sec;
    window.timerInterval = setInterval(() => {
        let m = Math.floor(t/60); let s = t%60;
        display.innerText = s < 10 ? '0'+s : s;
        if(t-- <= 0) stopTimer();
    }, 1000);
}

function stopTimer() {
    clearInterval(window.timerInterval);
    document.getElementById('t-overlay').style.display = 'none';
}

function spawnHaki(element, color) {
    const rect = element.getBoundingClientRect();
    for(let i=0; i<8; i++) {
        const bolt = document.createElement('div');
        bolt.className = 'haki-bolt';
        bolt.style.setProperty('--bolt-color', color);
        bolt.style.width = Math.random() * 40 + 20 + 'px';
        bolt.style.height = '2px';
        bolt.style.left = rect.left + rect.width/2 + 'px';
        bolt.style.top = rect.top + rect.height/2 + 'px';
        bolt.style.transform = `rotate(${Math.random() * 360}deg) translateX(${Math.random() * 50 + 30}px)`;
        document.body.appendChild(bolt);
        setTimeout(() => bolt.remove(), 400);
    }
}

function changeDay(day, char) {
    const colors = {zoro: '#00ff88', shanks: '#ff1100', luffy: '#ffcc00'};
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('btn-'+day).classList.add('active');
    spawnHaki(document.getElementById('btn-'+day), colors[char]);
    document.getElementById('main-progress-bar').style.width = (['lun','mar','mer','gio','ven'].indexOf(day)+1)*20 + "%";
    renderDay(day);
}

// Inizializzazione Grafico
const ctx = document.getElementById('progressChart').getContext('2d');
new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Sett 1', 'Sett 2', 'Sett 3', 'Sett 4'],
        datasets: [{
            label: 'Volume Totale (kg)',
            data: [1200, 1450, 1400, 1700],
            borderColor: '#00ffaa',
            tension: 0.4,
            borderWidth: 2,
            pointBackgroundColor: '#00ffaa'
        }]
    },
    options: {
        plugins: { legend: { display: false } },
        scales: { 
            y: { grid: { color: '#111' }, ticks: { color: '#444' } },
            x: { grid: { display: false }, ticks: { color: '#444' } }
        }
    }
});

window.onload = () => renderDay('lun');
</script>

<div id="main-progress-bar"></div>
</body>
</html>

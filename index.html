<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayleigh Workout - Minimal Joy Boy</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010204;
            --glass: rgba(15, 20, 25, 0.7);
            --primary: #00ffaa; 
            --silver: #f8fafc;
            --haki-red: #cc0000; /* Rosso più scuro */
            --haki-black: #000000;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 255, 170, 0.03) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--silver);
            margin: 0; padding-bottom: 60px;
            overflow-x: hidden;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* Effetto Glitch Minimal */
        @keyframes hakiShake {
            0% { transform: scale(1.05) translate(0,0); }
            50% { transform: scale(1.05) translate(-1px, 1px); }
            100% { transform: scale(1.05) translate(1px, -1px); }
        }

        /* Fulmini Orbitali SVG - Minimali */
        .haki-lightning-svg {
            position: absolute;
            top: 50%; left: 50%;
            width: 130%; height: 130%; /* Leggermente più grande del tasto */
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1000;
            filter: drop-shadow(0 0 2px var(--haki-red));
        }

        #haki-screen-effect {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; opacity: 0;
            background: radial-gradient(circle, transparent 20%, #cc0000 150%);
        }

        .screen-blast { animation: blast 0.3s forwards; }
        @keyframes blast {
            0% { opacity: 1; filter: invert(0); }
            15% { filter: invert(1); }
            100% { opacity: 0; }
        }

        /* Pulsanti Interattivi */
        .interactive {
            position: relative; 
            transition: transform 0.1s cubic-bezier(.17,.67,.83,.67), background 0.1s ease;
            cursor: pointer;
            border-radius: 4px; /* Uniformiamo i bordi */
            overflow: visible; /* Importante per i fulmini */
        }
        
        .interactive:active {
            animation: hakiShake 0.1s;
            color: #fff !important;
            background: rgba(255,255,255,0.05) !important;
        }

        /* Navigazione Minimal */
        nav button.active {
            animation: hakiShake 0.1s;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
        }

        header { padding: 50px 25px 10px; max-width: 600px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1rem; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; margin: 0; color: var(--silver);}
        
        .week-selector {
            background: transparent; border: 1px solid #475569;
            color: var(--primary); padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: 700;
        }

        nav { display: flex; gap: 15px; padding: 25px 20px; overflow-x: auto; max-width: 600px; margin: 0 auto; justify-content: center; }
        nav button { background: transparent; border: none; color: #475569; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;}
        
        .container { padding: 10px; max-width: 600px; margin: 0 auto; }
        .day-section { display: none; }
        .active-day { display: block; }

        .card {
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 8px; padding: 20px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.03); position: relative;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-header h3 { margin: 0; font-size: 0.85rem; text-transform: uppercase; font-weight: 600; color: #fff;}

        .timer-btn {
            background: transparent; color: var(--primary); border: 1px solid var(--primary);
            padding: 6px 14px; font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
        }

        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 5px; }
        .input-box { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .input-box input { background: transparent; border: none; color: #fff; width: 100%; font-size: 1.1rem; outline: none; text-align: right; font-family: inherit;}
        .input-box span { font-size: 0.55rem; color: #475569; font-weight: 700; }

        .chart-container { height: 50px; margin-top: 15px; opacity: 0.4; }

        #timer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1,2,4,0.99); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9998;
        }
        #timer-val { font-size: 7rem; font-weight: 300; color: var(--primary); }
    </style>
</head>
<body>

<div id="haki-screen-effect"></div>

<header>
    <h1>Rayleigh <span style="font-weight:300; opacity:0.5">Pure JoyBoy</span></h1>
    <select class="week-selector interactive" id="weekSelect" onchange="loadWeekData()"></select>
</header>

<nav id="dayNav">
    <button onclick="switchDay('lun')" id="n-lun" class="active interactive">Lun</button>
    <button onclick="switchDay('mar')" id="n-mar" class="interactive">Mar</button>
    <button onclick="switchDay('mer')" id="n-mer" class="interactive">Mer</button>
    <button onclick="switchDay('gio')" id="n-gio" class="interactive">Gio</button>
    <button onclick="switchDay('ven')" id="n-ven" class="interactive">Ven</button>
</nav>

<div class="container" id="mainContainer"></div>

<script>
// LOGICA HAKI DI JOY BOY - MINIMALE ED ORBITALE
function createMinimalHakiBolt() {
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("class", "haki-lightning-svg");
    svg.setAttribute("viewBox", "0 0 200 200");
    
    let paths = "";
    // Generiamo fulmini più sottili e solo lungo il perimetro
    for(let i=0; i<6; i++) { 
        let angle = (i / 6) * Math.PI * 2;
        let radius = 90 + Math.random() * 10;
        let x = 100 + Math.cos(angle) * radius;
        let y = 100 + Math.sin(angle) * radius;
        
        let d = `M ${x} ${y} `;
        for(let j=0; j<3; j++) {
            x += (Math.random() - 0.5) * 30;
            y += (Math.random() - 0.5) * 30;
            d += `L ${x} ${y} `;
        }
        paths += `<path d="${d}" stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
        paths += `<path d="${d}" stroke="var(--haki-red)" stroke-width="0.8" fill="none" stroke-linecap="round"/>`;
    }
    svg.innerHTML = paths;
    return svg;
}

function triggerJoyBoyHaki(e) {
    const target = e.currentTarget;
    const bolt = createMinimalHakiBolt();
    target.appendChild(bolt);
    
    // Rimuovi dopo l'animazione rapidissima
    setTimeout(() => bolt.remove(), 250);

    // Se pressione lunga, scateniamo l'Emet Blast attenuato
    let longPress = setTimeout(() => {
        document.getElementById('haki-screen-effect').classList.add('screen-blast');
        setTimeout(() => document.getElementById('haki-screen-effect').classList.remove('screen-blast'), 300);
    }, 350);

    target.onmouseup = target.ontouchend = () => clearTimeout(longPress);
}

// Inizializzazione dati e UI (come prima, pulita)
const weekSelect = document.getElementById('weekSelect');
for (let i = 1; i <= 16; i++) {
    const opt = document.createElement('option');
    opt.value = i; opt.innerHTML = `SETTIMANA ${i.toString().padStart(2, '0')}`;
    weekSelect.appendChild(opt);
}

const workout = {
    lun: { ex: [{n:"Panca Inclinata", s:4, r:90}, {n:"Chest Press", s:3, r:60}, {n:"Alzate Laterali", s:4, r:60}, {n:"Pushdown", s:4, r:60}, {n:"Addome", s:3, r:60, spec:true}] },
    mar: { ex: [{n:"Trazioni Zavorra", s:5, r:120}, {n:"Rematore", s:3, r:90}, {n:"Curl EZ", s:4, r:60}, {n:"Facepull", s:3, r:60}, {n:"Core", s:3, r:60, spec:true}] },
    mer: { ex: [{n:"Hack Squat", s:4, r:120}, {n:"Leg Press", s:3, r:90}, {n:"Leg Curl", s:4, r:60}, {n:"Calf Raise", s:4, r:60}] },
    gio: { ex: [{n:"Panca Piana", s:4, r:90}, {n:"Croci Cavi", s:3, r:60}, {n:"Shoulder Press", s:3, r:90}, {n:"French Press", s:3, r:60}] },
    ven: { ex: [{n:"Trazioni Volume", s:4, r:120}, {n:"Lat Machine", s:3, r:90}, {n:"Hammer Curl", s:3, r:60}, {n:"Curl Cavi", s:3, r:60}] }
};

let charts = {};

function init() {
    const main = document.getElementById('mainContainer');
    for(let day in workout) {
        let section = `<div id="${day}" class="day-section ${day==='lun'?'active-day' : ''}">`;
        workout[day].ex.forEach((e, idx) => {
            const id = `${day}_${idx}`;
            section += `<div class="card"><div class="card-header"><h3>${e.n}</h3><button class="timer-btn interactive" onclick="startTimer(${e.r})">${e.r}S</button></div>`;
            for(let s=0; s<e.s; s++) {
                section += `<div class="inputs"><div class="input-box"><input type="number" id="${id}_w${s}" onchange="saveData('${id}')" placeholder="0"><span>KG</span></div><div class="input-box"><input type="number" id="${id}_r${s}" onchange="saveData('${id}')" placeholder="0"><span>RE</span></div></div>`;
            }
            if(!e.spec) section += `<div class="chart-container"><canvas id="c_${id}"></canvas></div>`;
            section += `</div>`;
        });
        section += `</div>`;
        main.innerHTML += section;
    }
    loadWeekData();
    
    // Aggancia l'evento Haki a tutti i pulsanti interattivi
    document.querySelectorAll('.interactive').forEach(el => {
        el.addEventListener('mousedown', triggerJoyBoyHaki);
        el.addEventListener('touchstart', triggerJoyBoyHaki);
    });
}

function saveData(exId) {
    const week = weekSelect.value;
    const entry = { w: [], r: [] };
    const day = exId.split('_')[0];
    const idx = exId.split('_')[1];
    for(let i=0; i<workout[day].ex[idx].s; i++) {
        entry.w.push(document.getElementById(`${exId}_w${i}`).value || 0);
        entry.r.push(document.getElementById(`${exId}_r${i}`).value || 0);
    }
    localStorage.setItem(`Rayleigh_Pure_JB_${week}_${exId}`, JSON.stringify(entry));
    updateChart(exId);
}

function loadWeekData() {
    const week = weekSelect.value;
    for(let day in workout) {
        workout[day].ex.forEach((e, idx) => {
            const id = `${day}_${idx}`;
            const saved = JSON.parse(localStorage.getItem(`Rayleigh_Pure_JB_${week}_${id}`));
            for(let i=0; i<e.s; i++) {
                document.getElementById(`${id}_w${i}`).value = saved ? saved.w[i] : "";
                document.getElementById(`${id}_r${i}`).value = saved ? saved.r[i] : "";
            }
            if(!e.spec) updateChart(id);
        });
    }
}

function updateChart(id) {
    const history = [];
    for(let w=1; w<=16; w++) {
        const d = JSON.parse(localStorage.getItem(`Rayleigh_Pure_JB_${w}_${id}`));
        let vol = 0; if(d) d.w.forEach((weight, i) => vol += (weight * (d.r[i] || 0)));
        history.push(vol);
    }
    const ctx = document.getElementById(`c_${id}`);
    if(!ctx) return;
    if(charts[id]) charts[id].destroy();
    charts[id] = new Chart(ctx, {
        type: 'line', data: { labels: history.map((_, i) => i + 1), datasets: [{ data: history, borderColor: '#00ffaa', fill: false, tension: 0.4, borderWidth: 1, pointRadius: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
    });
}

function startTimer(s) {
    const ov = document.getElementById('timer-overlay');
    ov.style.display = 'flex';
    let time = s;
    const interval = setInterval(() => {
        document.getElementById('timer-val').innerText = `${Math.floor(time/60)}:${(time%60).toString().padStart(2, '0')}`;
        if(time-- <= 0) { 
            clearInterval(interval); 
            ov.style.display = 'none';
            document.getElementById('haki-screen-effect').classList.add('screen-blast');
            setTimeout(() => document.getElementById('haki-screen-effect').classList.remove('screen-blast'), 300);
        }
    }, 1000);
    ov.onclick = () => { clearInterval(interval); ov.style.display = 'none'; };
}

function switchDay(id) {
    document.querySelectorAll('.day-section').forEach(d => d.classList.remove('active-day'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active-day');
    document.getElementById('n-'+id).classList.add('active');
    window.scrollTo(0,0);
}

window.onload = init;
</script>
</body>
</html>

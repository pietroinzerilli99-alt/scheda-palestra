<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGNI SINGOLO GIORNO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --card-bg: #0d0d0f;
            --primary: #00ffaa;
            --zoro: #00ff88;
            --shanks: #ff1100;
            --luffy: #ffcc00;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg); color: #fff; margin: 0; padding-bottom: 80px;
            overflow-x: hidden;
        }

        @keyframes quake {
            0% { transform: translate(0,0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-2px, -1px); }
            100% { transform: translate(0,0); }
        }
        .quake-active { animation: quake 0.1s infinite !important; }

        header { padding: 30px 20px; text-align: center; }
        .main-title { font-weight: 900; letter-spacing: 10px; font-size: 1.1rem; color: #fff; text-transform: uppercase; margin-bottom: 15px; }
        
        .week-select {
            background: #111; border: 1px solid #333; color: var(--primary);
            padding: 12px; border-radius: 12px; font-weight: 800; width: 90%;
            font-size: 0.9rem; outline: none; appearance: none; text-align: center;
        }

        nav { 
            display: flex; gap: 15px; padding: 20px; overflow-x: auto;
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid #1a1a1a;
        }
        nav::-webkit-scrollbar { display: none; }

        .nav-item { flex: 0 0 auto; background: transparent; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .char-frame { width: 70px; height: 95px; border-radius: 15px; border: 2px solid #1a1a1a; background: #050505; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .nav-item.active .char-frame { border-color: #fff; transform: scale(1.05); }

        .scars { position: absolute; top: 10px; right: 10px; display: flex; gap: 3px; transform: rotate(15deg); pointer-events: none; }
        .scar { width: 2px; height: 15px; background: var(--shanks); opacity: 0.8; box-shadow: 0 0 4px var(--shanks); }

        .haki-svg-container { position: absolute; inset: -40px; pointer-events: none; z-index: 20; width: 150px; height: 175px; }
        .lightning-path { fill: none; stroke-width: 2.5; stroke-linecap: round; filter: drop-shadow(0 0 5px currentColor); animation: flash 0.4s ease-out forwards; }
        @keyframes flash { 0% { opacity: 1; stroke-dasharray: 100; stroke-dashoffset: 100; } 100% { opacity: 0; stroke-dashoffset: 0; } }

        #shake-wrapper { transition: transform 0.1s; }

        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid #1a1a1a; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card-header h3 { margin: 0; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; color: #fff; }

        .set-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
        .input-box { flex: 1; background: #151518; border-radius: 12px; padding: 10px; display: flex; align-items: center; border: 1px solid #222; }
        .input-box input { background: transparent; border: none; color: #fff; width: 100%; text-align: right; outline: none; font-weight: 700; font-size: 1.1rem; }
        .input-box span { font-size: 0.6rem; color: #444; margin-left: 5px; font-weight: 800; }
        
        .chart-box { height: 100px; margin-top: 20px; border-top: 1px solid #1a1a1a; padding-top: 15px; }
        
        .quote-box { padding: 50px 30px; text-align: center; border-top: 1px solid #111; min-height: 150px; }
        #quote-text { font-style: italic; font-size: 1.1rem; color: #aaa; line-height: 1.6; }
        #quote-author { display: block; margin-top: 15px; font-weight: 800; font-size: 0.75rem; color: var(--primary); letter-spacing: 4px; text-transform: uppercase; }

        #timer-ov { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        #timer-val { font-size: 8rem; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

<div id="timer-ov" onclick="this.style.display='none'"><div id="timer-val">00</div></div>

<header>
    <div class="main-title">OGNI SINGOLO GIORNO</div>
    <select id="weekSelector" class="week-select" onchange="renderWorkout()"></select>
</header>

<nav id="navbar"></nav>

<div id="shake-wrapper">
    <div class="container" id="workout-area"></div>
    <div class="quote-box">
        <p id="quote-text"></p>
        <span id="quote-author"></span>
    </div>
</div>

<script>
const quotesDatabase = {
    zoro: [
        "Settimana 1: Se non riesci a proteggere il tuo capitano, la tua ambizione è nulla.",
        "Settimana 2: Il dolore è mio compagno di viaggio.",
        "Settimana 3: Solo chi ha sofferto può diventare veramente forte.",
        "Settimana 4: Non perderò mai più!",
        "Settimana 5: Le ferite sulla schiena sono il disonore di uno spadaccino.",
        "Settimana 6: Diventerò il più grande spadaccino del mondo!",
        "Settimana 7: Hai mai visto una belva feroce di cui puoi fidarti?",
        "Settimana 8: Un graffio sulla spada è un graffio sull'anima.",
        "Settimana 9: Per superare il limite, devi prima trovarlo.",
        "Settimana 10: Non sono io a cercare guai, sono loro a cercare me.",
        "Settimana 11: Se muoio qui, non ero destinato a nulla di più.",
        "Settimana 12: La pazienza è la lama più affilata.",
        "Settimana 13: Il destino è qualcosa da forgiare con l'acciaio.",
        "Settimana 14: Non ho bisogno di un motivo per allenarmi.",
        "Settimana 15: Ogni taglio mi rende più saggio.",
        "Settimana 16: Ora sono io l'inferno."
    ],
    shanks: [
        "Settimana 1: Scommetto sul futuro.",
        "Settimana 2: Una ferita al braccio non è nulla rispetto all'onore.",
        "Settimana 3: La rabbia non ti renderà più forte, la calma sì.",
        "Settimana 4: Sono venuto a fermare questa guerra.",
        "Settimana 5: Un vero re non ha bisogno di gridare.",
        "Settimana 6: L'Haki del Conquistatore è la forza della volontà.",
        "Settimana 7: Rispetta i tuoi nemici, ma non temerli mai.",
        "Settimana 8: Il mare non perdona i deboli.",
        "Settimana 9: Proteggi ciò che ami con tutto te stesso.",
        "Settimana 10: La nuova era sta arrivando.",
        "Settimana 11: Il coraggio è saper quando rinfoderare la spada.",
        "Settimana 12: La tua ambizione deve scuotere i cieli.",
        "Settimana 13: Sii il fulmine nel bel mezzo della tempesta.",
        "Settimana 14: Il rispetto si guadagna sul campo.",
        "Settimana 15: Guarda sempre oltre l'orizzonte.",
        "Settimana 16: Il mondo è pronto per te?"
    ],
    luffy: [
        "Settimana 1: Diventerò il Re dei Pirati!",
        "Settimana 2: Se non rischio la vita, non posso creare un futuro.",
        "Settimana 3: Ho fame di potere e di carne!",
        "Settimana 4: Non permetterò a nessuno di fermarmi.",
        "Settimana 5: I miei compagni sono la mia forza.",
        "Settimana 6: Gear Second! La mia velocità supera il limite.",
        "Settimana 7: Non voglio conquistare nulla, voglio essere libero.",
        "Settimana 8: Finché avrò respiro, combatterò.",
        "Settimana 9: Supererò ogni ostacolo sulla mia strada.",
        "Settimana 10: La mia determinazione è più dura dell'acciaio.",
        "Settimana 11: Gear Fourth! Sentirai il peso dei miei sogni.",
        "Settimana 12: Non c'è limite a quello che posso fare.",
        "Settimana 13: La libertà è la vera ricchezza.",
        "Settimana 14: Riderò in faccia al destino.",
        "Settimana 15: Il mio Haki avvolgerà il mondo.",
        "Settimana 16: Gear Fifth! Questo è il mio apice!"
    ]
};

const workoutData = {
    lun: { char: 'zoro', icon: '⚔️', color: '#00ff88', ex: [{n:"Panca Inclinata", s:4, r:90}, {n:"Chest Press", s:3, r:60}, {n:"Alzate Laterali", s:4, r:60}], abs: "Leg Raises (Sbarra/Parallele)" },
    mar: { char: 'shanks', icon: '🍷', color: '#ff1100', ex: [{n:"Trazioni Zavorra", s:5, r:120}, {n:"Rematore", s:3, r:90}, {n:"Curl EZ", s:4, r:60}], abs: "Cable Crunch (Crunch Cavo)" },
    mer: { char: 'luffy', icon: '🍖', color: '#ffcc00', ex: [{n:"Hack Squat", s:4, r:120}, {n:"Leg Press", s:3, r:90}, {n:"Leg Curl", s:4, r:60}], abs: "Ab Wheel Rollout" },
    gio: { char: 'zoro', icon: '⚔️', color: '#00ff88', ex: [{n:"Panca Piana", s:4, r:90}, {n:"Croci Cavi", s:3, r:60}, {n:"Shoulder Press", s:3, r:90}], abs: "Leg Raises (Sbarra/Parallele)" },
    ven: { char: 'shanks', icon: '🍷', color: '#ff1100', ex: [{n:"Trazioni Volume", s:4, r:120}, {n:"Lat Machine", s:3, r:90}, {n:"Hammer Curl", s:3, r:60}], abs: "Cable Crunch (Crunch Cavo)" }
};

let currentDay = 'lun';

function init() {
    const nav = document.getElementById('navbar');
    for(let i=1; i<=16; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.innerText = `SETTIMANA ${i}`;
        document.getElementById('weekSelector').appendChild(opt);
    }
    for(let day in workoutData) {
        let scarHTML = workoutData[day].char === 'shanks' ? '<div class="scars"><div class="scar"></div><div class="scar"></div><div class="scar"></div></div>' : '';
        nav.innerHTML += `
            <button onclick="setDay('${day}')" id="btn-${day}" class="nav-item ${day==='lun'?'active':''}">
                <div class="char-frame" id="frame-${day}">${scarHTML}<span style="font-size:1.8rem">${workoutData[day].icon}</span></div>
                <span style="font-size:0.6rem; font-weight:800; color:#555">${day.toUpperCase()}</span>
            </button>`;
    }
    setDay('lun');
}

function setDay(day) {
    currentDay = day;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-'+day).classList.add('active');
    triggerHaki(day);
    renderWorkout();
}

function triggerHaki(day) {
    const wrapper = document.getElementById('shake-wrapper');
    const allFrames = document.querySelectorAll('.char-frame');
    const activeFrame = document.getElementById('frame-'+day);
    const char = workoutData[day].char;
    const color = workoutData[day].color;
    const duration = char === 'luffy' ? 1400 : 600;
    wrapper.classList.add('quake-active');
    allFrames.forEach(f => f.classList.add('quake-active'));
    setTimeout(() => {
        wrapper.classList.remove('quake-active');
        allFrames.forEach(f => f.classList.remove('quake-active'));
    }, duration);

    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("class", "haki-svg-container");
    activeFrame.appendChild(svg);
    const boltCount = char === 'luffy' ? 10 : 5;
    for(let i=0; i<boltCount; i++) {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", "lightning-path");
        path.setAttribute("stroke", color);
        let x = 75, y = 87;
        let d = `M ${x} ${y} `;
        for(let j=0; j<3; j++) {
            x += (Math.random() - 0.5) * 110;
            y += (Math.random() - 0.5) * 110;
            d += `L ${x} ${y} `;
        }
        path.setAttribute("d", d);
        svg.appendChild(path);
    }
    setTimeout(() => svg.remove(), 500);
}

function renderWorkout() {
    const area = document.getElementById('workout-area');
    const week = document.getElementById('weekSelector').value;
    area.innerHTML = '';
    workoutData[currentDay].ex.forEach((ex, idx) => area.appendChild(createCard(ex.n, ex.s, ex.r, idx)));
    area.innerHTML += `<div style="text-align:center; color:#1a1a1a; font-size:0.6rem; letter-spacing:5px; margin:40px 0; font-weight:900;">DAILY FINISHER</div>`;
    area.appendChild(createCard(workoutData[currentDay].abs, 3, 60, 'abs_daily'));
    area.appendChild(createCard("Cardio LISS (10 min)", 1, 600, 'cardio'));
    
    const char = workoutData[currentDay].char;
    document.getElementById('quote-text').innerText = quotesDatabase[char][week-1];
    document.getElementById('quote-author').innerText = char;
}

function createCard(title, sets, rest, id) {
    const week = document.getElementById('weekSelector').value;
    const card = document.createElement('div');
    card.className = 'card';
    let html = `<div class="card-header"><h3>${title}</h3><button onclick="runTimer(${rest})" style="background:none; border:1px solid var(--primary); color:var(--primary); font-size:0.6rem; border-radius:6px; padding:4px 8px;">${rest}s</button></div>`;
    for(let i=1; i<=sets; i++) {
        const key = `w${week}-${currentDay}-${id}-s${i}`;
        const saved = JSON.parse(localStorage.getItem(key)) || {kg: '', reps: ''};
        html += `<div class="set-row">
            <div style="font-size:0.6rem; width:15px; font-weight:800; color:#333;">${i}</div>
            <div class="input-box"><input type="number" value="${saved.kg}" oninput="saveData('${id}', ${i}, 'kg', this.value)"><span>KG</span></div>
            <div class="input-box"><input type="number" value="${saved.reps}" oninput="saveData('${id}', ${i}, 'reps', this.value)"><span>REPS</span></div>
        </div>`;
    }
    html += `<div class="chart-box"><canvas id="chart-${id}"></canvas></div>`;
    card.innerHTML = html;
    setTimeout(() => drawChart(id), 50);
    return card;
}

function saveData(exId, setIdx, type, val) {
    const week = document.getElementById('weekSelector').value;
    const key = `w${week}-${currentDay}-${exId}-s${setIdx}`;
    let data = JSON.parse(localStorage.getItem(key)) || {kg: '', reps: ''};
    data[type] = val;
    localStorage.setItem(key, JSON.stringify(data));
    drawChart(exId);
}

function drawChart(id) {
    const canvas = document.getElementById(`chart-${id}`);
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const pts = [];
    for(let w=1; w<=16; w++) {
        const d = JSON.parse(localStorage.getItem(`w${w}-${currentDay}-${id}-s1`));
        pts.push(d && d.kg ? parseFloat(d.kg) : 0);
    }
    if(window['c'+id]) window['c'+id].destroy();
    window['c'+id] = new Chart(ctx, { 
        type: 'line', 
        data: { labels: Array.from({length:16}, (_,i)=>i+1), datasets: [{ data: pts, borderColor: workoutData[currentDay].color, borderWidth: 2, tension: 0.4, pointRadius: 0, fill: false }] }, 
        options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } } 
    });
}

function runTimer(s) {
    const ov = document.getElementById('timer-ov');
    ov.style.display = 'flex';
    let t = s;
    const iv = setInterval(() => { document.getElementById('timer-val').innerText = t; if(t-- <= 0) { clearInterval(iv); ov.style.display = 'none'; } }, 1000);
}

window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayleigh Workout - Haki Supreme</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(15, 20, 25, 0.85);
            --primary: #00ffaa; 
            --zoro-color: #00ff88;
            --shanks-color: #ff1100;
            --luffy-color: #ffffff;
            --haki-flash: transparent;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
            margin: 0; padding-bottom: 100px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 255, 170, 0.04) 0%, transparent 50%);
            -webkit-font-smoothing: antialiased;
        }

        /* Haki Flash Overlay */
        #haki-flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; opacity: 0;
            transition: opacity 0.1s;
        }

        header { padding: 40px 20px 10px; max-width: 600px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.03); }
        h1 { font-size: 0.9rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin: 0; opacity: 0.5; }
        
        .week-selector { background: #111; border: 1px solid #333; color: var(--primary); padding: 8px 12px; border-radius: 6px; font-weight: 700; outline: none; font-size: 0.75rem;}

        /* Navigazione Leggendaria */
        nav { display: flex; gap: 8px; padding: 20px 15px; overflow-x: auto; max-width: 650px; margin: 0 auto; justify-content: center; scrollbar-width: none; }
        .nav-item {
            background: transparent; border: none;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer; min-width: 95px; transition: 0.3s;
        }

        .char-box {
            width: 80px; height: 80px; border-radius: 18px;
            border: 2px solid #222; background: #080808;
            display: flex; align-items: center; justify-content: center;
            position: relative; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: visible; /* Per l'haki orbitale */
        }

        .nav-item.active .char-box { transform: scale(1.1) translateY(-8px); border-color: #fff; box-shadow: 0 0 25px rgba(255,255,255,0.1); }

        /* Icon Styles Specific */
        .zoro.active .char-box { border-color: var(--zoro-color); box-shadow: 0 0 30px rgba(0, 255, 136, 0.3); }
        .shanks.active .char-box { border-color: var(--shanks-color); box-shadow: 0 0 30px rgba(255, 17, 0, 0.3); }
        .luffy.active .char-box { border-color: #fff; box-shadow: 0 0 30px rgba(255, 255, 255, 0.4); }

        .day-label { font-size: 0.8rem; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 1px;}
        .nav-item.active .day-label { color: #fff; }
        .legend-title { font-size: 0.55rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.3; text-align: center; }
        .nav-item.active .legend-title { opacity: 1; }

        /* Container & Cards */
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .day-section { display: none; }
        .active-day { display: block; animation: fadeIn 0.4s ease; }

        .card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 12px; padding: 22px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;}
        
        /* Luffy Gear 5 Rubber Animation */
        .luffy-mode .card { animation: rubber 4s infinite alternate ease-in-out; border-color: rgba(255,255,255,0.2); }
        @keyframes rubber { 0% { border-radius: 15px; } 100% { border-radius: 40px; transform: scale(1.01); } }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-header h3 { margin: 0; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; color: #fff; font-weight: 700;}

        .timer-btn { background: transparent; color: var(--primary); border: 1px solid var(--primary); padding: 5px 12px; border-radius: 6px; font-size: 0.65rem; font-weight: 700; cursor: pointer;}

        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        .input-box { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #222; padding: 6px 0; }
        .input-box input { background: transparent; border: none; color: #fff; width: 100%; font-size: 1.2rem; outline: none; text-align: right; font-family: inherit;}
        .input-box span { font-size: 0.6rem; color: #475569; font-weight: 700; text-transform: uppercase;}

        /* Haki Lightning ORBITALE */
        .haki-lightning-svg { position: absolute; top: 50%; left: 50%; width: 150%; height: 150%; transform: translate(-50%, -50%); pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="haki-flash-overlay"></div>

<header>
    <h1>SYSTEM Legacy 4.0</h1>
    <select class="week-selector" id="weekSelect" onchange="loadWeekData()"></select>
</header>

<nav id="dayNav">
    <button onclick="switchDay('lun', 'zoro')" id="n-lun" class="nav-item active zoro">
        <div class="char-box">
            <svg viewBox="0 0 100 100" width="60" height="60">
                <path d="M15 85 L85 15 M15 15 L85 85 M50 5 L50 95" stroke="var(--zoro-color)" stroke-width="3" stroke-linecap="round"/>
                <circle cx="50" cy="50" r="10" stroke="var(--zoro-color)" stroke-width="1" fill="none" opacity="0.3">
                    <animate attributeName="r" values="10;15;10" dur="1.5s" repeatCount="indefinite" />
                </circle>
            </svg>
        </div>
        <span class="day-label">Lun</span>
        <span class="legend-title" style="color:var(--zoro-color)">King of Hell</span>
    </button>

    <button onclick="switchDay('mar', 'shanks')" id="n-mar" class="nav-item shanks">
        <div class="char-box">
            <svg viewBox="0 0 100 100" width="60" height="60">
                <path d="M30 25 L40 75 M50 20 L60 80 M70 25 L80 75" stroke="var(--shanks-color)" stroke-width="4.5" stroke-linecap="round"/>
                <path d="M10 80 Q50 90 90 80" stroke="#333" stroke-width="4" stroke-linecap="round"/>
            </svg>
        </div>
        <span class="day-label">Mar</span>
        <span class="legend-title" style="color:var(--shanks-color)">Akagami</span>
    </button>

    <button onclick="switchDay('mer', 'luffy')" id="n-mer" class="nav-item luffy">
        <div class="char-box">
            <svg viewBox="0 0 100 100" width="60" height="60">
                <circle cx="50" cy="50" r="35" stroke="white" stroke-width="2" fill="none"/>
                <path d="M15 50 Q50 70 85 50" stroke="white" stroke-width="3" fill="none"/>
                <path d="M30 45 Q50 15 70 45 Q90 55 70 75 Q50 90 30 75 Q10 55 30 45" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
            </svg>
        </div>
        <span class="day-label">Mer</span>
        <span class="legend-title" style="color:#fff">God of Liberation</span>
    </button>

    <button onclick="switchDay('gio', 'zoro')" id="n-gio" class="nav-item zoro">
        <div class="char-box"><svg viewBox="0 0 100 100" width="45" height="45"><path d="M15 85 L85 15 M15 15 L85 85 M50 5 L50 95" stroke="var(--zoro-color)" stroke-width="3" stroke-linecap="round"/></svg></div>
        <span class="day-label">Gio</span>
        <span class="legend-title" style="color:var(--zoro-color)">King of Hell</span>
    </button>

    <button onclick="switchDay('ven', 'shanks')" id="n-ven" class="nav-item shanks">
        <div class="char-box"><svg viewBox="0 0 100 100" width="45" height="45"><path d="M30 25 L40 75 M50 20 L60 80 M70 25 L80 75" stroke="var(--shanks-color)" stroke-width="4.5" stroke-linecap="round"/></svg></div>
        <span class="day-label">Ven</span>
        <span class="legend-title" style="color:var(--shanks-color)">Akagami</span>
    </button>
</nav>

<div class="container" id="mainContainer"></div>

<script>
// EFFETTO HAKI SUPREMO ORBITALE
function triggerHakiBurst(charType) {
    const flash = document.getElementById('haki-flash-overlay');
    let color = "#ffffff";
    if(charType === 'zoro') color = "rgba(0, 255, 136, 0.5)";
    if(charType === 'shanks') color = "rgba(255, 17, 0, 0.5)";
    if(charType === 'luffy') color = "rgba(255, 255, 255, 0.6)";

    flash.style.backgroundColor = color;
    flash.style.opacity = "1";
    
    // Scossa dello schermo leggera
    document.body.style.transform = `translate(${(Math.random()-0.5)*15}px, ${(Math.random()-0.5)*15}px)`;

    setTimeout(() => {
        flash.style.opacity = "0";
        document.body.style.transform = "translate(0,0)";
    }, 150);
}

function createOrbitalLightning(charType) {
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("class", "haki-lightning-svg");
    svg.setAttribute("viewBox", "0 0 200 200");
    let color = charType === 'zoro' ? '#00ff88' : (charType === 'shanks' ? '#ff0000' : '#ffffff');
    let paths = "";
    // Fulmini orbitali (orbitano attorno al riquadro)
    for(let i=0; i<6; i++) {
        let angle = (i/6)*Math.PI*2; let radius = 90 + Math.random()*20;
        let x = 100 + Math.cos(angle)*radius;
        let y = 100 + Math.sin(angle)*radius;
        let d=`M ${x} ${y} `;
        for(let j=0; j<4; j++) { x+=(Math.random()-0.5)*60; y+=(Math.random()-0.5)*60; d+=`L ${x} ${y} `; }
        paths += `<path d="${d}" stroke="black" stroke-width="5" fill="none" opacity="0.8"/><path d="${d}" stroke="${color}" stroke-width="1.8" fill="none"/>`;
    }
    svg.innerHTML = paths; return svg;
}

// Inizializzazione Workout (Dati Aggiornati)
const workout = {
    lun: { char: 'zoro', ex: [{n:"Panca Inclinata", s:4, r:90}, {n:"Chest Press", s:3, r:60}, {n:"Alzate Laterali", s:4, r:60}, {n:"Pushdown", s:4, r:60}] },
    mar: { char: 'shanks', ex: [{n:"Trazioni Zavorra", s:5, r:120}, {n:"Rematore", s:3, r:90}, {n:"Curl EZ", s:4, r:60}, {n:"Facepull", s:3, r:60}] },
    mer: { char: 'luffy', ex: [{n:"Hack Squat", s:4, r:120}, {n:"Leg Press", s:3, r:90}, {n:"Leg Curl", s:4, r:60}, {n:"Calf Raise", s:4, r:60}] },
    gio: { char: 'zoro', ex: [{n:"Panca Piana", s:4, r:90}, {n:"Croci Cavi", s:3, r:60}, {n:"Shoulder Press", s:3, r:90}, {n:"French Press", s:3, r:60}] },
    ven: { char: 'shanks', ex: [{n:"Trazioni Volume", s:4, r:120}, {n:"Lat Machine", s:3, r:90}, {n:"Hammer Curl", s:3, r:60}, {n:"Curl ai Cavi", s:3, r:60}] }
};

function init() {
    const main = document.getElementById('mainContainer');
    for(let day in workout) {
        let section = `<div id="${day}" class="day-section ${day==='lun'?'active-day':''} ${workout[day].char}-mode">`;
        
        // Esercizi Specifici
        workout[day].ex.forEach((e, idx) => {
            const id = `${day}_${idx}`;
            section += `<div class="card"><div class="card-header"><h3>${e.n}</h3><button class="timer-btn">${e.r}s</button></div>`;
            for(let s=0; s<e.s; s++) { section += `<div class="inputs"><div class="input-box"><input type="number" placeholder="0"><span>KG</span></div><div class="input-box"><input type="number" placeholder="0"><span>RE</span></div></div>`; }
            section += `</div>`;
        });
        
        // ADDOME & CARDIO (A fine sessione giornaliera)
        section += `
            <div class="card" style="border-color: rgba(255,255,255,0.1);">
                <div class="card-header"><h3>Addome Core Mix</h3></div>
                <div class="inputs"><div class="input-box"><input type="number" placeholder="3"><span>SET</span></div><div class="input-box"><input type="number" placeholder="20"><span>RE</span></div></div>
            </div>
            <div class="card" style="border-color: rgba(0,255,170,0.2);">
                <div class="card-header"><h3>Cardio LISS (Fine Allenamento)</h3></div>
                <div class="inputs"><div class="input-box"><input type="number" placeholder="15"><span>MINI</span></div><div class="input-box"><input type="number" placeholder="65"><span>%MAX</span></div></div>
            </div>
        `;

        main.innerHTML += section + `</div>`;
    }
}

function switchDay(day, charType) {
    // Effetti Haki Supreme
    triggerHakiBurst(charType);
    const bolt = createOrbitalLightning(charType);
    document.getElementById('n-'+day).querySelector('.char-box').appendChild(bolt);
    setTimeout(() => bolt.remove(), 400);

    // Cambio Pagina
    document.querySelectorAll('.day-section').forEach(d => d.classList.remove('active-day'));
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById(day).classList.add('active-day');
    document.getElementById('n-'+day).classList.add('active');
    window.scrollTo(0,0);
}

window.onload = init;
</script>
</body>
</html>

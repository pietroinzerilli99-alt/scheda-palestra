<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayleigh Legacy v10.0 - Haki Unleashed</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0b0b0d;
            --primary: #00ffaa;
            --zoro-color: #00ff88;
            --shanks-color: #ff1100;
            --luffy-color: #ffcc00;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: #fff; margin: 0; padding-bottom: 50px;
            overflow-x: hidden;
        }

        header { padding: 20px; text-align: center; border-bottom: 1px solid #111; }
        .week-select {
            background: #000; border: 1px solid #222; color: var(--primary);
            padding: 10px; border-radius: 8px; font-weight: 800; width: 100%; max-width: 400px;
        }

        nav { 
            display: flex; gap: 15px; padding: 20px; justify-content: center;
            position: sticky; top: 0; z-index: 1000; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
        }

        .nav-item {
            background: transparent; border: none; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            position: relative;
        }

        .char-frame {
            width: 70px; height: 95px; border-radius: 14px;
            border: 2px solid #1a1a1a; background: #050505;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s; position: relative; overflow: visible;
        }

        .nav-item.active .char-frame { transform: scale(1.1); border-color: #fff; }

        /* --- EFFETTI HAKI SPECIFICI --- */
        
        /* Contenitore fulmini */
        .haki-container {
            position: absolute; inset: -20px; pointer-events: none; z-index: 10;
        }

        /* Cicatrice Shanks */
        .scar-effect {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; justify-content: center; align-items: center;
        }
        .scar-line {
            position: absolute; background: var(--shanks-color); width: 2px; height: 0;
            transform: rotate(20deg); box-shadow: 0 0 8px var(--shanks-color);
            animation: scar-cut 0.4s ease-out forwards;
        }

        @keyframes scar-cut {
            from { height: 0; opacity: 1; }
            to { height: 80%; opacity: 0; }
        }

        /* Fulmini */
        .lightning {
            position: absolute; background: currentColor; width: 2px;
            border-radius: 2px; pointer-events: none;
        }

        /* --- CARDS & CONTENT --- */
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .card {
            background: var(--card-bg); border: 1px solid #1a1a1a;
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
        }
        .chart-mini { height: 70px; margin-bottom: 15px; }

        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        .input-item { 
            flex: 1; background: #151517; border-radius: 10px; 
            padding: 8px 12px; display: flex; align-items: center; 
        }
        .input-item input { background: transparent; border: none; color: #fff; width: 100%; outline: none; text-align: right; }
        .input-item span { font-size: 0.5rem; color: #444; margin-left: 5px; font-weight: 800; }

        #timer-ov {
            position: fixed; inset: 0; background: #000; display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        #timer-txt { font-size: 10rem; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

<div id="timer-ov" onclick="this.style.display='none'"><div id="timer-txt">00</div></div>

<header>
    <select id="weekSelector" class="week-select"></select>
</header>

<nav id="navbar"></nav>

<div class="container" id="workout-area"></div>

<script>
// Popola 16 Settimane
const sel = document.getElementById('weekSelector');
for(let i=1; i<=16; i++) {
    let opt = document.createElement('option');
    opt.value = i; opt.innerText = `SETTIMANA ${i}`;
    sel.appendChild(opt);
}

const config = {
    lun: { char: 'zoro', icon: '⚔️', color: '#00ff88', ex: ["Panca Inclinata", "Chest Press", "Alzate Laterali"] },
    mar: { char: 'shanks', icon: '🍷', color: '#ff1100', ex: ["Trazioni", "Rematore", "Curl EZ"] },
    mer: { char: 'luffy', icon: '🍖', color: '#ffcc00', ex: ["Hack Squat", "Leg Press", "Leg Curl"] },
    gio: { char: 'zoro', icon: '⚔️', color: '#00ff88', ex: ["Panca Piana", "Croci Cavi", "Shoulder Press"] },
    ven: { char: 'shanks', icon: '🍷', color: '#ff1100', ex: ["Lat Machine", "Rematore Man.", "Hammer Curl"] }
};

function initNav() {
    const nav = document.getElementById('navbar');
    for(let day in config) {
        nav.innerHTML += `
            <button onclick="activateHaki('${day}')" id="btn-${day}" class="nav-item ${day==='lun'?'active':''}">
                <div class="char-frame" id="frame-${day}">
                    <span style="font-size:1.8rem">${config[day].icon}</span>
                    <div class="haki-container" id="haki-${day}"></div>
                </div>
                <span style="font-size:0.6rem; font-weight:800; color:#444">${day.toUpperCase()}</span>
            </button>`;
    }
}

function activateHaki(dayKey) {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-'+dayKey).classList.add('active');
    
    const char = config[dayKey].char;
    const color = config[dayKey].color;
    const container = document.getElementById('haki-'+dayKey);
    container.innerHTML = '';

    // 1. Fulmini (Comuni ma con raggio diverso per Luffy)
    const count = char === 'luffy' ? 15 : 8;
    const radius = char === 'luffy' ? 100 : 40;

    for(let i=0; i < count; i++) {
        const l = document.createElement('div');
        l.className = 'lightning';
        l.style.color = color;
        l.style.left = '50%'; l.style.top = '50%';
        l.style.height = (Math.random() * radius + 20) + 'px';
        l.style.transform = `rotate(${Math.random() * 360}deg) translateY(-50%)`;
        l.style.boxShadow = `0 0 10px ${color}`;
        l.style.animation = `haki-pop 0.4s ease-out forwards`;
        container.appendChild(l);
        setTimeout(() => l.remove(), 400);
    }

    // 2. Effetto Speciale Shanks: Il Graffio
    if(char === 'shanks') {
        const scarWrap = document.createElement('div');
        scarWrap.className = 'scar-effect';
        for(let i = -1; i <= 1; i++) {
            const line = document.createElement('div');
            line.className = 'scar-line';
            line.style.left = `calc(50% + ${i*10}px)`;
            scarWrap.appendChild(line);
        }
        container.appendChild(scarWrap);
    }

    renderWorkout(dayKey);
}

function renderWorkout(dayKey) {
    const area = document.getElementById('workout-area');
    area.innerHTML = '';
    config[dayKey].ex.forEach((name, idx) => {
        const id = `c-${dayKey}-${idx}`;
        area.innerHTML += `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h3 style="font-size:0.8rem; letter-spacing:1px;">${name}</h3>
                    <button class="timer-btn" style="background:transparent; border:1px solid var(--primary); color:var(--primary); font-size:0.6rem; padding:4px 8px; border-radius:5px;" onclick="startT(90)">90s</button>
                </div>
                <div class="chart-mini"><canvas id="${id}"></canvas></div>
                <div class="input-group">
                    <div class="input-item"><input type="number" placeholder="0"><span>KG</span></div>
                    <div class="input-item"><input type="number" placeholder="0"><span>REPS</span></div>
                </div>
            </div>`;
        setTimeout(() => createChart(id), 10);
    });
}

function createChart(canvasId) {
    const ctx = document.getElementById(canvasId).getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: [1,2,3,4,5,6,7,8],
            datasets: [{
                data: Array.from({length: 8}, () => Math.floor(Math.random() * 20) + 50),
                borderColor: '#00ffaa', tension: 0.4, borderWidth: 2, pointRadius: 0, fill: true,
                backgroundColor: 'rgba(0, 255, 170, 0.05)'
            }]
        },
        options: {
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { display: false }, y: { display: false } }
        }
    });
}

function startT(s) {
    const ov = document.getElementById('timer-ov');
    ov.style.display = 'flex';
    let t = s;
    const iv = setInterval(() => {
        document.getElementById('timer-txt').innerText = t;
        if(t-- <= 0) { clearInterval(iv); ov.style.display = 'none'; }
    }, 1000);
}

const style = document.createElement('style');
style.innerHTML = `
    @keyframes haki-pop {
        0% { transform: rotate(var(--r)) scaleY(0); opacity: 1; }
        100% { transform: rotate(var(--r)) scaleY(1.5) translateY(-20px); opacity: 0; }
    }
`;
document.head.appendChild(style);

window.onload = () => { initNav(); activateHaki('lun'); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGNI SINGOLO GIORNO - APPLE PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card-bg: #0d0d0f; --primary: #00ffaa; --zoro: #00ff88; --shanks: #ff1100; --luffy: #ffcc00; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--bg); color: #fff; margin: 0; padding-bottom: 120px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        @keyframes quake { 0% { transform: translate(0,0); } 25% { transform: translate(-3px, 3px); } 50% { transform: translate(3px, -3px); } 100% { transform: translate(0,0); } }
        .quake-active { animation: quake 0.08s infinite !important; }

        header { padding: 25px 20px; text-align: center; }
        .main-title { font-weight: 900; letter-spacing: 10px; font-size: 1.1rem; text-transform: uppercase; margin-bottom: 15px; opacity: 0.8; }
        .week-select { background: #111; border: 1px solid #333; color: var(--primary); padding: 15px; border-radius: 16px; font-weight: 800; width: 95%; text-align: center; outline: none; appearance: none; font-size: 1rem; }

        nav { display: flex; gap: 15px; padding: 20px; overflow-x: auto; position: sticky; top: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid #1a1a1a; }
        nav::-webkit-scrollbar { display: none; }
        .nav-item { flex: 0 0 auto; background: transparent; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0.4; transition: 0.3s; }
        .nav-item.active { opacity: 1; transform: scale(1.1); }
        .char-frame { width: 70px; height: 95px; border-radius: 18px; border: 2px solid #222; background: #050505; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .active .char-frame { border-color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.1); }

        .scar-container { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; pointer-events: none; opacity: 0; }
        .scar-line { width: 2px; height: 0; background: var(--shanks); margin: 0 3px; transform: rotate(20deg); box-shadow: 0 0 10px var(--shanks); }
        .animate-scars { opacity: 1; animation: fadeOut 0.8s forwards; }
        .animate-scars .scar-line { animation: slashDown 0.3s ease-out forwards; }
        @keyframes slashDown { from { height: 0; } to { height: 60px; } }
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }

        .haki-svg-container { position: absolute; inset: -40px; pointer-events: none; z-index: 20; width: 150px; height: 175px; }
        .lightning-path { fill: none; stroke-width: 2.5; stroke-linecap: round; filter: drop-shadow(0 0 5px currentColor); animation: flash 0.4s ease-out forwards; }
        @keyframes flash { 0% { opacity: 1; stroke-dasharray: 100; stroke-dashoffset: 100; } 100% { opacity: 0; stroke-dashoffset: 0; } }

        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 28px; padding: 22px; margin-bottom: 25px; border: 1px solid #1a1a1a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
        .card-header h3 { margin: 0; font-size: 0.95rem; letter-spacing: 0.5px; text-transform: uppercase; color: #fff; display: flex; align-items: center; gap: 5px; font-weight: 700; flex-grow: 1; }
        
        .action-btn { background: #1a1a1c; border: 1px solid #333; color: #fff; width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 1.2rem; flex-shrink: 0; }
        .action-btn:active { transform: scale(0.9); background: #333; }
        
        .timer-group { display: flex; align-items: center; gap: 8px; background: #151518; padding: 6px; border-radius: 18px; border: 1px solid #222; flex-shrink: 0; }
        .timer-display { font-family: monospace; font-size: 1.2rem; font-weight: 800; color: var(--primary); min-width: 50px; text-align: center; cursor: pointer; }

        .set-row { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
        .input-box { flex: 1; background: #1a1a1c; border-radius: 16px; padding: 12px; display: flex; align-items: center; border: 1px solid #222; }
        .input-box input { background: transparent; border: none; color: #fff; width: 100%; text-align: right; outline: none; font-weight: 700; font-size: 1.2rem; }
        .input-box span { font-size: 0.65rem; color: #555; margin-left: 6px; font-weight: 800; text-transform: uppercase; }
        
        .chart-box { height: 110px; margin-top: 25px; border-top: 1px solid #1a1a1a; padding-top: 20px; }

        /* MODALE APPLE STYLE */
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 2000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; align-items: flex-end; }
        .modal.active { bottom: 0; }
        .modal-content { background: #111; width: 100%; border-radius: 30px 30px 0 0; padding: 30px 20px 50px 20px; box-sizing: border-box; border-top: 1px solid #333; }
        .modal-handle { width: 40px; height: 5px; background: #333; border-radius: 10px; margin: 0 auto 25px auto; }
        .modal-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 25px; text-align: center; }
        .modal-input-group { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .modal-input { background: #1a1a1c; border: 1px solid #333; border-radius: 16px; padding: 18px; color: #fff; font-size: 1rem; outline: none; font-family: inherit; }
        .modal-save-btn { background: #fff; color: #000; border: none; padding: 18px; border-radius: 16px; font-weight: 800; font-size: 1rem; width: 100%; cursor: pointer; }

        .add-ex-btn { width: 100%; padding: 22px; background: #0a0a0a; border: 2px dashed #333; color: #666; border-radius: 20px; font-weight: 800; margin-top: 15px; cursor: pointer; font-size: 0.9rem; letter-spacing: 1px; }
        .quote-box { padding: 60px 30px; text-align: center; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

<header>
    <div class="main-title">OGNI SINGOLO GIORNO</div>
    <select id="weekSelector" class="week-select" onchange="renderWorkout()"></select>
</header>

<nav id="navbar"></nav>

<div id="shake-wrapper">
    <div class="container" id="workout-area"></div>
    <div class="quote-box">
        <p id="quote-text"></p>
        <span id="quote-author" style="font-weight: 800; font-size: 0.75rem; color: var(--primary); text-transform: uppercase; letter-spacing: 4px;"></span>
    </div>
</div>

<div class="modal" id="editModal">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-handle" onclick="closeModal()"></div>
        <div class="modal-title" id="modalTitle">Nuovo Esercizio</div>
        <div class="modal-input-group">
            <input type="text" id="exNameInput" class="modal-input" placeholder="Nome Esercizio">
            <input type="number" id="exSetsInput" class="modal-input" placeholder="Numero di Serie">
        </div>
        <button class="modal-save-btn" id="modalActionBtn">Salva</button>
    </div>
</div>

<script>
const quotesDB = {
    zoro: ["Settimana 1: Se non riesci a proteggere il tuo capitano, la tua ambizione è nulla.", "Settimana 16: ORA SONO IO L'INFERNO."],
    shanks: ["Settimana 1: Scommetto sul futuro.", "Settimana 16: Il mondo è pronto per te?"],
    luffy: ["Settimana 1: Diventerò il Re dei Pirati!", "Settimana 16: GEAR FIFTH! QUESTO È IL MIO APICE!"]
};

const defaultData = {
    lun: { char: 'zoro', icon: '⚔️', color: '#00ff88', abs: {n:'Leg Raises', s:3, r:60}, cardio: {n:'Cardio LISS', s:1, r:600}, ex: [{n:"Panca Inclinata", s:4, r:90}, {n:"Chest Press", s:3, r:60}] },
    mar: { char: 'shanks', icon: '🍷', color: '#ff1100', abs: {n:'Cable Crunch', s:3, r:60}, cardio: {n:'Cardio LISS', s:1, r:600}, ex: [{n:"Trazioni", s:5, r:120}, {n:"Rematore", s:3, r:90}] },
    mer: { char: 'luffy', icon: '🍖', color: '#ffcc00', abs: {n:'Ab Wheel', s:3, r:60}, cardio: {n:'Cardio LISS', s:1, r:600}, ex: [{n:"Squat", s:4, r:120}, {n:"Stacchi", s:4, r:120}] },
    gio: { char: 'zoro', icon: '⚔️', color: '#00ff88', abs: {n:'Leg Raises', s:3, r:60}, cardio: {n:'Cardio LISS', s:1, r:600}, ex: [{n:"Panca Piana", s:4, r:90}, {n:"Croci", s:3, r:60}] },
    ven: { char: 'shanks', icon: '🍷', color: '#ff1100', abs: {n:'Cable Crunch', s:3, r:60}, cardio: {n:'Cardio LISS', s:1, r:600}, ex: [{n:"Lat Machine", s:3, r:90}, {n:"Hammer Curl", s:3, r:60}] }
};

let workoutData = JSON.parse(localStorage.getItem('workout_structure_v9')) || defaultData;
let activeTimer = null;
let currentDay = 'lun';
let editingContext = null;

function init() {
    const nav = document.getElementById('navbar');
    for(let i=1; i<=16; i++) {
        let opt = document.createElement('option'); opt.value = i; opt.innerText = `SETTIMANA ${i}`;
        document.getElementById('weekSelector').appendChild(opt);
    }
    for(let day in workoutData) {
        nav.innerHTML += `<button onclick="setDay('${day}')" id="btn-${day}" class="nav-item">
            <div class="char-frame" id="frame-${day}">
                <div class="scar-container" id="scars-${day}"><div class="scar-line"></div><div class="scar-line"></div><div class="scar-line"></div></div>
                <span style="font-size:1.8rem">${workoutData[day].icon}</span>
            </div>
            <span style="font-size:0.6rem; font-weight:800; color:#555">${day.toUpperCase()}</span></button>`;
    }
    checkPersistentTimer();
    setDay('lun');
}

function setDay(day) {
    currentDay = day;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-'+day).classList.add('active');
    triggerHaki(day);
    renderWorkout(day);
}

function triggerHaki(day) {
    const wrap = document.getElementById('shake-wrapper');
    const char = workoutData[day].char;
    const frame = document.getElementById('frame-'+day);
    wrap.classList.add('quake-active');
    if(char === 'shanks') document.getElementById('scars-'+day).classList.add('animate-scars');
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("class", "haki-svg-container");
    frame.appendChild(svg);
    for(let i=0; i<(char==='luffy'?12:6); i++) {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", "lightning-path"); path.setAttribute("stroke", workoutData[day].color);
        let x=75, y=85, d=`M ${x} ${y} `;
        for(let j=0; j<3; j++) { x+=(Math.random()-0.5)*100; y+=(Math.random()-0.5)*100; d+=`L ${x} ${y} `; }
        path.setAttribute("d", d); svg.appendChild(path);
    }
    setTimeout(() => { wrap.classList.remove('quake-active'); if(char === 'shanks') document.getElementById('scars-'+day).classList.remove('animate-scars'); svg.remove(); }, char === 'luffy' ? 1400 : 600);
}

function renderWorkout(day = currentDay) {
    const area = document.getElementById('workout-area');
    const week = document.getElementById('weekSelector').value;
    area.innerHTML = '';
    workoutData[day].ex.forEach((ex, idx) => area.appendChild(createCard(ex, idx, day)));
    area.innerHTML += `<div style="text-align:center; color:#222; font-size:0.6rem; letter-spacing:5px; margin:40px 0; font-weight:900;">DAILY FINISHERS</div>`;
    area.appendChild(createCard(workoutData[day].abs, 'abs', day));
    area.appendChild(createCard(workoutData[day].cardio, 'cardio', day));
    area.innerHTML += `<button class="add-ex-btn" onclick="openAddModal(event)">+ AGGIUNGI ESERCIZIO</button>`;
    const char = workoutData[day].char;
    document.getElementById('quote-text').innerText = quotesDB[char][week-1] || quotesDB[char][0];
    document.getElementById('quote-author').innerText = char;
}

function createCard(ex, idx, day) {
    const week = document.getElementById('weekSelector').value;
    const card = document.createElement('div'); card.className = 'card';
    let html = `<div class="card-header">
        <h3>${ex.n} <button class="action-btn" style="width:34px; height:34px; font-size:0.9rem; margin-left:10px;" onclick="openEditModal(event, '${idx}')">✎</button></h3>
        <div class="timer-group">
            <button class="action-btn" onclick="resetTimer('${idx}', ${ex.r})">↺</button>
            <span class="timer-display" id="t-val-${idx}" onclick="editTimerVal('${day}', '${idx}')">${ex.r}s</span>
            <button class="action-btn" id="t-btn-${idx}" onclick="startTimer('${idx}', ${ex.r})">▶</button>
        </div>
    </div>`;
    for(let i=1; i<=ex.s; i++) {
        const key = `w${week}-${day}-${idx}-s${i}`;
        const saved = JSON.parse(localStorage.getItem(key)) || {kg:'', reps:''};
        html += `<div class="set-row">
            <div style="font-size:0.7rem; width:20px; font-weight:800; color:#333;">${i}</div>
            <div class="input-box"><input type="number" value="${saved.kg}" oninput="saveSet('${day}', '${idx}', ${i}, 'kg', this.value)"><span>KG</span></div>
            <div class="input-box"><input type="number" value="${saved.reps}" oninput="saveSet('${day}', '${idx}', ${i}, 'reps', this.value)"><span>REPS</span></div>
        </div>`;
    }
    html += `<div class="chart-box"><canvas id="chart-${day}-${idx}"></canvas></div>`;
    card.innerHTML = html;
    setTimeout(() => drawChart(day, idx), 50);
    return card;
}

// LOGICA MODALE (APPLE STYLE)
function openAddModal(e) {
    e.stopPropagation();
    editingContext = 'add';
    document.getElementById('modalTitle').innerText = "Nuovo Esercizio";
    document.getElementById('exNameInput').value = '';
    document.getElementById('exSetsInput').value = '';
    document.getElementById('modalActionBtn').onclick = confirmAddEx;
    document.getElementById('editModal').classList.add('active');
}

function openEditModal(e, idx) {
    e.stopPropagation();
    editingContext = idx;
    let data = (idx === 'abs' || idx === 'cardio') ? workoutData[currentDay][idx] : workoutData[currentDay].ex[idx];
    document.getElementById('modalTitle').innerText = "Modifica Esercizio";
    document.getElementById('exNameInput').value = data.n;
    document.getElementById('exSetsInput').value = data.s;
    document.getElementById('modalActionBtn').onclick = confirmEditEx;
    document.getElementById('editModal').classList.add('active');
}

function closeModal() { document.getElementById('editModal').classList.remove('active'); }

function handleGlobalClick(e) {
    const modal = document.getElementById('editModal');
    if (modal.classList.contains('active') && e.target === modal) closeModal();
}

function confirmAddEx() {
    const n = document.getElementById('exNameInput').value;
    const s = document.getElementById('exSetsInput').value;
    if(n && s) {
        workoutData[currentDay].ex.push({n: n, s: parseInt(s), r: 90});
        saveAndRefresh();
    }
}

function confirmEditEx() {
    const n = document.getElementById('exNameInput').value;
    const s = document.getElementById('exSetsInput').value;
    if(n && s) {
        let target = (editingContext === 'abs' || editingContext === 'cardio') ? workoutData[currentDay][editingContext] : workoutData[currentDay].ex[editingContext];
        target.n = n; target.s = parseInt(s);
        saveAndRefresh();
    }
}

function saveAndRefresh() {
    localStorage.setItem('workout_structure_v9', JSON.stringify(workoutData));
    closeModal();
    renderWorkout(currentDay);
}

// TIMER E PERSISTENZA
function startTimer(idx, seconds) {
    if(activeTimer && activeTimer.idx !== idx) return;
    const btn = document.getElementById(`t-btn-${idx}`);
    if(activeTimer && activeTimer.idx === idx) {
        if(activeTimer.running) { clearInterval(activeTimer.int); activeTimer.running = false; btn.innerText = "▶"; localStorage.removeItem('persistent_timer'); }
        return;
    }
    document.querySelectorAll('.action-btn').forEach(b => { if(b.id && b.id.startsWith('t-btn') && b.id !== `t-btn-${idx}`) b.disabled = true; });
    btn.innerText = "Ⅱ";
    const endTime = Date.now() + (seconds * 1000);
    localStorage.setItem('persistent_timer', JSON.stringify({idx, endTime, original: seconds}));
    activeTimer = { idx, time: seconds, running: true, int: setInterval(() => tick(idx, seconds), 1000) };
}

function tick(idx, original) {
    const display = document.getElementById(`t-val-${idx}`);
    const btn = document.getElementById(`t-btn-${idx}`);
    const data = JSON.parse(localStorage.getItem('persistent_timer'));
    if(!data) return;
    const remaining = Math.round((data.endTime - Date.now()) / 1000);
    if(remaining <= 0) {
        clearInterval(activeTimer.int); if(display) display.innerText = original + "s"; if(btn) btn.innerText = "▶";
        activeTimer = null; localStorage.removeItem('persistent_timer');
        document.querySelectorAll('.action-btn').forEach(b => b.disabled = false);
        new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
    } else { if(display) display.innerText = remaining + "s"; activeTimer.time = remaining; }
}

function checkPersistentTimer() {
    const data = JSON.parse(localStorage.getItem('persistent_timer'));
    if(data) {
        const remaining = Math.round((data.endTime - Date.now()) / 1000);
        if(remaining > 0) activeTimer = { idx: data.idx, time: remaining, running: true, int: setInterval(() => tick(data.idx, data.original), 1000) };
        else localStorage.removeItem('persistent_timer');
    }
}

function resetTimer(idx, original) {
    if(activeTimer && activeTimer.idx === idx) { clearInterval(activeTimer.int); activeTimer = null; localStorage.removeItem('persistent_timer'); document.querySelectorAll('.action-btn').forEach(b => b.disabled = false); }
    const display = document.getElementById(`t-val-${idx}`); const btn = document.getElementById(`t-btn-${idx}`);
    if(display) display.innerText = original + "s"; if(btn) btn.innerText = "▶";
}

function editTimerVal(day, idx) {
    const newVal = prompt("Tempo recupero (sec):");
    if(newVal) {
        let target = (idx === 'abs' || idx === 'cardio') ? workoutData[day][idx] : workoutData[day].ex[idx];
        target.r = parseInt(newVal);
        localStorage.setItem('workout_structure_v9', JSON.stringify(workoutData));
        renderWorkout(day);
    }
}

function saveSet(day, exIdx, setIdx, type, val) {
    const week = document.getElementById('weekSelector').value;
    const key = `w${week}-${day}-${exIdx}-s${setIdx}`;
    let d = JSON.parse(localStorage.getItem(key)) || {kg:'', reps:''};
    d[type] = val; localStorage.setItem(key, JSON.stringify(d)); drawChart(day, exIdx);
}

function drawChart(day, idx) {
    const canvas = document.getElementById(`chart-${day}-${idx}`); if(!canvas) return;
    const ctx = canvas.getContext('2d'); const pts = [];
    for(let w=1; w<=16; w++) {
        const d = JSON.parse(localStorage.getItem(`w${w}-${day}-${idx}-s1`));
        pts.push(d && d.kg ? parseFloat(d.kg) : 0);
    }
    if(window['c'+day+idx]) window['c'+day+idx].destroy();
    window['c'+day+idx] = new Chart(ctx, {
        type: 'line', data: { labels: Array.from({length:16},(_,i)=>i+1), datasets: [{ data: pts, borderColor: workoutData[day].color, borderWidth: 2, tension: 0.4, pointRadius: 0, fill: false }] },
        options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
    });
}
window.onload = init;
</script>
</body>
</html>

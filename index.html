<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayleigh Legacy v8.0 - 16 Weeks Peak</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --card-bg: #0a0a0c;
            --primary: #00ffaa;
            --zoro: #00ff88;
            --shanks: #ff1100;
            --luffy-gold: #ffcc00;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: #fff;
            margin: 0; padding-bottom: 50px;
        }

        header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #111; }
        
        .week-container { margin: 15px 0; }
        .week-select {
            background: #000; border: 1px solid #222; color: var(--primary);
            padding: 12px; border-radius: 8px; font-weight: 800; width: 85%; max-width: 350px;
            font-size: 0.8rem; letter-spacing: 1px;
        }

        nav { 
            display: flex; gap: 12px; padding: 20px; overflow-x: auto; 
            justify-content: center; position: sticky; top: 0; z-index: 100;
            background: rgba(3,3,3,0.9); backdrop-filter: blur(15px);
        }

        .nav-item {
            background: transparent; border: none; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            position: relative;
        }

        .char-frame {
            width: 65px; height: 85px; border-radius: 12px;
            border: 2px solid #1a1a1a; background: #050505;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s; position: relative; z-index: 5;
        }

        .nav-item.active .char-frame { transform: scale(1.1); border-color: #fff; }
        .zoro.active .char-frame { box-shadow: 0 0 20px var(--zoro); border-color: var(--zoro); }
        .shanks.active .char-frame { box-shadow: 0 0 20px var(--shanks); border-color: var(--shanks); }
        .luffy.active .char-frame { box-shadow: 0 0 20px var(--luffy-gold); border-color: var(--luffy-gold); }

        /* Haki Lightning Orbital */
        .haki-wrap {
            position: absolute; top: -10px; left: -10px;
            width: calc(100% + 20px); height: calc(100% + 20px);
            pointer-events: none; z-index: 1; opacity: 0;
        }
        .active .haki-wrap { opacity: 1; }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .card {
            background: var(--card-bg); border: 1px solid #151515;
            border-radius: 18px; padding: 22px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card h3 { 
            margin: 0 0 15px 0; font-size: 0.8rem; letter-spacing: 2px;
            text-transform: uppercase; color: #555; display: flex; justify-content: space-between;
        }

        .timer-btn {
            background: transparent; border: 1px solid var(--primary); color: var(--primary);
            padding: 4px 10px; border-radius: 5px; font-size: 0.6rem; font-weight: 800;
        }

        .set-row { display: flex; gap: 15px; margin-bottom: 10px; align-items: center; }
        .input-grp { flex: 1; border-bottom: 1px solid #222; display: flex; align-items: baseline; }
        .input-grp input { background: transparent; border: none; color: #fff; font-size: 1.2rem; width: 100%; outline: none; font-weight: 700; }
        .input-grp label { font-size: 0.5rem; color: #444; font-weight: 800; }

        .chart-box { background: #070707; border-radius: 18px; padding: 20px; border: 1px solid #111; margin-top: 20px; }

        #t-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        #t-val { font-size: 8rem; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

<div id="t-overlay" onclick="closeT()"><div id="t-val">00</div></div>

<header>
    <div style="font-weight: 900; letter-spacing: 6px; font-size: 0.7rem; color: #444;">RAYLEIGH SUPREME</div>
    <div class="week-container">
        <select id="weekSelector" class="week-select"></select>
    </div>
</header>

<nav id="navbar"></nav>

<div class="container">
    <div id="workout-area"></div>
    <div class="chart-box">
        <div style="font-size: 0.5rem; letter-spacing: 2px; color: #444; margin-bottom: 15px; font-weight: 800;">PROGRESSO VOLUME 16 SETTIMANE</div>
        <canvas id="volChart"></canvas>
    </div>
</div>

<script>
// Popola Settimane
const sel = document.getElementById('weekSelector');
for(let i=1; i<=16; i++) {
    let opt = document.createElement('option');
    opt.value = i; opt.innerText = `SETTIMANA ${i} - ${i < 5 ? 'RISVEGLIO' : i < 13 ? 'HAKI TRAINING' : 'IMPERATORE'}`;
    sel.appendChild(opt);
}

const config = {
    lun: { name: 'Zoro', char: 'zoro', icon: '⚔️', ex: [{n:"Panca Inclinata", s:4, r:90}, {n:"Chest Press", s:3, r:60}, {n:"Alzate Laterali", s:4, r:60}] },
    mar: { name: 'Shanks', char: 'shanks', icon: '🍷', ex: [{n:"Trazioni", s:5, r:120}, {n:"Rematore", s:3, r:90}, {n:"Curl EZ", s:4, r:60}] },
    mer: { name: 'Luffy', char: 'luffy', icon: '🍖', ex: [{n:"Hack Squat", s:4, r:120}, {n:"Leg Press", s:3, r:90}, {n:"Leg Curl", s:4, r:60}] },
    gio: { name: 'Zoro', char: 'zoro', icon: '⚔️', ex: [{n:"Panca Piana", s:4, r:90}, {n:"Croci Cavi", s:3, r:60}, {n:"Shoulder Press", s:3, r:90}] },
    ven: { name: 'Shanks', char: 'shanks', icon: '🍷', ex: [{n:"Lat Machine", s:4, r:90}, {n:"Rematore Man.", s:3, r:90}, {n:"Hammer Curl", s:3, r:60}] }
};

function initNav() {
    const nav = document.getElementById('navbar');
    for(let day in config) {
        nav.innerHTML += `
            <button onclick="setDay('${day}')" id="btn-${day}" class="nav-item ${day==='lun'?'active':''} ${config[day].char}">
                <div class="haki-wrap" id="haki-${day}"></div>
                <div class="char-frame"><span style="font-size:1.5rem">${config[day].icon}</span></div>
                <span style="font-size:0.6rem; font-weight:800; color:#444">${day.toUpperCase()}</span>
            </button>`;
    }
}

function drawHaki(day) {
    const wrap = document.getElementById('haki-'+day);
    wrap.innerHTML = '';
    const color = config[day].char === 'zoro' ? '#00ff88' : (config[day].char === 'shanks' ? '#ff1100' : '#ffcc00');
    
    for(let i=0; i<6; i++) {
        const line = document.createElement('div');
        line.style.position = 'absolute';
        line.style.width = '2px';
        line.style.height = Math.random()*40 + 20 + 'px';
        line.style.background = color;
        line.style.boxShadow = `0 0 10px ${color}`;
        line.style.left = '50%'; line.style.top = '50%';
        line.style.transformOrigin = 'bottom';
        line.style.transform = `rotate(${Math.random()*360}deg) translateY(-40px)`;
        line.style.animation = 'hakiPop 0.4s ease-out forwards';
        wrap.appendChild(line);
    }
}

function setDay(dayKey) {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-'+dayKey).classList.add('active');
    drawHaki(dayKey);
    renderWorkout(dayKey);
}

function renderWorkout(dayKey) {
    const area = document.getElementById('workout-area');
    let html = '';
    config[dayKey].ex.forEach(ex => {
        html += `<div class="card"><h3>${ex.n} <button class="timer-btn" onclick="runT(${ex.r})">${ex.r}s</button></h3>`;
        for(let i=1; i<=ex.s; i++) {
            html += `<div class="set-row">
                <span style="font-size:0.6rem; color:var(--primary)">${i}</span>
                <div class="input-grp"><input type="number" placeholder="0"><label>KG</label></div>
                <div class="input-grp"><input type="number" placeholder="0"><label>REPS</label></div>
            </div>`;
        }
        html += `</div>`;
    });
    // Addome e Cardio sempre presenti
    html += `<div style="text-align:center; color:#333; font-size:0.6rem; letter-spacing:4px; margin:20px 0;">FINISHER</div>`;
    html += `<div class="card"><h3>Addominali<button class="timer-btn" onclick="runT(60)">60s</button></h3></div>`;
    html += `<div class="card"><h3>Cardio (15m)<button class="timer-btn" onclick="runT(900)">15m</button></h3></div>`;
    area.innerHTML = html;
}

function runT(s) {
    const ov = document.getElementById('t-overlay');
    ov.style.display = 'flex';
    let t = s;
    window.iv = setInterval(() => {
        document.getElementById('t-val').innerText = t;
        if(t-- <= 0) closeT();
    }, 1000);
}

function closeT() { clearInterval(window.iv); document.getElementById('t-overlay').style.display='none'; }

// Grafico Volume
new Chart(document.getElementById('volChart'), {
    type: 'line',
    data: {
        labels: Array.from({length: 16}, (_, i) => i + 1),
        datasets: [{
            label: 'Volume',
            data: [100, 110, 105, 130, 145, 160, 155, 180, 200, 210, 205, 230, 250, 270, 290, 320],
            borderColor: '#00ffaa', tension: 0.4, borderWidth: 2, pointRadius: 0
        }]
    },
    options: {
        plugins: { legend: { display: false } },
        scales: { x: { grid: { display: false }, ticks: { color: '#333' } }, y: { display: false } }
    }
});

const style = document.createElement('style');
style.innerHTML = `@keyframes hakiPop { 0% { opacity:1; transform: rotate(var(--r)) translateY(-40px) scaleY(1); } 100% { opacity:0; transform: rotate(var(--r)) translateY(-70px) scaleY(0.2); } }`;
document.head.appendChild(style);

window.onload = () => { initNav(); renderWorkout('lun'); };
</script>
</body>
</html>

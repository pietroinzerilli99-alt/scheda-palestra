<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayleigh Workout - Final Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(20, 20, 25, 0.98);
            --primary: #00ffaa;
            --zoro-color: #00ff88;
            --shanks-color: #ff1100;
            --luffy-color: #ffffff;
            --luffy-gold: #ffcc00;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: #fff;
            margin: 0; padding-bottom: 100px;
        }

        .header-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(10px);
            padding-bottom: 15px;
            border-bottom: 1px solid #222;
        }

        header { padding: 20px; max-width: 600px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        
        nav { display: flex; gap: 10px; padding: 10px; max-width: 600px; margin: 0 auto; justify-content: space-around; }

        .nav-item {
            background: transparent; border: none; display: flex; flex-direction: column; 
            align-items: center; gap: 8px; cursor: pointer; transition: 0.3s;
        }

        .char-box {
            width: 70px; height: 90px; border-radius: 12px;
            border: 2px solid #222; background: #0a0a0a;
            position: relative; transition: 0.4s;
            display: flex; align-items: center; justify-content: center;
        }

        .nav-item.active .char-box { transform: scale(1.1); border-color: #fff; }
        .zoro.active .char-box { border-color: var(--zoro-color); box-shadow: 0 0 15px var(--zoro-color); }
        .shanks.active .char-box { border-color: var(--shanks-color); box-shadow: 0 0 15px var(--shanks-color); }
        .luffy.active .char-box { border-color: var(--luffy-gold); box-shadow: 0 0 15px var(--luffy-gold); }

        .day-label { font-size: 0.7rem; font-weight: 800; color: #444; }
        .nav-item.active .day-label { color: #fff; }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .day-section { display: none; }
        .active-day { display: block; }

        .card { 
            background: var(--card-bg); border-radius: 16px; padding: 20px; 
            margin-bottom: 15px; border: 1px solid #1a1a1a; 
        }
        
        .luffy-mode .card { animation: gear5 3s infinite alternate ease-in-out; }
        @keyframes gear5 { 0% { transform: scale(1); } 100% { transform: scale(1.02); border-color: #fff; } }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card-header h3 { margin: 0; font-size: 0.9rem; color: #ddd; text-transform: uppercase; }

        .timer-btn { 
            background: transparent; color: var(--primary); border: 1px solid var(--primary); 
            padding: 6px 12px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; cursor: pointer;
        }

        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
        .input-box { display: flex; align-items: center; gap: 5px; border-bottom: 1px solid #222; padding: 5px 0; }
        .input-box input { background: transparent; border: none; color: #fff; width: 100%; font-size: 1.1rem; outline: none; text-align: right; }
        .input-box span { font-size: 0.5rem; color: #555; font-weight: 800; }

        #timer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 10000;
        }
        #timer-display { font-size: 6rem; color: var(--primary); }

        /* Haki Lightning solo attorno al bordo */
        .haki-lightning-svg { 
            position: absolute; top: -10px; left: -10px; width: calc(100% + 20px); height: calc(100% + 20px); 
            pointer-events: none; z-index: 10; 
        }
    </style>
</head>
<body>

<div id="timer-overlay" onclick="closeTimer()"><div id="timer-display">00:00</div></div>

<div class="header-nav">
    <header>
        <div style="font-weight: 800; letter-spacing: 2px; font-size: 0.7rem; opacity: 0.4;">RAYLEIGH LEGACY 6.0</div>
    </header>

    <nav>
        <button onclick="switchDay('lun', 'zoro')" id="n-lun" class="nav-item active zoro">
            <div class="char-box">
                <svg viewBox="0 0 100 120" width="50"><path d="M20 100 L80 20 M35 100 L95 20 M5 100 L65 20" stroke="var(--zoro-color)" stroke-width="5" fill="none" opacity="0.8"/></svg>
            </div>
            <span class="day-label">LUN</span>
        </button>
        <button onclick="switchDay('mar', 'shanks')" id="n-mar" class="nav-item shanks">
            <div class="char-box">
                <svg viewBox="0 0 100 120" width="50"><path d="M40 30 Q 50 10, 60 30 M45 40 L45 80" stroke="var(--shanks-color)" stroke-width="4" fill="none"/><path d="M30 35 L40 55 M50 35 L50 55 M70 35 L60 55" stroke="var(--shanks-color)" stroke-width="2" fill="none"/></svg>
            </div>
            <span class="day-label">MAR</span>
        </button>
        <button onclick="switchDay('mer', 'luffy')" id="n-mer" class="nav-item luffy">
            <div class="char-box">
                <svg viewBox="0 0 100 120" width="55">
                    <ellipse cx="50" cy="70" rx="30" ry="8" fill="none" stroke="var(--luffy-gold)" stroke-width="3"/>
                    <path d="M30 68 Q50 40 70 68" fill="none" stroke="var(--luffy-gold)" stroke-width="3"/>
                    <circle cx="50" cy="50" r="35" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="5,3"><animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite"/></circle>
                </svg>
            </div>
            <span class="day-label">MER</span>
        </button>
        <button onclick="switchDay('gio', 'zoro')" id="n-gio" class="nav-item zoro">
            <div class="char-box">
                <svg viewBox="0 0 100 120" width="50"><path d="M20 100 L80 20 M35 100 L95 20 M5 100 L65 20" stroke="var(--zoro-color)" stroke-width="5" fill="none" opacity="0.8"/></svg>
            </div>
            <span class="day-label">GIO</span>
        </button>
        <button onclick="switchDay('ven', 'shanks')" id="n-ven" class="nav-item shanks">
            <div class="char-box">
                <svg viewBox="0 0 100 120" width="50"><path d="M40 30 Q 50 10, 60 30 M45 40 L45 80" stroke="var(--shanks-color)" stroke-width="4" fill="none"/></svg>
            </div>
            <span class="day-label">VEN</span>
        </button>
    </nav>
</div>

<div class="container" id="mainContainer"></div>

<script>
const workout = {
    lun: { char: 'zoro', ex: [{n:"Panca Inclinata", s:4, r:90}, {n:"Chest Press", s:3, r:60}, {n:"Alzate Laterali", s:4, r:60}] },
    mar: { char: 'shanks', ex: [{n:"Trazioni Zavorra", s:5, r:120}, {n:"Rematore", s:3, r:90}, {n:"Curl EZ", s:4, r:60}] },
    mer: { char: 'luffy', ex: [{n:"Hack Squat", s:4, r:120}, {n:"Leg Press", s:3, r:90}, {n:"Leg Curl", s:4, r:60}] },
    gio: { char: 'zoro', ex: [{n:"Panca Piana", s:4, r:90}, {n:"Croci Cavi", s:3, r:60}, {n:"Shoulder Press", s:3, r:90}] },
    ven: { char: 'shanks', ex: [{n:"Trazioni Volume", s:4, r:120}, {n:"Lat Machine", s:3, r:90}, {n:"Hammer Curl", s:3, r:60}] }
};

function init() {
    const main = document.getElementById('mainContainer');
    for(let day in workout) {
        let section = `<div id="${day}" class="day-section ${day==='lun'?'active-day':''} ${workout[day].char}-mode">`;
        workout[day].ex.forEach(e => section += createCard(e.n, e.s, e.r));
        section += `<div style="margin: 25px 0 10px; font-weight: 800; font-size: 0.6rem; color: #444; letter-spacing: 2px;">DAILY FINISHER</div>`;
        section += createCard("Addominali Core", 3, 60);
        section += createCard("Cardio LISS (15 Min)", 1, 900);
        main.innerHTML += section + `</div>`;
    }
}

function createCard(title, sets, rest) {
    let tLabel = rest >= 60 ? Math.floor(rest/60) + 'm' : rest + 's';
    let html = `<div class="card"><div class="card-header"><h3>${title}</h3><button class="timer-btn" onclick="startTimer(${rest})">${tLabel}</button></div>`;
    for(let i=0; i<sets; i++) {
        html += `<div class="inputs"><div class="input-box"><input type="number" placeholder="0"><span>KG</span></div><div class="input-box"><input type="number" placeholder="0"><span>REPS</span></div></div>`;
    }
    return html + `</div>`;
}

function startTimer(sec) {
    const overlay = document.getElementById('timer-overlay');
    const display = document.getElementById('timer-display');
    overlay.style.display = 'flex';
    let t = sec;
    window.currentT = setInterval(() => {
        let m = Math.floor(t/60); let s = t%60;
        display.innerText = `${m}:${s < 10 ? '0'+s : s}`;
        if(t-- <= 0) closeTimer();
    }, 1000);
}

function closeTimer() {
    clearInterval(window.currentT);
    document.getElementById('timer-overlay').style.display = 'none';
}

function createLightning(target, char) {
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("class", "haki-lightning-svg");
    svg.setAttribute("viewBox", "0 0 100 100");
    let color = char === 'zoro' ? '#00ff88' : (char === 'shanks' ? '#ff0000' : '#ffffff');
    let p = "";
    for(let i=0; i<3; i++) {
        let d = `M ${Math.random()*100} 0 L ${Math.random()*100} 100 M 0 ${Math.random()*100} L 100 ${Math.random()*100}`;
        p += `<path d="${d}" stroke="${color}" stroke-width="1" fill="none" opacity="0.6"/>`;
    }
    svg.innerHTML = p;
    target.appendChild(svg);
    setTimeout(() => svg.remove(), 400);
}

function switchDay(day, char) {
    createLightning(document.getElementById('n-'+day).querySelector('.char-box'), char);
    document.querySelectorAll('.day-section').forEach(s => s.classList.remove('active-day'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(day).classList.add('active-day');
    document.getElementById('n-'+day).classList.add('active');
    window.scrollTo({top: 0, behavior: 'smooth'});
}

window.onload = init;
</script>
</body>
</html>

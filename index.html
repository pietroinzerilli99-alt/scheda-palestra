<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayleigh Workout - Pirate King Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010204;
            --glass: rgba(10, 15, 25, 0.8);
            --primary: #00f2ff;
            --text: #f8fafc;
            --text-dim: #475569;
            --zoro: #00ff88;
            --shanks: #ff1100;
            --joyboy: #ffaa00;
            --haki-red: #ff0000;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding-bottom: 60px;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* Background Dinamici */
        body.zoro-mode { background-image: radial-gradient(circle at 50% 0%, rgba(0, 255, 136, 0.05) 0%, transparent 50%); }
        body.shanks-mode { background-image: radial-gradient(circle at 50% 0%, rgba(255, 17, 0, 0.05) 0%, transparent 50%); }
        body.joyboy-mode { background-image: radial-gradient(circle at 50% 0%, rgba(255, 170, 0, 0.05) 0%, transparent 50%); }

        header { padding: 40px 20px 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        h1 { font-size: 0.8rem; letter-spacing: 5px; text-transform: uppercase; opacity: 0.5; margin: 0; }

        /* Navigazione con Immagini */
        nav {
            display: flex; justify-content: center; gap: 15px;
            padding: 30px 10px; max-width: 600px; margin: 0 auto;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 10px; cursor: pointer; transition: 0.3s;
            background: transparent; border: none; outline: none;
        }
        .nav-item .avatar {
            width: 45px; height: 45px;
            border-radius: 50%;
            border: 2px solid var(--text-dim);
            background-size: cover; background-position: center;
            filter: grayscale(100%) contrast(120%);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .nav-item span {
            font-size: 0.6rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text-dim);
        }

        /* Stati Active per Personaggi */
        .nav-item.active.zoro .avatar { border-color: var(--zoro); filter: grayscale(0%) drop-shadow(0 0 10px var(--zoro)); transform: scale(1.2); }
        .nav-item.active.shanks .avatar { border-color: var(--shanks); filter: grayscale(0%) drop-shadow(0 0 10px var(--shanks)); transform: scale(1.2); }
        .nav-item.active.joyboy .avatar { border-color: var(--joyboy); filter: grayscale(0%) drop-shadow(0 0 10px var(--joyboy)); transform: scale(1.2); }
        .nav-item.active span { color: #fff; }

        /* Container & Cards */
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .day-section { display: none; }
        .active-day { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 12px; padding: 20px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.03); position: relative;
        }

        /* JoyBoy Mode: Morbida e Gommosa */
        .joyboy-mode .card {
            border-radius: 30px; border: 2px solid rgba(255, 255, 255, 0.1);
            animation: rubber 3s infinite alternate ease-in-out;
        }
        @keyframes rubber {
            from { border-radius: 30px 40px 30px 40px; }
            to { border-radius: 40px 30px 40px 30px; }
        }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card-header h3 { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; margin: 0; }

        .timer-btn {
            background: transparent; border: 1px solid var(--primary);
            color: var(--primary); padding: 5px 12px; border-radius: 5px;
            font-size: 0.6rem; font-weight: 800; cursor: pointer;
        }

        /* Input Styles */
        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
        .input-box { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.03); padding: 5px 0; }
        .input-box input {
            background: transparent; border: none; color: #fff; width: 100%;
            font-size: 1.1rem; font-weight: 700; outline: none; text-align: right;
        }
        .input-box span { font-size: 0.55rem; color: var(--text-dim); font-weight: 800; text-transform: uppercase; }

        .chart-container { height: 50px; margin-top: 15px; opacity: 0.3; }

        /* Haki Lightning */
        .haki-lightning-svg {
            position: absolute; top: 50%; left: 50%; width: 150%; height: 150%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 100;
        }

        #timer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1,2,4,0.98); display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        #timer-val { font-size: 6rem; font-weight: 200; color: var(--primary); }
    </style>
</head>
<body class="zoro-mode">

<header>
    <h1>Haki Progression System</h1>
</header>

<nav id="dayNav">
    <button onclick="switchDay('lun', 'zoro')" id="btn-lun" class="nav-item active zoro">
        <div class="avatar" style="background-image: url('https://i.pinimg.com/736x/8f/94/a1/8f94a1d5e359990b797871b86d997d4c.jpg')"></div>
        <span>Lun</span>
    </button>
    <button onclick="switchDay('mar', 'shanks')" id="btn-mar" class="nav-item shanks">
        <div class="avatar" style="background-image: url('https://i.pinimg.com/736x/21/53/74/21537463f25608b89e602414777a8345.jpg')"></div>
        <span>Mar</span>
    </button>
    <button onclick="switchDay('mer', 'joyboy')" id="btn-mer" class="nav-item joyboy">
        <div class="avatar" style="background-image: url('https://i.pinimg.com/736x/8b/6e/0f/8b6e0f2b3e895478479900994d5b244d.jpg')"></div>
        <span>Mer</span>
    </button>
    <button onclick="switchDay('gio', 'zoro')" id="btn-gio" class="nav-item zoro">
        <div class="avatar" style="background-image: url('https://i.pinimg.com/736x/8f/94/a1/8f94a1d5e359990b797871b86d997d4c.jpg')"></div>
        <span>Gio</span>
    </button>
    <button onclick="switchDay('ven', 'shanks')" id="btn-ven" class="nav-item shanks">
        <div class="avatar" style="background-image: url('https://i.pinimg.com/736x/21/53/74/21537463f25608b89e602414777a8345.jpg')"></div>
        <span>Ven</span>
    </button>
</nav>

<div class="container" id="mainContainer"></div>

<div id="timer-overlay"><div id="timer-val">00:00</div></div>

<script>
// Logica Haki al tocco (Fulmini Neri/Rossi)
function createHakiLightning() {
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("class", "haki-lightning-svg");
    svg.setAttribute("viewBox", "0 0 200 200");
    let paths = "";
    for(let i=0; i<4; i++) {
        let x=100, y=100; let d=`M 100 100 `;
        for(let j=0; j<4; j++) {
            x += (Math.random()-0.5)*60; y += (Math.random()-0.5)*60;
            d += `L ${x} ${y} `;
        }
        paths += `<path d="${d}" stroke="black" stroke-width="3" fill="none" opacity="0.8"/>`;
        paths += `<path d="${d}" stroke="red" stroke-width="1" fill="none"/>`;
    }
    svg.innerHTML = paths;
    return svg;
}

function applyHakiEffect(e) {
    const target = e.currentTarget;
    const lightning = createHakiLightning();
    target.appendChild(lightning);
    setTimeout(() => lightning.remove(), 300);
}

// Workout Data
const workout = {
    lun: { title: "Push Alpha - Zoro", ex: [{n:"Panca Inclinata", s:4, r:90}, {n:"Chest Press", s:3, r:60}, {n:"Alzate Laterali", s:4, r:60}, {n:"Pushdown", s:4, r:60}] },
    mar: { title: "Pull Alpha - Shanks", ex: [{n:"Trazioni Zavorrate", s:5, r:120}, {n:"Rematore", s:3, r:90}, {n:"Curl EZ", s:4, r:60}, {n:"Facepull", s:3, r:60}] },
    mer: { title: "Legs - JoyBoy", ex: [{n:"Hack Squat", s:4, r:120}, {n:"Leg Press", s:3, r:90}, {n:"Leg Curl", s:4, r:60}, {n:"Calf Raise", s:4, r:60}] },
    gio: { title: "Push Beta - Zoro", ex: [{n:"Panca Piana", s:4, r:90}, {n:"Croci Cavi", s:3, r:60}, {n:"Shoulder Press", s:3, r:90}, {n:"French Press", s:3, r:60}] },
    ven: { title: "Full Beta - Shanks", ex: [{n:"Trazioni Volume", s:4, r:120}, {n:"Lat Machine", s:3, r:90}, {n:"Hammer Curl", s:3, r:60}, {n:"Curl Cavi", s:3, r:60}] }
};

let charts = {};

function init() {
    const main = document.getElementById('mainContainer');
    for(let day in workout) {
        let section = `<div id="${day}" class="day-section ${day==='lun'?'active-day':''}">`;
        workout[day].ex.forEach((e, idx) => {
            const id = `${day}_${idx}`;
            section += `
                <div class="card">
                    <div class="card-header"><h3>${e.n}</h3><button class="timer-btn" onclick="startTimer(${e.r})">${e.r}S</button></div>
                    ${Array.from({length:e.s}).map((_, s) => `
                        <div class="inputs">
                            <div class="input-box"><input type="number" id="${id}_w${s}" onchange="saveData('${id}')"><span>KG</span></div>
                            <div class="input-box"><input type="number" id="${id}_r${s}" onchange="saveData('${id}')"><span>RE</span></div>
                        </div>`).join('')}
                    <div class="chart-container"><canvas id="c_${id}"></canvas></div>
                </div>`;
        });
        main.innerHTML += section + `</div>`;
    }
    loadData();
    document.querySelectorAll('.nav-item, .timer-btn').forEach(el => {
        el.addEventListener('mousedown', applyHakiEffect);
        el.addEventListener('touchstart', applyHakiEffect);
    });
}

function switchDay(day, mode) {
    document.querySelectorAll('.day-section').forEach(s => s.classList.remove('active-day'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(day).classList.add('active-day');
    document.getElementById('btn-'+day).classList.add('active');
    document.body.className = mode + '-mode';
    window.scrollTo(0,0);
}

function startTimer(s) {
    const ov = document.getElementById('timer-overlay');
    ov.style.display = 'flex';
    let time = s;
    const interval = setInterval(() => {
        document.getElementById('timer-val').innerText = `${Math.floor(time/60)}:${(time%60).toString().padStart(2, '0')}`;
        if(time-- <= 0) { clearInterval(interval); ov.style.display = 'none'; }
    }, 1000);
    ov.onclick = () => { clearInterval(interval); ov.style.display = 'none'; };
}

function saveData(id) {
    const entry = { w: [], r: [] };
    const [day, idx] = id.split('_');
    for(let i=0; i<workout[day].ex[idx].s; i++) {
        entry.w.push(document.getElementById(`${id}_w${i}`).value || 0);
        entry.r.push(document.getElementById(`${id}_r${i}`).value || 0);
    }
    localStorage.setItem(`PirateHaki_${id}`, JSON.stringify(entry));
    updateChart(id);
}

function loadData() {
    for(let day in workout) {
        workout[day].ex.forEach((e, idx) => {
            const id = `${day}_${idx}`;
            const saved = JSON.parse(localStorage.getItem(`PirateHaki_${id}`));
            if(saved) {
                saved.w.forEach((v, i) => document.getElementById(`${id}_w${i}`).value = v);
                saved.r.forEach((v, i) => document.getElementById(`${id}_r${i}`).value = v);
            }
            updateChart(id);
        });
    }
}

function updateChart(id) {
    const ctx = document.getElementById(`c_${id}`);
    if(!ctx) return;
    const saved = JSON.parse(localStorage.getItem(`PirateHaki_${id}`));
    const data = saved ? saved.w.map((w, i) => w * saved.r[i]) : [0,0,0,0];
    if(charts[id]) charts[id].destroy();
    charts[id] = new Chart(ctx, {
        type: 'line', data: { labels:[1,2,3,4], datasets:[{data:data, borderColor:'#00f2ff', tension:0.4, pointRadius:0, borderWidth:1.5}] },
        options: { responsive:true, maintainAspectRatio:false, scales:{x:{display:false},y:{display:false}}, plugins:{legend:{display:false}} }
    });
}

window.onload = init;
</script>
</body>
</html>

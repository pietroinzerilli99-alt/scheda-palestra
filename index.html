<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayleigh Workout - Final Supreme</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(20, 20, 25, 0.95);
            --primary: #00ffaa;
            --zoro-color: #00ff88;
            --shanks-color: #ff1100;
            --luffy-color: #ffffff;
            --luffy-gold: #ffcc00;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: #fff;
            margin: 0; padding-bottom: 100px;
            overflow-x: hidden;
        }

        /* Overlay per il flash dell'Haki */
        #haki-burst-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; opacity: 0;
            transition: opacity 0.1s ease-out;
        }

        header { padding: 25px 20px; max-width: 600px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .week-selector { background: #1a1a1a; border: 1px solid #333; color: var(--primary); padding: 10px; border-radius: 8px; font-weight: 700; outline: none; }

        /* Navigazione Personaggi */
        nav { 
            display: flex; gap: 12px; padding: 15px; overflow-x: auto; 
            max-width: 600px; margin: 0 auto; justify-content: center;
        }
        .nav-item {
            background: transparent; border: none; display: flex; flex-direction: column; 
            align-items: center; gap: 8px; cursor: pointer; transition: 0.3s;
        }

        /* Riquadro con Immagine Epica */
        .char-box {
            width: 80px; height: 100px; border-radius: 14px;
            border: 2px solid #222; background-size: cover; background-position: center;
            position: relative; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: grayscale(100%) brightness(0.6);
        }

        /* Backgrounds Immagini Personaggi */
        .zoro-img { background-image: url('https://images.unsplash.com/photo-1618336753974-aae8e04506aa?auto=format&fit=crop&q=80&w=200'); } /* Rappresentazione dark spada */
        .shanks-img { background-image: url('https://images.unsplash.com/photo-1518112391136-218206300460?auto=format&fit=crop&q=80&w=200'); } /* Rappresentazione rossa */
        .luffy-img { background-image: url('https://images.unsplash.com/photo-1620336655055-088d06e7660c?auto=format&fit=crop&q=80&w=200'); } /* Rappresentazione bianca/aura */

        /* Sovrascrittura con immagini specifiche (Se vuoi caricare file locali sostituisci gli URL qui) */
        .nav-item.active .char-box { transform: scale(1.15) translateY(-5px); border-color: #fff; filter: grayscale(0%) brightness(1.1); }
        .zoro.active .char-box { border-color: var(--zoro-color); box-shadow: 0 0 25px var(--zoro-color); }
        .shanks.active .char-box { border-color: var(--shanks-color); box-shadow: 0 0 25px var(--shanks-color); }
        .luffy.active .char-box { border-color: var(--luffy-gold); box-shadow: 0 0 25px var(--luffy-gold); }

        .day-label { font-size: 0.8rem; font-weight: 800; color: #444; text-transform: uppercase; }
        .nav-item.active .day-label { color: #fff; }

        /* Container e Card Workout */
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .day-section { display: none; }
        .active-day { display: block; }

        .card { 
            background: var(--card-bg); border-radius: 16px; padding: 22px; 
            margin-bottom: 18px; border: 1px solid rgba(255,255,255,0.05); 
        }
        
        /* Animazione Luffy JoyBoy */
        .luffy-mode .card { animation: gear5 3s infinite alternate ease-in-out; }
        @keyframes gear5 { 0% { transform: scale(1); border-radius: 16px; } 100% { transform: scale(1.02); border-radius: 35px; } }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .card-header h3 { margin: 0; font-size: 1rem; color: var(--silver); letter-spacing: 0.5px; }

        .timer-btn { 
            background: transparent; color: var(--primary); border: 1px solid var(--primary); 
            padding: 7px 14px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; cursor: pointer;
        }

        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 12px; }
        .input-box { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #333; padding: 8px 0; }
        .input-box input { background: transparent; border: none; color: #fff; width: 100%; font-size: 1.3rem; outline: none; text-align: right; }
        .input-box span { font-size: 0.6rem; color: #666; font-weight: 800; }

        /* Haki Lightning solo attorno al riquadro */
        .haki-lightning-svg { 
            position: absolute; top: -20px; left: -20px; width: 140px; height: 140px; 
            pointer-events: none; z-index: 10; 
        }

        /* Timer Overlay Full Screen */
        #timer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; z-index: 10000;
        }
        #timer-display { font-size: 8rem; font-weight: 200; color: var(--primary); text-shadow: 0 0 40px var(--primary); }
    </style>
</head>
<body>

<div id="haki-burst-overlay"></div>
<div id="timer-overlay" onclick="this.style.display='none'"><div id="timer-display">00:00</div></div>

<header>
    <h1>RAYLEIGH LEGACY 5.0</h1>
    <select class="week-selector" id="weekSelect"></select>
</header>

<nav>
    <button onclick="switchDay('lun', 'zoro')" id="n-lun" class="nav-item active zoro">
        <div class="char-box zoro-img"></div>
        <span class="day-label">LUN</span>
    </button>
    <button onclick="switchDay('mar', 'shanks')" id="n-mar" class="nav-item shanks">
        <div class="char-box shanks-img"></div>
        <span class="day-label">MAR</span>
    </button>
    <button onclick="switchDay('mer', 'luffy')" id="n-mer" class="nav-item luffy">
        <div class="char-box luffy-img"></div>
        <span class="day-label">MER</span>
    </button>
    <button onclick="switchDay('gio', 'zoro')" id="n-gio" class="nav-item zoro">
        <div class="char-box zoro-img"></div>
        <span class="day-label">GIO</span>
    </button>
    <button onclick="switchDay('ven', 'shanks')" id="n-ven" class="nav-item shanks">
        <div class="char-box shanks-img"></div>
        <span class="day-label">VEN</span>
    </button>
</nav>

<div class="container" id="mainContainer"></div>

<script>
const workout = {
    lun: { char: 'zoro', ex: [{n:"Panca Inclinata", s:4, r:90}, {n:"Chest Press", s:3, r:60}, {n:"Alzate Laterali", s:4, r:60}] },
    mar: { char: 'shanks', ex: [{n:"Trazioni Zavorra", s:5, r:120}, {n:"Rematore", s:3, r:90}, {n:"Curl EZ", s:4, r:60}] },
    mer: { char: 'luffy', ex: [{n:"Hack Squat", s:4, r:120}, {n:"Leg Press", s:3, r:90}, {n:"Leg Curl", s:4, r:60}] },
    gio: { char: 'zoro', ex: [{n:"Panca Piana", s:4, r:90}, {n:"Croci Cavi", s:3, r:60}, {n:"Shoulder Press", s:3, r:90}] },
    ven: { char: 'shanks', ex: [{n:"Trazioni Volume", s:4, r:120}, {n:"Lat Machine", s:3, r:90}, {n:"Hammer Curl", s:3, r:60}] }
};

function init() {
    const main = document.getElementById('mainContainer');
    for(let day in workout) {
        let section = `<div id="${day}" class="day-section ${day==='lun'?'active-day':''} ${workout[day].char}-mode">`;
        
        // Esercizi
        workout[day].ex.forEach(e => {
            section += createCard(e.n, e.s, e.r);
        });
        
        // ADDOME & CARDIO FINALIST
        section += `<div style="margin: 30px 0 10px; font-weight: 800; font-size: 0.7rem; color: #444; letter-spacing: 2px;">FINISHER</div>`;
        section += createCard("Addome Core Supreme", 3, 60);
        section += createCard("Cardio LISS (Haki Breath)", 1, 900);
        
        main.innerHTML += section + `</div>`;
    }
    
    const ws = document.getElementById('weekSelect');
    for(let i=1; i<=16; i++) { let o=document.createElement('option'); o.value=i; o.innerText=`Week ${i}`; ws.appendChild(o); }
}

function createCard(title, sets, rest) {
    let html = `<div class="card"><div class="card-header"><h3>${title}</h3><button class="timer-btn" onclick="startTimer(${rest})">${rest<61?rest+'s':(rest/60)+'m'}</button></div>`;
    for(let i=0; i<sets; i++) {
        html += `<div class="inputs"><div class="input-box"><input type="number" placeholder="0"><span>KG</span></div><div class="input-box"><input type="number" placeholder="0"><span>REPS</span></div></div>`;
    }
    return html + `</div>`;
}

function startTimer(seconds) {
    const overlay = document.getElementById('timer-overlay');
    const display = document.getElementById('timer-display');
    overlay.style.display = 'flex';
    let t = seconds;
    const interval = setInterval(() => {
        let m = Math.floor(t/60); let s = t%60;
        display.innerText = `${m}:${s < 10 ? '0'+s : s}`;
        if(t-- <= 0) { clearInterval(interval); overlay.style.display = 'none'; }
    }, 1000);
    window.currentInterval = interval;
}

function closeTimer() {
    clearInterval(window.currentInterval);
    document.getElementById('timer-overlay').style.display = 'none';
}

function triggerHakiFlash(char) {
    const flash = document.getElementById('haki-flash-overlay');
    const colors = { zoro: 'rgba(0, 255, 136, 0.4)', shanks: 'rgba(255, 17, 0, 0.4)', luffy: 'rgba(255, 255, 255, 0.5)' };
    flash.style.backgroundColor = colors[char];
    flash.style.opacity = "1";
    setTimeout(() => flash.style.opacity = "0", 200);
}

function createLightning(target, char) {
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("class", "haki-lightning-svg");
    svg.setAttribute("viewBox", "0 0 200 200");
    let color = char === 'zoro' ? '#00ff88' : (char === 'shanks' ? '#ff0000' : '#ffffff');
    let p = "";
    for(let i=0; i<5; i++) {
        let x=100, y=100; let d=`M 100 100 `;
        for(let j=0; j<3; j++) { x+=(Math.random()-0.5)*120; y+=(Math.random()-0.5)*120; d+=`L ${x} ${y} `; }
        p += `<path d="${d}" stroke="black" stroke-width="4" fill="none"/><path d="${d}" stroke="${color}" stroke-width="1.5" fill="none"/>`;
    }
    svg.innerHTML = p;
    target.appendChild(svg);
    setTimeout(() => svg.remove(), 400);
}

function switchDay(day, char) {
    triggerHakiFlash(char);
    createLightning(document.getElementById('n-'+day).querySelector('.char-box'), char);
    document.querySelectorAll('.day-section').forEach(d => d.classList.remove('active-day'));
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById(day).classList.add('active-day');
    document.getElementById('n-'+day).classList.add('active');
    document.getElementById('main-progress-bar').style.width = (['lun','mar','mer','gio','ven'].indexOf(day)+1)*20 + "%";
}

window.onload = init;
</script>
</body>
</html>

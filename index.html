<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayleigh Haki - Supreme Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(15, 20, 25, 0.85);
            --primary: #00ffaa; 
            --zoro-color: #00ff88;
            --shanks-color: #ff1100;
            --luffy-color: #ffffff;
            --haki-flash: transparent;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
            margin: 0; padding-bottom: 80px;
            overflow-x: hidden;
            transition: background-color 0.1s;
        }

        /* Haki Flash Overlay */
        #haki-flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; opacity: 0;
            transition: opacity 0.1s;
        }

        header { padding: 30px 20px; max-width: 600px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .week-selector { background: #111; border: 1px solid #333; color: var(--primary); padding: 8px 12px; border-radius: 6px; font-weight: 700; outline: none; }

        /* Navigazione */
        nav { display: flex; gap: 8px; padding: 15px; overflow-x: auto; max-width: 600px; margin: 0 auto; justify-content: center; scrollbar-width: none; }
        .nav-item {
            background: transparent; border: none;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer; min-width: 90px; transition: 0.3s;
        }

        .char-box {
            width: 75px; height: 75px; border-radius: 16px;
            border: 2px solid #222; background: #080808;
            display: flex; align-items: center; justify-content: center;
            position: relative; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-item.active .char-box { transform: scale(1.1) translateY(-5px); border-color: #fff; box-shadow: 0 0 25px rgba(255,255,255,0.1); }

        /* Icon Styles Specific */
        .zoro.active .char-box { border-color: var(--zoro-color); box-shadow: 0 0 30px rgba(0, 255, 136, 0.3); }
        .shanks.active .char-box { border-color: var(--shanks-color); box-shadow: 0 0 30px rgba(255, 17, 0, 0.3); }
        .luffy.active .char-box { border-color: #fff; box-shadow: 0 0 30px rgba(255, 255, 255, 0.4); }

        .day-label { font-size: 0.75rem; font-weight: 700; color: #475569; text-transform: uppercase; }
        .nav-item.active .day-label { color: #fff; }
        .legend-title { font-size: 0.55rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.4; text-align: center; }
        .nav-item.active .legend-title { opacity: 1; }

        /* Container & Cards */
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .day-section { display: none; }
        .active-day { display: block; }

        .card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 12px; padding: 22px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Luffy Gear 5 Rubber Animation */
        .luffy-mode .card { animation: rubber 3s infinite alternate ease-in-out; }
        @keyframes rubber { 0% { border-radius: 15px; } 100% { border-radius: 40px; transform: rotate(0.5deg) scale(1.01); } }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-header h3 { margin: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: #fff; }

        .timer-btn { background: transparent; color: var(--primary); border: 1px solid var(--primary); padding: 5px 12px; border-radius: 6px; font-size: 0.65rem; font-weight: 700; }

        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        .input-box { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #222; padding: 6px 0; }
        .input-box input { background: transparent; border: none; color: #fff; width: 100%; font-size: 1.2rem; outline: none; text-align: right; }
        .input-box span { font-size: 0.6rem; color: #475569; font-weight: 700; }

        /* Haki Lightning */
        .haki-lightning-svg { position: absolute; top: 50%; left: 50%; width: 200%; height: 200%; transform: translate(-50%, -50%); pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="haki-flash-overlay"></div>

<header>
    <div style="font-weight: 700; letter-spacing: 3px; font-size: 0.8rem; opacity: 0.4;">SYSTEM 3.0</div>
    <select class="week-selector" id="weekSelect" onchange="loadWeekData()"></select>
</header>

<nav id="dayNav">
    <button onclick="switchDay('lun', 'zoro')" id="n-lun" class="nav-item active zoro">
        <div class="char-box">
            <svg viewBox="0 0 100 100" width="55" height="55">
                <path d="M20 80 L80 20 M20 20 L80 80 M50 10 L50 90" stroke="var(--zoro-color)" stroke-width="3" stroke-linecap="round"/>
                <circle cx="50" cy="50" r="15" stroke="var(--zoro-color)" stroke-width="1" fill="none" opacity="0.5">
                    <animate attributeName="r" values="15;20;15" dur="2s" repeatCount="indefinite" />
                </circle>
            </svg>
        </div>
        <span class="day-label">Lun</span>
        <span class="legend-title" style="color:var(--zoro-color)">King of Hell</span>
    </button>

    <button onclick="switchDay('mar', 'shanks')" id="n-mar" class="nav-item shanks">
        <div class="char-box">
            <svg viewBox="0 0 100 100" width="55" height="55">
                <path d="M35 30 L45 70 M50 25 L60 75 M65 30 L75 70" stroke="var(--shanks-color)" stroke-width="4" stroke-linecap="round"/>
                <path d="M20 85 L80 85" stroke="#444" stroke-width="6" stroke-linecap="round"/>
            </svg>
        </div>
        <span class="day-label">Mar</span>
        <span class="legend-title" style="color:var(--shanks-color)">Akagami</span>
    </button>

    <button onclick="switchDay('mer', 'luffy')" id="n-mer" class="nav-item luffy">
        <div class="char-box">
            <svg viewBox="0 0 100 100" width="55" height="55">
                <path d="M30 50 Q50 10 70 50 Q90 60 70 80 Q50 95 30 80 Q10 60 30 50" fill="none" stroke="white" stroke-width="3"/>
                <path d="M35 65 Q50 75 65 65" stroke="white" stroke-width="2" fill="none"/>
                <circle cx="50" cy="50" r="35" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="5,5">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite" />
                </circle>
            </svg>
        </div>
        <span class="day-label">Mer</span>
        <span class="legend-title" style="color:#fff">God of Liberation</span>
    </button>

    <button onclick="switchDay('gio', 'zoro')" id="n-gio" class="nav-item zoro">
        <div class="char-box">
            <svg viewBox="0 0 100 100" width="40" height="40">
                <path d="M20 80 L80 20 M20 20 L80 80 M50 10 L50 90" stroke="var(--zoro-color)" stroke-width="3" stroke-linecap="round"/>
            </svg>
        </div>
        <span class="day-label">Gio</span>
        <span class="legend-title" style="color:var(--zoro-color)">King of Hell</span>
    </button>

    <button onclick="switchDay('ven', 'shanks')" id="n-ven" class="nav-item shanks">
        <div class="char-box">
            <svg viewBox="0 0 100 100" width="40" height="40">
                <path d="M35 30 L45 70 M50 25 L60 75 M65 30 L75 70" stroke="var(--shanks-color)" stroke-width="4" stroke-linecap="round"/>
            </svg>
        </div>
        <span class="day-label">Ven</span>
        <span class="legend-title" style="color:var(--shanks-color)">Akagami</span>
    </button>
</nav>

<div class="container" id="mainContainer"></div>

<script>
// EFFETTO HAKI SUPREMO
function triggerHakiBurst(charType) {
    const flash = document.getElementById('haki-flash-overlay');
    let color = "#ffffff";
    if(charType === 'zoro') color = "rgba(0, 255, 136, 0.4)";
    if(charType === 'shanks') color = "rgba(255, 17, 0, 0.4)";
    if(charType === 'luffy') color = "rgba(255, 255, 255, 0.5)";

    flash.style.backgroundColor = color;
    flash.style.opacity = "1";
    
    // Scossa dello schermo
    document.body.style.transform = `translate(${(Math.random()-0.5)*10}px, ${(Math.random()-0.5)*10}px)`;

    setTimeout(() => {
        flash.style.opacity = "0";
        document.body.style.transform = "translate(0,0)";
    }, 200);
}

function createLightning(charType) {
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("class", "haki-lightning-svg");
    svg.setAttribute("viewBox", "0 0 200 200");
    let color = charType === 'zoro' ? '#00ff88' : (charType === 'shanks' ? '#ff0000' : '#ffffff');
    let paths = "";
    for(let i=0; i<6; i++) {
        let x=100, y=100; let d=`M 100 100 `;
        for(let j=0; j<4; j++) { x+=(Math.random()-0.5)*100; y+=(Math.random()-0.5)*100; d+=`L ${x} ${y} `; }
        paths += `<path d="${d}" stroke="black" stroke-width="5" fill="none" opacity="0.7"/><path d="${d}" stroke="${color}" stroke-width="1.5" fill="none"/>`;
    }
    svg.innerHTML = paths; return svg;
}

// Inizializzazione Workout (Dati semplificati per brevità)
const workout = {
    lun: { char: 'zoro', ex: [{n:"Panca Inclinata", s:4, r:90}, {n:"Chest Press", s:3, r:60}, {n:"Alzate Laterali", s:4, r:60}] },
    mar: { char: 'shanks', ex: [{n:"Trazioni Zavorra", s:5, r:120}, {n:"Rematore", s:3, r:90}, {n:"Curl EZ", s:4, r:60}] },
    mer: { char: 'luffy', ex: [{n:"Hack Squat", s:4, r:120}, {n:"Leg Press", s:3, r:90}, {n:"Leg Curl", s:4, r:60}] },
    gio: { char: 'zoro', ex: [{n:"Panca Piana", s:4, r:90}, {n:"Croci Cavi", s:3, r:60}, {n:"Shoulder Press", s:3, r:90}] },
    ven: { char: 'shanks', ex: [{n:"Trazioni Volume", s:4, r:120}, {n:"Lat Machine", s:3, r:90}, {n:"Hammer Curl", s:3, r:60}] }
};

function init() {
    const main = document.getElementById('mainContainer');
    for(let day in workout) {
        let section = `<div id="${day}" class="day-section ${day==='lun'?'active-day':''} ${workout[day].char}-mode">`;
        workout[day].ex.forEach((e, idx) => {
            const id = `${day}_${idx}`;
            section += `<div class="card"><div class="card-header"><h3>${e.n}</h3><button class="timer-btn">${e.r}s</button></div>`;
            for(let s=0; s<e.s; s++) { section += `<div class="inputs"><div class="input-box"><input type="number" placeholder="0"><span>KG</span></div><div class="input-box"><input type="number" placeholder="0"><span>RE</span></div></div>`; }
            section += `</div>`;
        });
        main.innerHTML += section + `</div>`;
    }
    
    // Settimane
    const ws = document.getElementById('weekSelect');
    for(let i=1; i<=16; i++) { let o = document.createElement('option'); o.value=i; o.innerText=`Week ${i}`; ws.appendChild(o); }
}

function switchDay(day, charType) {
    // Effetti Haki
    triggerHakiBurst(charType);
    const bolt = createLightning(charType);
    document.getElementById('n-'+day).appendChild(bolt);
    setTimeout(() => bolt.remove(), 400);

    // Cambio Pagina
    document.querySelectorAll('.day-section').forEach(d => d.classList.remove('active-day'));
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById(day).classList.add('active-day');
    document.getElementById('n-'+day).classList.add('active');
    window.scrollTo(0,0);
}

window.onload = init;
</script>
</body>
</html>

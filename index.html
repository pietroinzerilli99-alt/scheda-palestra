<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGNI SINGOLO GIORNO - PERSISTENT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card-bg: #0d0d0f; --primary: #00ffaa; --zoro: #00ff88; --shanks: #ff1100; --luffy: #ffcc00; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--bg); color: #fff; margin: 0; padding-bottom: 100px; overflow-x: hidden; }

        @keyframes quake { 0% { transform: translate(0,0); } 25% { transform: translate(-3px, 3px); } 50% { transform: translate(3px, -3px); } 100% { transform: translate(0,0); } }
        .quake-active { animation: quake 0.08s infinite !important; }

        header { padding: 25px 20px; text-align: center; }
        .main-title { font-weight: 900; letter-spacing: 10px; font-size: 1.1rem; text-transform: uppercase; margin-bottom: 15px; }
        .week-select { background: #111; border: 1px solid #333; color: var(--primary); padding: 12px; border-radius: 12px; font-weight: 800; width: 95%; text-align: center; outline: none; appearance: none; }

        nav { display: flex; gap: 15px; padding: 20px; overflow-x: auto; position: sticky; top: 0; z-index: 1000; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid #1a1a1a; }
        nav::-webkit-scrollbar { display: none; }
        .nav-item { flex: 0 0 auto; background: transparent; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0.4; transition: 0.3s; }
        .nav-item.active { opacity: 1; transform: scale(1.1); }
        .char-frame { width: 70px; height: 95px; border-radius: 15px; border: 2px solid #1a1a1a; background: #050505; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .active .char-frame { border-color: #fff; }

        .scar-container { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; pointer-events: none; opacity: 0; }
        .scar-line { width: 2px; height: 0; background: var(--shanks); margin: 0 3px; transform: rotate(20deg); box-shadow: 0 0 10px var(--shanks); }
        .animate-scars { opacity: 1; animation: fadeOut 0.8s forwards; }
        .animate-scars .scar-line { animation: slashDown 0.3s ease-out forwards; }
        @keyframes slashDown { from { height: 0; } to { height: 60px; } }
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }

        .haki-svg-container { position: absolute; inset: -40px; pointer-events: none; z-index: 20; width: 150px; height: 175px; }
        .lightning-path { fill: none; stroke-width: 2.5; stroke-linecap: round; filter: drop-shadow(0 0 5px currentColor); animation: flash 0.4s ease-out forwards; }
        @keyframes flash { 0% { opacity: 1; stroke-dasharray: 100; stroke-dashoffset: 100; } 100% { opacity: 0; stroke-dashoffset: 0; } }

        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid #1a1a1a; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card-header h3 { margin: 0; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; color: #fff; display: flex; align-items: center; gap: 8px; }

        .timer-inline { background: #151518; border-radius: 12px; padding: 8px 12px; display: flex; align-items: center; gap: 10px; border: 1px solid #333; }
        .timer-display { font-family: monospace; font-size: 1.1rem; font-weight: bold; color: var(--primary); min-width: 40px; text-align: center; cursor: pointer; }
        .timer-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 1rem; padding: 0; }
        .timer-btn:disabled { opacity: 0.2; }
        .reset-btn { font-size: 0.7rem; color: #444; cursor: pointer; border: none; background: none; }

        .set-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
        .input-box { flex: 1; background: #151518; border-radius: 12px; padding: 10px; display: flex; align-items: center; border: 1px solid #222; }
        .input-box input { background: transparent; border: none; color: #fff; width: 100%; text-align: right; outline: none; font-weight: 700; font-size: 1.1rem; }
        .input-box span { font-size: 0.6rem; color: #444; margin-left: 5px; font-weight: 800; }
        
        .chart-box { height: 100px; margin-top: 20px; border-top: 1px solid #1a1a1a; padding-top: 15px; }
        .add-ex-btn { width: 100%; padding: 20px; background: #0a0a0a; border: 2px dashed #222; color: #555; border-radius: 18px; font-weight: 800; margin-top: 10px; cursor: pointer; }
        .quote-box { padding: 50px 30px; text-align: center; }
        #quote-text { font-style: italic; font-size: 1.1rem; color: #aaa; line-height: 1.6; }
    </style>
</head>
<body>

<header>
    <div class="main-title">OGNI SINGOLO GIORNO</div>
    <select id="weekSelector" class="week-select" onchange="renderWorkout()"></select>
</header>

<nav id="navbar"></nav>

<div id="shake-wrapper">
    <div class="container" id="workout-area"></div>
    <div class="quote-box">
        <p id="quote-text"></p>
        <span id="quote-author" style="font-weight: 800; font-size: 0.75rem; color: var(--primary); text-transform: uppercase; letter-spacing: 4px;"></span>
    </div>
</div>

<script>
const quotesDB = {
    zoro: ["Settimana 1: Se non riesci a proteggere il tuo capitano, la tua ambizione è nulla.", "Settimana 16: ORA SONO IO L'INFERNO."],
    shanks: ["Settimana 1: Scommetto sul futuro.", "Settimana 16: Il mondo è pronto per te?"],
    luffy: ["Settimana 1: Diventerò il Re dei Pirati!", "Settimana 16: GEAR FIFTH! QUESTO È IL MIO APICE!"]
};

const defaultData = {
    lun: { char: 'zoro', icon: '⚔️', color: '#00ff88', abs: 'Leg Raises (Sbarra)', ex: [{n:"Panca Inclinata", s:4, r:90}, {n:"Chest Press", s:3, r:60}, {n:"Alzate Laterali", s:4, r:60}] },
    mar: { char: 'shanks', icon: '🍷', color: '#ff1100', abs: 'Cable Crunch', ex: [{n:"Trazioni Zavorra", s:5, r:120}, {n:"Rematore", s:3, r:90}, {n:"Curl EZ", s:4, r:60}] },
    mer: { char: 'luffy', icon: '🍖', color: '#ffcc00', abs: 'Ab Wheel Rollout', ex: [{n:"Pendulum Squat", s:4, r:120}, {n:"Leg Press", s:3, r:90}, {n:"Stacchi", s:4, r:120}, {n:"Leg Extension", s:3, r:60}] },
    gio: { char: 'zoro', icon: '⚔️', color: '#00ff88', abs: 'Leg Raises (Sbarra)', ex: [{n:"Panca Piana", s:4, r:90}, {n:"Croci Cavi", s:3, r:60}, {n:"Shoulder Press", s:3, r:90}] },
    ven: { char: 'shanks', icon: '🍷', color: '#ff1100', abs: 'Cable Crunch', ex: [{n:"Trazioni Volume", s:4, r:120}, {n:"Lat Machine", s:3, r:90}, {n:"Hammer Curl", s:3, r:60}] }
};

let workoutData = JSON.parse(localStorage.getItem('workout_structure_v5')) || defaultData;
let activeTimer = null;
let currentDay = 'lun';

function init() {
    const nav = document.getElementById('navbar');
    for(let i=1; i<=16; i++) {
        let opt = document.createElement('option'); opt.value = i; opt.innerText = `SETTIMANA ${i}`;
        document.getElementById('weekSelector').appendChild(opt);
    }
    for(let day in workoutData) {
        nav.innerHTML += `<button onclick="setDay('${day}')" id="btn-${day}" class="nav-item">
            <div class="char-frame" id="frame-${day}">
                <div class="scar-container" id="scars-${day}"><div class="scar-line"></div><div class="scar-line"></div><div class="scar-line"></div></div>
                <span style="font-size:1.8rem">${workoutData[day].icon}</span>
            </div>
            <span style="font-size:0.6rem; font-weight:800; color:#555">${day.toUpperCase()}</span></button>`;
    }
    checkPersistentTimer();
    setDay('lun');
}

function setDay(day) {
    currentDay = day;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-'+day).classList.add('active');
    triggerHaki(day);
    renderWorkout(day);
}

function triggerHaki(day) {
    const wrap = document.getElementById('shake-wrapper');
    const char = workoutData[day].char;
    const frame = document.getElementById('frame-'+day);
    wrap.classList.add('quake-active');
    if(char === 'shanks') document.getElementById('scars-'+day).classList.add('animate-scars');
    
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("class", "haki-svg-container");
    frame.appendChild(svg);
    for(let i=0; i<(char==='luffy'?12:6); i++) {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", "lightning-path"); path.setAttribute("stroke", workoutData[day].color);
        let x=75, y=85, d=`M ${x} ${y} `;
        for(let j=0; j<3; j++) { x+=(Math.random()-0.5)*100; y+=(Math.random()-0.5)*100; d+=`L ${x} ${y} `; }
        path.setAttribute("d", d); svg.appendChild(path);
    }
    setTimeout(() => { 
        wrap.classList.remove('quake-active'); 
        if(char === 'shanks') document.getElementById('scars-'+day).classList.remove('animate-scars');
        svg.remove();
    }, char === 'luffy' ? 1400 : 600);
}

function renderWorkout(day = currentDay) {
    const area = document.getElementById('workout-area');
    const week = document.getElementById('weekSelector').value;
    area.innerHTML = '';
    
    workoutData[day].ex.forEach((ex, idx) => area.appendChild(createCard(ex, idx, day)));
    
    area.innerHTML += `<div style="text-align:center; color:#222; font-size:0.6rem; letter-spacing:5px; margin:40px 0; font-weight:900;">DAILY FINISHERS</div>`;
    area.appendChild(createCard({n: workoutData[day].abs, s:3, r:60}, 'abs', day));
    area.appendChild(createCard({n: "Cardio LISS (10 min)", s:1, r:600}, 'cardio', day));
    
    area.innerHTML += `<button class="add-ex-btn" onclick="addNewExercise('${day}')">+ AGGIUNGI ESERCIZIO</button>`;
    
    const char = workoutData[day].char;
    document.getElementById('quote-text').innerText = quotesDB[char][week-1] || quotesDB[char][0];
    document.getElementById('quote-author').innerText = char;
}

function createCard(ex, idx, day) {
    const week = document.getElementById('weekSelector').value;
    const card = document.createElement('div'); card.className = 'card';
    let isSpecial = (idx === 'abs' || idx === 'cardio');

    let html = `<div class="card-header">
        <h3>${ex.n} ${!isSpecial ? `<button class="edit-btn" style="background:none; border:none; color:#444;" onclick="editExName('${day}', ${idx})">✎</button>` : ''}</h3>
        <div class="timer-inline">
            <button class="reset-btn" onclick="resetTimer('${idx}', ${ex.r})">↺</button>
            <span class="timer-display" id="t-val-${idx}" onclick="editTimerVal('${day}', '${idx}')">${ex.r}s</span>
            <button class="timer-btn" id="t-btn-${idx}" onclick="startTimer('${idx}', ${ex.r})">▶</button>
        </div>
    </div>`;

    for(let i=1; i<=ex.s; i++) {
        const key = `w${week}-${day}-${idx}-s${i}`;
        const saved = JSON.parse(localStorage.getItem(key)) || {kg:'', reps:''};
        html += `<div class="set-row">
            <div style="font-size:0.6rem; width:15px; font-weight:800; color:#333;">${i}</div>
            <div class="input-box"><input type="number" value="${saved.kg}" oninput="saveSet('${day}', '${idx}', ${i}, 'kg', this.value)"><span>KG</span></div>
            <div class="input-box"><input type="number" value="${saved.reps}" oninput="saveSet('${day}', '${idx}', ${i}, 'reps', this.value)"><span>REPS</span></div>
        </div>`;
    }
    
    html += `<div class="chart-box"><canvas id="chart-${day}-${idx}"></canvas></div>`;
    card.innerHTML = html;
    setTimeout(() => drawChart(day, idx), 50);
    return card;
}

function startTimer(idx, seconds) {
    if(activeTimer && activeTimer.idx !== idx) return;
    const btn = document.getElementById(`t-btn-${idx}`);
    const display = document.getElementById(`t-val-${idx}`);

    if(activeTimer && activeTimer.idx === idx) {
        if(activeTimer.running) { 
            clearInterval(activeTimer.int); 
            activeTimer.running = false; 
            btn.innerText = "▶"; 
            localStorage.removeItem('persistent_timer');
        } else { 
            resumeTimer(idx, seconds);
        }
        return;
    }

    document.querySelectorAll('.timer-btn').forEach(b => { if(b.id !== `t-btn-${idx}`) b.disabled = true; });
    btn.innerText = "Ⅱ";
    const endTime = Date.now() + (seconds * 1000);
    localStorage.setItem('persistent_timer', JSON.stringify({idx, endTime, original: seconds}));
    
    activeTimer = { idx, time: seconds, running: true, int: setInterval(() => tick(idx, seconds), 1000) };
}

function tick(idx, original) {
    const display = document.getElementById(`t-val-${idx}`);
    const btn = document.getElementById(`t-btn-${idx}`);
    const data = JSON.parse(localStorage.getItem('persistent_timer'));
    if(!data) return;

    const remaining = Math.round((data.endTime - Date.now()) / 1000);
    if(remaining <= 0) {
        clearInterval(activeTimer.int);
        if(display) display.innerText = original + "s";
        if(btn) btn.innerText = "▶";
        activeTimer = null;
        localStorage.removeItem('persistent_timer');
        document.querySelectorAll('.timer-btn').forEach(b => b.disabled = false);
        new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
    } else {
        if(display) display.innerText = remaining + "s";
        activeTimer.time = remaining;
    }
}

function checkPersistentTimer() {
    const data = JSON.parse(localStorage.getItem('persistent_timer'));
    if(data) {
        const remaining = Math.round((data.endTime - Date.now()) / 1000);
        if(remaining > 0) {
            activeTimer = { idx: data.idx, time: remaining, running: true, int: setInterval(() => tick(data.idx, data.original), 1000) };
        } else {
            localStorage.removeItem('persistent_timer');
        }
    }
}

function resetTimer(idx, original) {
    if(activeTimer && activeTimer.idx === idx) {
        clearInterval(activeTimer.int);
        activeTimer = null;
        localStorage.removeItem('persistent_timer');
        document.querySelectorAll('.timer-btn').forEach(b => b.disabled = false);
    }
    const display = document.getElementById(`t-val-${idx}`);
    const btn = document.getElementById(`t-btn-${idx}`);
    if(display) display.innerText = original + "s";
    if(btn) btn.innerText = "▶";
}

function editTimerVal(day, idx) {
    const newVal = prompt("Nuovo tempo recupero (secondi):");
    if(newVal) {
        if(idx === 'abs' || idx === 'cardio') return; 
        workoutData[day].ex[idx].r = parseInt(newVal);
        localStorage.setItem('workout_structure_v5', JSON.stringify(workoutData));
        renderWorkout(day);
    }
}

function editExName(day, idx) {
    const n = prompt("Nuovo nome esercizio:", workoutData[day].ex[idx].n);
    if(n) {
        workoutData[day].ex[idx].n = n;
        localStorage.setItem('workout_structure_v5', JSON.stringify(workoutData));
        renderWorkout(day);
    }
}

function addNewExercise(day) {
    const input = prompt("Inserisci 'Nome, Serie' (es: Panca, 4):");
    if(input && input.includes(',')) {
        const [n, s] = input.split(',');
        workoutData[day].ex.push({n: n.trim(), s: parseInt(s.trim()), r: 90});
        localStorage.setItem('workout_structure_v5', JSON.stringify(workoutData));
        renderWorkout(day);
    } else if(input) {
        alert("Formato errato! Usa: Nome, Serie");
    }
}

function saveSet(day, exIdx, setIdx, type, val) {
    const week = document.getElementById('weekSelector').value;
    const key = `w${week}-${day}-${exIdx}-s${setIdx}`;
    let d = JSON.parse(localStorage.getItem(key)) || {kg:'', reps:''};
    d[type] = val; localStorage.setItem(key, JSON.stringify(d)); drawChart(day, exIdx);
}

function drawChart(day, idx) {
    const canvas = document.getElementById(`chart-${day}-${idx}`);
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const pts = [];
    for(let w=1; w<=16; w++) {
        const d = JSON.parse(localStorage.getItem(`w${w}-${day}-${idx}-s1`));
        pts.push(d && d.kg ? parseFloat(d.kg) : 0);
    }
    if(window['c'+day+idx]) window['c'+day+idx].destroy();
    window['c'+day+idx] = new Chart(ctx, {
        type: 'line', data: { labels: Array.from({length:16},(_,i)=>i+1), datasets: [{ data: pts, borderColor: workoutData[day].color, borderWidth: 2, tension: 0.4, pointRadius: 0, fill: false }] },
        options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
    });
}

window.onload = init;
</script>
</body>
</html>

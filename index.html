<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayleigh Workout - Haki Definitive</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(15, 20, 25, 0.9);
            --primary: #00ffaa; 
            --zoro-color: #00ff88;
            --shanks-color: #ff1100;
            --luffy-color: #ffffff;
            --luffy-gold: #ffaa00;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
            margin: 0; padding-bottom: 100px;
            overflow-x: hidden;
        }

        #haki-flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; opacity: 0; transition: opacity 0.1s;
        }

        header { padding: 25px 20px 10px; max-width: 600px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .week-selector { background: #111; border: 1px solid #333; color: var(--primary); padding: 8px; border-radius: 6px; font-weight: 700; font-size: 0.7rem; }

        /* Navigazione - Giorni Sempre Visibili */
        nav { 
            display: flex; gap: 10px; padding: 15px; overflow-x: auto; 
            max-width: 600px; margin: 0 auto; justify-content: space-around; 
            background: rgba(0,0,0,0.5); border-radius: 20px;
        }
        .nav-item {
            background: transparent; border: none; display: flex; flex-direction: column; 
            align-items: center; gap: 6px; cursor: pointer; transition: 0.3s;
        }

        .char-box {
            width: 70px; height: 70px; border-radius: 15px;
            border: 2px solid #222; background: #0a0a0a;
            display: flex; align-items: center; justify-content: center;
            position: relative; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-item.active .char-box { transform: scale(1.1); border-color: #fff; }
        .zoro.active .char-box { border-color: var(--zoro-color); box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }
        .shanks.active .char-box { border-color: var(--shanks-color); box-shadow: 0 0 20px rgba(255, 17, 0, 0.4); }
        .luffy.active .char-box { border-color: var(--luffy-gold); box-shadow: 0 0 20px rgba(255, 170, 0, 0.4); }

        .day-label { font-size: 0.7rem; font-weight: 800; color: #444; text-transform: uppercase; }
        .nav-item.active .day-label { color: #fff; }

        /* Cards Esercizi */
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .day-section { display: none; }
        .active-day { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--glass); border-radius: 15px; padding: 20px; 
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); 
        }
        
        .luffy-mode .card { animation: rubber 4s infinite alternate; }
        @keyframes rubber { 0% { border-radius: 15px; } 100% { border-radius: 35px; } }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card-header h3 { margin: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        .timer-btn { 
            background: transparent; color: var(--primary); border: 1px solid var(--primary); 
            padding: 6px 12px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; cursor: pointer;
        }

        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
        .input-box { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #222; padding: 5px 0; }
        .input-box input { background: transparent; border: none; color: #fff; width: 100%; font-size: 1.1rem; outline: none; text-align: right; }
        .input-box span { font-size: 0.55rem; color: #555; font-weight: 800; }

        /* Haki Orbital */
        .haki-lightning-svg { position: absolute; top: 50%; left: 50%; width: 160%; height: 160%; transform: translate(-50%, -50%); pointer-events: none; }

        /* Timer Overlay */
        #timer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 10000;
        }
        #timer-val { font-size: 6rem; font-weight: 200; color: var(--primary); }
    </style>
</head>
<body>

<div id="haki-flash-overlay"></div>
<div id="timer-overlay"><div id="timer-val">00:00</div></div>

<header>
    <div style="font-weight: 800; letter-spacing: 2px; font-size: 0.7rem; opacity: 0.5;">RAYLEIGH TRAINING</div>
    <select class="week-selector" id="weekSelect" onchange="loadWeekData()"></select>
</header>

<nav>
    <button onclick="switchDay('lun', 'zoro')" id="n-lun" class="nav-item active zoro">
        <div class="char-box">
            <svg viewBox="0 0 100 100" width="50" height="50">
                <path d="M20 80 L80 20 M20 20 L80 80 M50 10 L50 90" stroke="var(--zoro-color)" stroke-width="4" stroke-linecap="round"/>
            </svg>
        </div>
        <span class="day-label">Lun</span>
    </button>

    <button onclick="switchDay('mar', 'shanks')" id="n-mar" class="nav-item shanks">
        <div class="char-box">
            <svg viewBox="0 0 100 100" width="50" height="50">
                <path d="M35 20 L45 80 M50 15 L60 85 M65 20 L75 80" stroke="var(--shanks-color)" stroke-width="5" stroke-linecap="round"/>
            </svg>
        </div>
        <span class="day-label">Mar</span>
    </button>

    <button onclick="switchDay('mer', 'luffy')" id="n-mer" class="nav-item luffy">
        <div class="char-box">
            <svg viewBox="0 0 100 100" width="55" height="55">
                <ellipse cx="50" cy="65" rx="35" ry="12" fill="none" stroke="var(--luffy-gold)" stroke-width="3"/>
                <path d="M30 63 Q50 35 70 63" fill="none" stroke="var(--luffy-gold)" stroke-width="3"/>
                <path d="M20 50 Q50 10 80 50 Q95 70 50 85 Q5 70 20 50" fill="none" stroke="white" stroke-width="2" stroke-dasharray="4,2">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="8s" repeatCount="indefinite" />
                </path>
            </svg>
        </div>
        <span class="day-label">Mer</span>
    </button>

    <button onclick="switchDay('gio', 'zoro')" id="n-gio" class="nav-item zoro">
        <div class="char-box">
            <svg viewBox="0 0 100 100" width="40" height="40">
                <path d="M20 80 L80 20 M20 20 L80 80 M50 10 L50 90" stroke="var(--zoro-color)" stroke-width="3" stroke-linecap="round"/>
            </svg>
        </div>
        <span class="day-label">Gio</span>
    </button>

    <button onclick="switchDay('ven', 'shanks')" id="n-ven" class="nav-item shanks">
        <div class="char-box">
            <svg viewBox="0 0 100 100" width="40" height="40">
                <path d="M35 20 L45 80 M50 15 L60 85 M65 20 L75 80" stroke="var(--shanks-color)" stroke-width="4" stroke-linecap="round"/>
            </svg>
        </div>
        <span class="day-label">Ven</span>
    </button>
</nav>

<div class="container" id="mainContainer"></div>

<script>
const workout = {
    lun: { char: 'zoro', ex: [{n:"Panca Inclinata", s:4, r:90}, {n:"Chest Press", s:3, r:60}, {n:"Alzate Laterali", s:4, r:60}, {n:"Pushdown", s:4, r:60}] },
    mar: { char: 'shanks', ex: [{n:"Trazioni Zavorra", s:5, r:120}, {n:"Rematore", s:3, r:90}, {n:"Curl EZ", s:4, r:60}, {n:"Facepull", s:3, r:60}] },
    mer: { char: 'luffy', ex: [{n:"Hack Squat", s:4, r:120}, {n:"Leg Press", s:3, r:90}, {n:"Leg Curl", s:4, r:60}, {n:"Calf Raise", s:4, r:60}] },
    gio: { char: 'zoro', ex: [{n:"Panca Piana", s:4, r:90}, {n:"Croci Cavi", s:3, r:60}, {n:"Shoulder Press", s:3, r:90}, {n:"French Press", s:3, r:60}] },
    ven: { char: 'shanks', ex: [{n:"Trazioni Volume", s:4, r:120}, {n:"Lat Machine", s:3, r:90}, {n:"Hammer Curl", s:3, r:60}, {n:"Curl Cavi", s:3, r:60}] }
};

function init() {
    const main = document.getElementById('mainContainer');
    for(let day in workout) {
        let section = `<div id="${day}" class="day-section ${day==='lun'?'active-day':''} ${workout[day].char}-mode">`;
        
        // Esercizi principali
        workout[day].ex.forEach((e, idx) => {
            section += createCard(e.n, e.s, e.r);
        });
        
        // ADDOME E CARDIO CON TIMER
        section += `<div style="margin-top:40px; opacity:0.6; font-size:0.7rem; font-weight:800; letter-spacing:2px; margin-bottom:10px;">FINISHER</div>`;
        section += createCard("Addome Core Mix", 3, 60);
        section += createCard("Cardio LISS", 1, 900); // 900s = 15min
        
        main.innerHTML += section + `</div>`;
    }
    
    const ws = document.getElementById('weekSelect');
    for(let i=1; i<=16; i++) { let o = document.createElement('option'); o.value=i; o.innerText=`Week ${i}`; ws.appendChild(o); }
}

function createCard(name, sets, rest) {
    let card = `<div class="card"><div class="card-header"><h3>${name}</h3><button class="timer-btn" onclick="startTimer(${rest})">${rest < 61 ? rest+'s' : Math.floor(rest/60)+'min'}</button></div>`;
    for(let i=0; i<sets; i++) {
        card += `<div class="inputs"><div class="input-box"><input type="number" placeholder="0"><span>KG / INT</span></div><div class="input-box"><input type="number" placeholder="0"><span>REPS</span></div></div>`;
    }
    return card + `</div>`;
}

function startTimer(s) {
    const ov = document.getElementById('timer-overlay');
    const val = document.getElementById('timer-val');
    ov.style.display = 'flex';
    let time = s;
    const interval = setInterval(() => {
        let m = Math.floor(time/60); let sec = time%60;
        val.innerText = `${m}:${sec < 10 ? '0'+sec : sec}`;
        if(time-- <= 0) { clearInterval(interval); ov.style.display = 'none'; }
    }, 1000);
    ov.onclick = () => { clearInterval(interval); ov.style.display = 'none'; };
}

function triggerHakiBurst(charType) {
    const flash = document.getElementById('haki-flash-overlay');
    const colors = { zoro: 'rgba(0, 255, 136, 0.4)', shanks: 'rgba(255, 17, 0, 0.4)', luffy: 'rgba(255, 255, 255, 0.5)' };
    flash.style.backgroundColor = colors[charType];
    flash.style.opacity = "1";
    setTimeout(() => flash.style.opacity = "0", 150);
}

function switchDay(day, char) {
    triggerHakiBurst(char);
    document.querySelectorAll('.day-section').forEach(d => d.classList.remove('active-day'));
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById(day).classList.add('active-day');
    document.getElementById('n-'+day).classList.add('active');
    window.scrollTo(0,0);
}

window.onload = init;
</script>
</body>
</html>

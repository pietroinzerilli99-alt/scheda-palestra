<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayleigh Workout - Diario Leggendario</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; 
            --surface: #0a0a0a; 
            --primary: #c5a059; /* Oro Rayleigh sutil */
            --text: #ffffff;
            --text-dim: #555555;
            --border: #151515;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding-bottom: 40px;
            -webkit-font-smoothing: antialiased;
        }

        /* Header Minimale */
        header { 
            padding: 45px 20px 15px; 
            max-width: 650px; margin: 0 auto; 
            display: flex; justify-content: space-between; align-items: baseline; 
            border-bottom: 1px solid var(--border);
        }
        h1 { 
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.7rem; font-weight: 600; letter-spacing: -0.5px; margin: 0; 
            color: #fff;
        }

        .week-selector {
            background: transparent;
            border: none;
            color: var(--text-dim); padding: 0;
            font-weight: 400; outline: none; cursor: pointer; font-family: inherit; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 1.5px;
        }

        /* Navigazione Giorni Zen */
        nav {
            display: flex; gap: 25px; padding: 25px; overflow-x: auto;
            max-width: 650px; margin: 0 auto; scrollbar-width: none;
            justify-content: center;
        }
        nav::-webkit-scrollbar { display: none; }
        nav button {
            background: transparent; border: none; color: var(--text-dim);
            font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: 0.3s;
            padding: 0; letter-spacing: 1.2px; text-transform: uppercase;
        }
        nav button.active { color: var(--primary); }

        /* Contenitore */
        .container { padding: 10px; max-width: 650px; margin: 0 auto; }
        .day-section { display: none; animation: fadeIn 0.4s ease; }
        .active-day { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Schede Esercizi */
        .card {
            background: var(--surface);
            border-radius: 12px; padding: 22px; margin-bottom: 18px;
            border: 1px solid var(--border);
        }
        .card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
        .card-header h3 { margin: 0; font-size: 0.95rem; font-weight: 600; color: #fff; letter-spacing: 0.2px;}
        
        .timer-btn {
            background: transparent; color: var(--text-dim); border: none;
            padding: 0; font-weight: 400; font-size: 0.65rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .timer-btn:hover { color: var(--primary); }

        /* Input Progressivi */
        .series-grid { display: flex; flex-direction: column; gap: 10px; }
        .serie-row {
            display: grid; grid-template-columns: 60px 1fr; align-items: center;
            padding: 6px 0; border-bottom: 1px solid var(--border);
        }
        .serie-row:last-child { border-bottom: none; }
        .serie-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }
        
        .inputs { display: flex; justify-content: flex-start; gap: 20px; align-items: center; }
        .input-group { display: flex; align-items: baseline; gap: 5px; }
        .inputs input {
            width: 40px; background: transparent; border: none; color: white;
            font-weight: 400; font-size: 1.1rem; text-align: right; outline: none;
        }
        .input-unit { color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase; }

        /* Grafico */
        .chart-container { height: 75px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px;}

        /* Overlay Timer */
        #timer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.97); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        #timer-val { font-size: 6rem; font-weight: 300; color: var(--primary); letter-spacing: -3px; }
    </style>
</head>
<body>

<div id="timer-overlay" onclick="closeTimer()">
    <div id="timer-val">00:00</div>
    <div style="color:var(--text-dim); font-size: 0.65rem; margin-top: 10px; letter-spacing: 3px;">TOCCA PER SALTARE</div>
</div>

<header>
    <h1>Rayleigh Workout</h1>
    <select class="week-selector" id="weekSelect" onchange="loadWeekData()">
        </select>
</header>

<nav id="dayNav">
    <button onclick="switchDay('lun')" id="n-lun" class="active">Lun</button>
    <button onclick="switchDay('mar')" id="n-mar">Mar</button>
    <button onclick="switchDay('mer')" id="n-mer">Mer</button>
    <button onclick="switchDay('gio')" id="n-gio">Gio</button>
    <button onclick="switchDay('ven')" id="n-ven">Ven</button>
</nav>

<div class="container" id="mainContainer"></div>

<script>
// Generatore di 16 settimane
const weekSelect = document.getElementById('weekSelect');
for (let i = 1; i <= 16; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.innerHTML = `SETTIMANA ${i}`;
    weekSelect.appendChild(opt);
}

const workout = {
    lun: { title: "Spinta Alpha • Petto e Spalle", ex: [
        {n:"Panca Inclinata Manubri", s:4, r:90}, {n:"Chest Press Macchina", s:3, r:60}, 
        {n:"Alzate Laterali", s:4, r:60}, {n:"Spinte in basso Corda", s:4, r:60},
        {n:"Crunch Addominali", s:3, r:60, spec:true}, {n:"Camminata in salita (10')", s:1, r:600, spec:true}
    ]},
    mar: { title: "Trazione Alpha • Trazioni Pesanti", ex: [
        {n:"Trazioni Zavorrate (Forza)", s:5, r:120}, {n:"Rematore Manubrio", s:3, r:90}, 
        {n:"Curl Bilanciere EZ", s:4, r:60}, {n:"Facepull", s:3, r:60},
        {n:"Sollevamento Gambe", s:3, r:60, spec:true}, {n:"Camminata in salita (10')", s:1, r:600, spec:true}
    ]},
    mer: { title: "Gambe • Potenza", ex: [
        {n:"Hack Squat", s:4, r:120}, {n:"Leg Press", s:3, r:90}, 
        {n:"Leg Curl", s:4, r:60}, {n:"Calf Raise", s:4, r:60},
        {n:"Plank", s:3, r:60, spec:true}, {n:"Camminata in salita (10')", s:1, r:600, spec:true}
    ]},
    gio: { title: "Spinta Beta • Petto e Spalle", ex: [
        {n:"Panca Piana Manubri", s:4, r:90}, {n:"Croci ai Cavi", s:3, r:60}, 
        {n:"Shoulder Press Macchina", s:3, r:90}, {n:"French Press Manubri", s:3, r:60},
        {n:"Crunch Inverso", s:3, r:60, spec:true}, {n:"Camminata in salita (10')", s:1, r:600, spec:true}
    ]},
    ven: { title: "Trazione Beta • Trazioni Volume", ex: [
        {n:"Trazioni Zavorrate (Volume)", s:4, r:120}, {n:"Lat Machine Inversa", s:3, r:90}, 
        {n:"Hammer Curl", s:3, r:60}, {n:"Curl ai Cavi", s:3, r:60},
        {n:"Russian Twist", s:3, r:60, spec:true}, {n:"Camminata in salita (10')", s:1, r:600, spec:true}
    ]}
};

let charts = {};

function init() {
    const main = document.getElementById('mainContainer');
    for(let day in workout) {
        let section = `<div id="${day}" class="day-section ${day==='lun'?'active-day' : ''}">`;
        workout[day].ex.forEach((e, idx) => {
            const id = `${day}_${idx}`;
            section += `
            <div class="card">
                <div class="card-header">
                    <h3>${e.n}</h3>
                    <button class="timer-btn" onclick="startTimer(${e.r})">Recupero ${e.r}s</button>
                </div>
                <div class="series-grid">
                    ${Array.from({length:e.s}).map((_, s) => `
                        <div class="serie-row">
                            <span class="serie-label">Serie ${s+1}</span>
                            <div class="inputs">
                                <div class="input-group">
                                    <input type="number" placeholder="0" id="${id}_w${s}" onchange="saveData('${id}')">
                                    <span class="input-unit">kg</span>
                                </div>
                                <div class="input-group">
                                    <input type="number" placeholder="0" id="${id}_r${s}" onchange="saveData('${id}')">
                                    <span class="input-unit">re</span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                ${!e.spec ? `<div class="chart-container"><canvas id="c_${id}"></canvas></div>` : ''}
            </div>`;
        });
        section += `</div>`;
        main.innerHTML += section;
    }
    loadWeekData();
}

function saveData(exId) {
    const week = document.getElementById('weekSelect').value;
    const day = exId.split('_')[0];
    const idx = exId.split('_')[1];
    const sets = workout[day].ex[idx].s;
    let dataEntry = { w: [], r: [] };
    for(let i=0; i<sets; i++) {
        dataEntry.w.push(parseFloat(document.getElementById(`${exId}_w${i}`).value) || 0);
        dataEntry.r.push(parseFloat(document.getElementById(`${exId}_r${i}`).value) || 0);
    }
    localStorage.setItem(`Rayleigh_W${week}_${exId}`, JSON.stringify(dataEntry));
    updateSingleChart(exId);
}

function loadWeekData() {
    const week = document.getElementById('weekSelect').value;
    for(let day in workout) {
        workout[day].ex.forEach((e, idx) => {
            const id = `${day}_${idx}`;
            const saved = JSON.parse(localStorage.getItem(`Rayleigh_W${week}_${id}`));
            for(let i=0; i<e.s; i++) {
                const wIn = document.getElementById(`${id}_w${i}`);
                const rIn = document.getElementById(`${id}_r${i}`);
                if(saved) {
                    wIn.value = saved.w[i] || "";
                    rIn.value = saved.r[i] || "";
                } else {
                    wIn.value = ""; rIn.value = "";
                }
            }
            if(!e.spec) updateSingleChart(id);
        });
    }
}

function updateSingleChart(exId) {
    const historyVol = [];
    const labels = [];
    for(let w=1; w<=16; w++) {
        const d = JSON.parse(localStorage.getItem(`Rayleigh_W${w}_${exId}`));
        let vol = 0;
        if(d) d.w.forEach((weight, i) => vol += (weight * (d.r[i] || 0)));
        historyVol.push(vol);
        labels.push(w);
    }
    const ctx = document.getElementById(`c_${exId}`);
    if(!ctx) return;
    if(charts[exId]) charts[exId].destroy();
    charts[exId] = new Chart(ctx.getContext('2d'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                data: historyVol,
                borderColor: '#c5a059',
                backgroundColor: 'transparent',
                fill: false, tension: 0.3, borderWidth: 1, pointRadius: 1, pointBackgroundColor: '#c5a059'
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { enabled: false } },
            scales: { 
                x: { grid: { display: false }, ticks: { color: '#222', font: { size: 7 } } }, 
                y: { display: false } 
            }
        }
    });
}

let tInterval;
function startTimer(s) {
    const ov = document.getElementById('timer-overlay');
    const val = document.getElementById('timer-val');
    ov.style.display = 'flex';
    let time = s;
    tInterval = setInterval(() => {
        let m = Math.floor(time/60); let sec = time%60;
        val.innerText = `${m}:${sec<10?'0':''}${sec}`;
        if(time <= 0) { clearInterval(tInterval); val.innerText = "VIA!"; }
        time--;
    }, 1000);
}

function closeTimer() { clearInterval(tInterval); document.getElementById('timer-overlay').style.display = 'none'; }

function switchDay(id) {
    document.querySelectorAll('.day-section').forEach(d => d.classList.remove('active-day'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active-day');
    document.getElementById('n-'+id).classList.add('active');
}

window.onload = init;
</script>
</body>
</html>

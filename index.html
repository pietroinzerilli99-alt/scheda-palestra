<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Training - Elite Log</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --surface: rgba(255, 255, 255, 0.03);
            --glass: rgba(255, 255, 255, 0.05);
            --primary: #00d2ff; /* Azzurro pace */
            --accent: #7a5cff;  /* Viola motivazione */
            --text: #ffffff;
            --text-dim: #94a3b8;
            --success: #00ff88;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(122, 92, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(0, 210, 255, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding-bottom: 50px;
            -webkit-font-smoothing: antialiased;
        }

        /* Header Elegante */
        header {
            padding: 40px 20px 20px;
            text-align: left;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1.5px;
        }

        .vol-badge {
            display: inline-block;
            background: var(--surface);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.8rem;
            color: var(--primary);
            border: 1px solid rgba(0, 210, 255, 0.2);
            margin-top: 10px;
        }

        /* Navigazione Minimalista */
        nav {
            display: flex;
            gap: 12px;
            padding: 10px 20px;
            overflow-x: auto;
            max-width: 600px;
            margin: 0 auto;
            scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }

        nav button {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 600;
            padding: 8px 4px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        nav button.active {
            color: var(--text);
        }

        nav button.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            border-radius: 2px;
        }

        /* Contenitore Cards */
        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .day-section { display: none; animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        .active-day { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: transform 0.3s;
        }

        .card:active { transform: scale(0.98); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .card-header h3 { 
            margin: 0; 
            font-size: 1.1rem; 
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .timer-btn {
            background: white;
            color: black;
            border: none;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
        }

        /* Input Serie Soft */
        .series-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(65px, 1fr));
            gap: 12px;
        }

        .serie-box {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .serie-box span { display: block; font-size: 0.65rem; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }

        .serie-box input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            outline: none;
        }

        /* Grafici Minimal */
        .chart-wrap {
            height: 60px;
            margin-top: 20px;
            pointer-events: none;
        }

        /* Timer Overlay Overlay */
        #timer-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 7, 10, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(20px);
        }

        #timer-big {
            font-size: 6rem;
            font-weight: 800;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Cardio Style */
        .cardio-card {
            background: linear-gradient(145deg, rgba(122, 92, 255, 0.1), rgba(0, 210, 255, 0.05));
            border: 1px solid rgba(122, 92, 255, 0.2);
        }
    </style>
</head>
<body>

<div id="timer-overlay" onclick="closeTimer()">
    <div style="color: var(--primary); letter-spacing: 2px; margin-bottom: 10px;">RECUPERO...</div>
    <div id="timer-big">00:00</div>
    <div style="margin-top: 30px; color: var(--text-dim);">Tocca per chiudere</div>
</div>

<header>
    <h1>Aura Log</h1>
    <div class="vol-badge">Volume Sessione: <span id="total-vol">0</span> KG</div>
</header>

<nav id="dayNav">
    <button onclick="switchDay('lun')" id="nav-lun" class="active">LUN</button>
    <button onclick="switchDay('mar')" id="nav-mar">MAR</button>
    <button onclick="switchDay('mer')" id="nav-mer">MER</button>
    <button onclick="switchDay('gio')" id="nav-gio">GIO</button>
    <button onclick="switchDay('ven')" id="nav-ven">VEN</button>
</nav>

<div class="container" id="days-container"></div>

<script>
const workoutData = {
    lun: { title: "Push Alpha • Petto & Spalle", exercises: [
        { name: "Panca Inclinata Manubri", sets: 4, rec: 90 },
        { name: "Chest Press (Controllo)", sets: 3, rec: 60 },
        { name: "Alzate Laterali", sets: 4, rec: 60 },
        { name: "Pushdown Corda", sets: 4, rec: 60 },
        { name: "Crunch Addominali", sets: 3, rec: 60, isSpecial: true },
        { name: "Inclinata 5.5km/h (10')", sets: 1, rec: 600, isSpecial: true }
    ]},
    mar: { title: "Pull Alpha • Trazioni Pesanti", exercises: [
        { name: "Trazioni Zavorrate (Heavy)", sets: 5, rec: 120 },
        { name: "Rematore Manubrio", sets: 3, rec: 90 },
        { name: "Curl Bilanciere EZ", sets: 4, rec: 60 },
        { name: "Facepull (Salute Spalla)", sets: 3, rec: 60 },
        { name: "Leg Raise", sets: 3, rec: 60, isSpecial: true },
        { name: "Inclinata 5.5km/h (10')", sets: 1, rec: 600, isSpecial: true }
    ]},
    mer: { title: "Legs • Potenza & Volume", exercises: [
        { name: "Hack Squat", sets: 4, rec: 120 },
        { name: "Leg Press", sets: 3, rec: 90 },
        { name: "Leg Curl", sets: 4, rec: 60 },
        { name: "Calf Raise", sets: 4, rec: 60 },
        { name: "Plank", sets: 3, rec: 60, isSpecial: true },
        { name: "Inclinata 5.5km/h (10')", sets: 1, rec: 600, isSpecial: true }
    ]},
    gio: { title: "Push Beta • Richiamo & Braccia", exercises: [
        { name: "Panca Piana Manubri", sets: 4, rec: 90 },
        { name: "Croci ai Cavi High", sets: 3, rec: 60 },
        { name: "Shoulder Press Macchina", sets: 3, rec: 90 },
        { name: "French Press Manubri", sets: 3, rec: 60 },
        { name: "Crunch Inverso", sets: 3, rec: 60, isSpecial: true },
        { name: "Inclinata 5.5km/h (10')", sets: 1, rec: 600, isSpecial: true }
    ]},
    ven: { title: "Pull Beta • Trazioni Volume", exercises: [
        { name: "Trazioni Zavorrate (Vol)", sets: 4, rec: 120 },
        { name: "Lat Machine Inversa", sets: 3, rec: 90 },
        { name: "Hammer Curl", sets: 3, rec: 60 },
        { name: "Curl ai Cavi", sets: 3, rec: 60 },
        { name: "Russian Twist", sets: 3, rec: 60, isSpecial: true },
        { name: "Inclinata 5.5km/h (10')", sets: 1, rec: 600, isSpecial: true }
    ]}
};

const charts = {};
function render() {
    const container = document.getElementById('days-container');
    for (const [dayKey, dayObj] of Object.entries(workoutData)) {
        let html = `<div id="${dayKey}" class="day-section ${dayKey === 'lun' ? 'active-day' : ''}">`;
        html += `<div style="color:var(--text-dim); font-size:0.8rem; margin-bottom:20px; font-weight:600; text-transform:uppercase; letter-spacing:2px;">${dayObj.title}</div>`;
        
        dayObj.exercises.forEach((ex, iIdx) => {
            const id = `${dayKey}_ex${iIdx}`;
            html += `
                <div class="card ${ex.isSpecial ? 'cardio-card' : ''}">
                    <div class="card-header">
                        <h3>${ex.name}</h3>
                        <button class="timer-btn" onclick="startTimer(${ex.rec})">${ex.rec}S</button>
                    </div>
                    <div class="series-row">
                        ${Array.from({length: ex.sets}).map((_, s) => `
                            <div class="serie-box">
                                <span>SET ${s+1}</span>
                                <input type="number" id="${id}_s${s}" oninput="save('${id}', ${s}, this.value)">
                            </div>
                        `).join('')}
                    </div>
                    ${!ex.isSpecial ? `<div class="chart-wrap"><canvas id="c_${id}"></canvas></div>` : ''}
                </div>`;
        });
        html += `</div>`;
        container.innerHTML += html;
    }
}

let timerInt;
function startTimer(s) {
    const overlay = document.getElementById('timer-overlay');
    const display = document.getElementById('timer-big');
    overlay.style.display = 'flex';
    let left = s;
    timerInt = setInterval(() => {
        let m = Math.floor(left / 60); let sec = left % 60;
        display.innerText = `${m}:${sec < 10 ? '0' : ''}${sec}`;
        if(left <= 0) { clearInterval(timerInt); display.innerText = "VIA!"; }
        left--;
    }, 1000);
}

function closeTimer() { clearInterval(timerInt); document.getElementById('timer-overlay').style.display = 'none'; }

function save(id, s, v) {
    localStorage.setItem(`${id}_s${s}`, v);
    if(charts[id]) {
        charts[id].data.datasets[0].data[4] = parseFloat(v) || 0;
        charts[id].update();
        localStorage.setItem(`h_${id}`, JSON.stringify(charts[id].data.datasets[0].data));
    }
    calc();
}

function calc() {
    let t = 0; document.querySelectorAll('input').forEach(i => t += (parseFloat(i.value) || 0));
    document.getElementById('total-vol').innerText = t;
}

function switchDay(id) {
    document.querySelectorAll('.day-section').forEach(d => d.classList.remove('active-day'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active-day');
    document.getElementById('nav-' + id).classList.add('active');
}

window.onload = () => {
    render();
    Object.keys(workoutData).forEach(dk => {
        workoutData[dk].exercises.forEach((ex, ei) => {
            const id = `${dk}_ex${ei}`;
            const ctx = document.getElementById(`c_${id}`);
            if(ctx) {
                const h = JSON.parse(localStorage.getItem(`h_${id}`)) || [0,0,0,0,0];
                charts[id] = new Chart(ctx, {
                    type: 'line',
                    data: { labels:[1,2,3,4,5], datasets:[{ data:h, borderColor:'#00d2ff', borderWidth:2, tension:0.4, fill:true, backgroundColor:'rgba(0,210,255,0.05)', pointRadius:0 }] },
                    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{display:false}, y:{display:false}} }
                });
            }
            for(let s=0; s<ex.sets; s++) {
                const v = localStorage.getItem(`${id}_s${s}`);
                if(v) document.getElementById(`${id}_s${s}`).value = v;
            }
        });
    });
    calc();
};
</script>
</body>
</html>

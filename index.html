<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE PIECE FIT - ULTIMATE RESTORED</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card-bg: #0d0d0f; --primary: #00ffaa; --zoro: #00ff88; --shanks: #ff1100; --luffy: #ffcc00; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--bg); color: #fff; margin: 0; padding-bottom: 120px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* --- FRASI MOTIVAZIONALI --- */
        #quote-box { margin: 15px 20px; padding: 18px; background: #0a0a0a; border-left: 5px solid var(--primary); border-radius: 12px; min-height: 60px; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #quote-text { font-size: 0.95rem; font-style: italic; color: #eee; line-height: 1.5; margin: 0; font-weight: 500; }

        /* --- ANIMAZIONI --- */
        @keyframes quake { 0% { transform: translate(0,0); } 25% { transform: translate(-3px, 3px); } 50% { transform: translate(3px, -3px); } 100% { transform: translate(0,0); } }
        .quake-active { animation: quake 0.08s infinite !important; }
        .scar-container { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; pointer-events: none; opacity: 0; }
        .scar-line { width: 2px; height: 0; background: var(--shanks); margin: 0 3px; transform: rotate(20deg); box-shadow: 0 0 10px var(--shanks); }
        .animate-scars { opacity: 1; animation: fadeOut 0.8s forwards; }
        .animate-scars .scar-line { animation: slashDown 0.3s ease-out forwards; }
        @keyframes slashDown { from { height: 0; } to { height: 60px; } }
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }

        /* --- UI PRINCIPALE --- */
        header { padding: 25px 20px; display: flex; align-items: center; justify-content: center; position: relative; }
        .main-title { font-weight: 900; letter-spacing: 5px; font-size: 0.8rem; text-transform: uppercase; opacity: 0.6; }
        
        .week-select { background: #111; border: 1px solid #333; color: var(--primary); padding: 16px; border-radius: 18px; font-weight: 800; width: 92%; margin: 0 auto 20px; display: block; outline: none; appearance: none; font-size: 1rem; text-align: center; }
        
        nav { display: flex; gap: 15px; padding: 15px 20px; overflow-x: auto; position: sticky; top: 0; z-index: 1000; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid #1a1a1a; }
        .nav-item { flex: 0 0 auto; background: transparent; border: none; display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0.3; transition: 0.3s; }
        .nav-item.active { opacity: 1; transform: scale(1.1); }
        .char-frame { width: 70px; height: 95px; border-radius: 20px; border: 2px solid #222; background: #050505; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }

        /* --- CARDS & TIMER INDIPENDENTI --- */
        .card { background: var(--card-bg); border-radius: 28px; padding: 22px; margin: 0 20px 25px; border: 1px solid #1a1a1a; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
        .edit-trigger { background: #1a1a1c; border: 1px solid #333; color: var(--primary); width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; flex-shrink: 0; }
        .timer-group { display: flex; align-items: center; gap: 6px; background: #151518; padding: 5px; border-radius: 16px; border: 1px solid #222; }
        .timer-display { font-family: monospace; font-size: 1.1rem; font-weight: 800; color: var(--primary); min-width: 45px; text-align: center; }
        .action-btn { background: #1a1a1c; border: 1px solid #333; color: #fff; width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .set-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .input-box { flex: 1; background: #1a1a1c; border-radius: 16px; padding: 12px; display: flex; align-items: center; border: 1px solid #222; }
        .input-box input { background: transparent; border: none; color: #fff; width: 100%; text-align: right; outline: none; font-weight: 800; font-size: 1.1rem; }
        .input-box span { font-size: 0.6rem; color: #555; margin-left: 5px; font-weight: 900; }

        /* --- MODALE --- */
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 4000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; align-items: flex-end; }
        .modal.active { bottom: 0; }
        .modal-content { background: #111; width: 100%; border-radius: 32px 32px 0 0; padding: 35px 25px 60px; border-top: 1px solid #333; box-sizing: border-box; }
        .modal-field { margin-bottom: 20px; }
        .modal-field label { display: block; font-size: 0.7rem; font-weight: 900; color: #555; margin-bottom: 8px; text-transform: uppercase; }
        .modal-field input { width: 100%; background: #1a1a1c; border: 1px solid #333; padding: 18px; border-radius: 16px; color: #fff; font-weight: 700; outline: none; box-sizing: border-box; }
    </style>
</head>
<body onclick="if(event.target.id==='editModal') closeModal()">

<header><div class="main-title">OGNI SINGOLO GIORNO</div></header>

<div id="page-workout">
    <div id="quote-box"><p id="quote-text">"Caricamento..."</p></div>
    <select id="weekSelector" class="week-select" onchange="renderWorkout()"></select>
    <nav id="navbar"></nav>
    <div id="shake-wrapper"><div id="workout-area"></div></div>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <div style="width:40px; height:5px; background:#333; border-radius:10px; margin:0 auto 25px;"></div>
        <div class="modal-field"><label>Esercizio</label><input type="text" id="exNameInput"></div>
        <div style="display:flex; gap:10px;">
            <div class="modal-field" style="flex:1"><label>Serie</label><input type="number" id="exSetsInput"></div>
            <div class="modal-field" style="flex:1"><label>Timer (s)</label><input type="number" id="exRestInput"></div>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="saveChanges()" style="flex:2; padding:22px; border-radius:18px; background:var(--primary); font-weight:900; border:none;">SALVA</button>
            <button id="delBtn" onclick="deleteEx()" style="flex:1; padding:22px; border-radius:18px; background:#ff1100; color:#fff; font-weight:900; border:none;">ELIMINA</button>
        </div>
    </div>
</div>

<script>
const quotes = {
    zoro: ["Se non riesci nemmeno a proteggere il tuo capitano, la tua ambizione non vale nulla.", "Il dolore è mio compagno di viaggio.", "Solo chi ha sofferto può diventare forte."],
    shanks: ["Scommetto sul futuro.", "Non c'è motivo di arrabbiarsi per un po' di vino versato.", "Siamo qui per porre fine a questa guerra!"],
    luffy: ["Diventerò il Re dei Pirati!", "Se non rischio la vita, non posso creare il mio futuro!", "Il mio corpo può spingersi oltre ogni limite."]
};

const defaultData = {
    lun: { char: 'zoro', icon: '⚔️', color: '#00ff88', ex: [{n:"Panca Inclinata", s:4, r:90}, {n:"Chest Press", s:3, r:60}], abs: {n:'Leg Raises', s:3, r:60}, cardio: {n:'Cardio LISS', s:1, r:600} },
    mar: { char: 'shanks', icon: '🍷', color: '#ff1100', ex: [{n:"Trazioni", s:5, r:120}, {n:"Rematore", s:3, r:90}], abs: {n:'Cable Crunch', s:3, r:60}, cardio: {n:'Cardio LISS', s:1, r:600} },
    mer: { char: 'luffy', icon: '🍖', color: '#ffcc00', ex: [{n:"Squat", s:4, r:120}, {n:"Stacchi", s:4, r:120}], abs: {n:'Ab Wheel', s:3, r:60}, cardio: {n:'Cardio LISS', s:1, r:600} },
    gio: { char: 'zoro', icon: '⚔️', color: '#00ff88', ex: [{n:"Panca Piana", s:4, r:90}, {n:"Croci", s:3, r:60}], abs: {n:'Leg Raises', s:3, r:60}, cardio: {n:'Cardio LISS', s:1, r:600} },
    ven: { char: 'shanks', icon: '🍷', color: '#ff1100', ex: [{n:"Lat Machine", s:3, r:90}, {n:"Curl", s:3, r:60}], abs: {n:'Cable Crunch', s:3, r:60}, cardio: {n:'Cardio LISS', s:1, r:600} }
};

let workoutData = JSON.parse(localStorage.getItem('OP_Ultimate_V5')) || defaultData;
let currentDay = 'lun';
let runningTimers = {}; // Gestione INDIPENDENTE
let editingIdx = null;

function init() {
    const nav = document.getElementById('navbar');
    const sel = document.getElementById('weekSelector');
    for(let i=1; i<=16; i++) sel.innerHTML += `<option value="${i}">SETTIMANA ${i}</option>`;
    for(let day in workoutData) {
        nav.innerHTML += `<button onclick="setDay('${day}')" id="btn-${day}" class="nav-item">
            <div class="char-frame" id="frame-${day}">
                <div class="scar-container" id="scars-${day}"><div class="scar-line"></div><div class="scar-line"></div><div class="scar-line"></div></div>
                <span style="font-size:1.8rem">${workoutData[day].icon}</span>
            </div>
            <span style="font-size:0.6rem; font-weight:900; color:#555">${day.toUpperCase()}</span></button>`;
    }
    setDay('lun');
}

function setDay(day) {
    currentDay = day;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-'+day).classList.add('active');
    
    // Frase Motivazionale
    const char = workoutData[day].char;
    const qList = quotes[char];
    document.getElementById('quote-text').innerText = `"${qList[Math.floor(Math.random()*qList.length)]}"`;
    document.getElementById('quote-box').style.borderColor = workoutData[day].color;

    // Animazione Haki e 3 Tagli
    const wrap = document.getElementById('shake-wrapper');
    wrap.classList.add('quake-active');
    if(char === 'shanks') document.getElementById('scars-'+day).classList.add('animate-scars');
    setTimeout(() => { 
        wrap.classList.remove('quake-active'); 
        if(char === 'shanks') document.getElementById('scars-'+day).classList.remove('animate-scars'); 
    }, 800);

    renderWorkout();
}

function renderWorkout() {
    const area = document.getElementById('workout-area');
    area.innerHTML = '';
    workoutData[currentDay].ex.forEach((ex, i) => area.appendChild(createCard(ex, i)));
    area.innerHTML += `<div style="text-align:center; color:#222; font-size:0.6rem; letter-spacing:5px; margin:20px 0; font-weight:900;">DAILY FINISHERS</div>`;
    area.appendChild(createCard(workoutData[currentDay].abs, 'abs'));
    area.appendChild(createCard(workoutData[currentDay].cardio, 'cardio'));
}

function createCard(ex, idx) {
    const week = document.getElementById('weekSelector').value;
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `<div class="card-header">
        <div class="edit-trigger" onclick="openEdit('${idx}')">✎</div>
        <h3 style="flex:1; font-size:0.9rem; margin:0 10px;">${ex.n}</h3>
        <div class="timer-group">
            <button class="action-btn" onclick="resetT('${idx}', ${ex.r})">↺</button>
            <span class="timer-display" id="disp-${idx}">${ex.r}s</span>
            <button class="action-btn" id="btn-t-${idx}" onclick="toggleT('${idx}', ${ex.r})" style="color:var(--primary)">▶</button>
        </div>
    </div>`;
    for(let i=1; i<=ex.s; i++) {
        const key = `w${week}-${currentDay}-${idx}-s${i}`;
        const val = JSON.parse(localStorage.getItem(key)) || {k:'', r:''};
        card.innerHTML += `<div class="set-row">
            <div style="font-size:0.6rem; width:15px; color:#333; font-weight:900;">${i}</div>
            <div class="input-box"><input type="number" value="${val.k}" oninput="saveSet('${idx}', ${i}, 'k', this.value)"><span>KG</span></div>
            <div class="input-box"><input type="number" value="${val.r}" oninput="saveSet('${idx}', ${i}, 'r', this.value)"><span>REPS</span></div>
        </div>`;
    }
    return card;
}

// LOGICA TIMER INDIPENDENTI
function toggleT(id, sec) {
    if(runningTimers[id]) {
        clearInterval(runningTimers[id]);
        delete runningTimers[id];
        document.getElementById('btn-t-'+id).innerText = "▶";
    } else {
        const end = Date.now() + (sec * 1000);
        document.getElementById('btn-t-'+id).innerText = "Ⅱ";
        runningTimers[id] = setInterval(() => {
            let rem = Math.round((end - Date.now())/1000);
            const disp = document.getElementById('disp-'+id);
            if(disp) disp.innerText = (rem > 0 ? rem : sec) + "s";
            if(rem <= 0) {
                toggleT(id, sec);
                new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
            }
        }, 1000);
    }
}
function resetT(id, sec) { if(runningTimers[id]) toggleT(id, sec); document.getElementById('disp-'+id).innerText = sec + "s"; }

function saveSet(exIdx, setIdx, type, val) {
    const week = document.getElementById('weekSelector').value;
    const key = `w${week}-${currentDay}-${exIdx}-s${setIdx}`;
    let d = JSON.parse(localStorage.getItem(key)) || {k:'', r:''};
    d[type] = val; localStorage.setItem(key, JSON.stringify(d));
}

function openEdit(idx) {
    editingIdx = idx;
    const ex = (idx==='abs'||idx==='cardio') ? workoutData[currentDay][idx] : workoutData[currentDay].ex[idx];
    document.getElementById('exNameInput').value = ex.n;
    document.getElementById('exSetsInput').value = ex.s;
    document.getElementById('exRestInput').value = ex.r;
    document.getElementById('delBtn').style.display = (idx==='abs'||idx==='cardio') ? 'none' : 'block';
    document.getElementById('editModal').classList.add('active');
}

function closeModal() { document.getElementById('editModal').classList.remove('active'); }

function saveChanges() {
    const ex = (editingIdx==='abs'||editingIdx==='cardio') ? workoutData[currentDay][editingIdx] : workoutData[currentDay].ex[editingIdx];
    ex.n = document.getElementById('exNameInput').value;
    ex.s = parseInt(document.getElementById('exSetsInput').value);
    ex.r = parseInt(document.getElementById('exRestInput').value);
    localStorage.setItem('OP_Ultimate_V5', JSON.stringify(workoutData));
    closeModal(); renderWorkout();
}

function deleteEx() {
    if(confirm('Eliminare?')) {
        workoutData[currentDay].ex.splice(editingIdx, 1);
        localStorage.setItem('OP_Ultimate_V5', JSON.stringify(workoutData));
        closeModal(); renderWorkout();
    }
}

window.onload = init;
</script>
</body>
</html>

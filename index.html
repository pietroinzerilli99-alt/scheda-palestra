<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE PIECE FIT - ULTIMATE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card-bg: #0d0d0f; --primary: #00ffaa; --zoro: #00ff88; --shanks: #ff1100; --luffy: #ffcc00; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--bg); color: #fff; margin: 0; padding-bottom: 120px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* --- FRASI MOTIVAZIONALI (VISIBILI) --- */
        #quote-container { 
            margin: 15px 20px; 
            padding: 15px; 
            background: rgba(255,255,255,0.03); 
            border-left: 4px solid var(--primary); 
            border-radius: 10px;
            min-height: 50px;
            display: flex;
            align-items: center;
        }
        #quote-text { 
            font-size: 0.9rem; 
            font-style: italic; 
            color: #ccc; 
            line-height: 1.4; 
            margin: 0;
            width: 100%;
        }

        /* --- UI ELEMENTS --- */
        header { padding: 25px 20px; display: flex; align-items: center; justify-content: space-between; position: relative; }
        .main-title { font-weight: 900; letter-spacing: 5px; font-size: 0.8rem; text-transform: uppercase; opacity: 0.6; position: absolute; left: 50%; transform: translateX(-50%); }
        
        nav { display: flex; gap: 15px; padding: 15px 20px; overflow-x: auto; position: sticky; top: 0; z-index: 1000; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid #1a1a1a; }
        .nav-item { flex: 0 0 auto; background: transparent; border: none; display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0.3; transition: 0.3s; }
        .nav-item.active { opacity: 1; transform: scale(1.1); }
        .char-frame { width: 70px; height: 95px; border-radius: 20px; border: 2px solid #222; background: #050505; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }

        /* --- CARDS & TIMER --- */
        .card { background: var(--card-bg); border-radius: 28px; padding: 22px; margin: 0 20px 25px; border: 1px solid #1a1a1a; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .edit-trigger { background: #1a1a1c; border: 1px solid #333; color: var(--primary); width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; }
        
        .timer-group { display: flex; align-items: center; gap: 8px; background: #151518; padding: 6px; border-radius: 16px; border: 1px solid #222; }
        .timer-display { font-family: monospace; font-size: 1.2rem; font-weight: 800; color: var(--primary); min-width: 50px; text-align: center; }
        .action-btn { background: #222; border: 1px solid #333; color: #fff; width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* --- ANIMAZIONI SHANKS --- */
        .scar-container { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; pointer-events: none; opacity: 0; }
        .scar-line { width: 2px; height: 0; background: var(--shanks); margin: 0 2px; transform: rotate(20deg); box-shadow: 0 0 10px var(--shanks); }
        .animate-scars { opacity: 1; animation: fadeOut 0.8s forwards; }
        .animate-scars .scar-line { animation: slashDown 0.3s ease-out forwards; }
        @keyframes slashDown { from { height: 0; } to { height: 60px; } }
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }

        /* --- MODALE --- */
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 4000; transition: 0.4s; display: flex; align-items: flex-end; }
        .modal.active { bottom: 0; }
        .modal-content { background: #111; width: 100%; border-radius: 32px 32px 0 0; padding: 30px; border-top: 1px solid #333; }
        .modal-field { margin-bottom: 20px; }
        .modal-field label { display: block; font-size: 0.7rem; color: #666; margin-bottom: 8px; text-transform: uppercase; font-weight: 800; }
        .modal-field input { width: 100%; background: #1a1a1c; border: 1px solid #333; padding: 15px; border-radius: 12px; color: #fff; outline: none; box-sizing: border-box; }
    </style>
</head>
<body onclick="if(event.target.id==='editModal') closeModal()">

<header>
    <div class="main-title">ONE PIECE FIT</div>
</header>

<div id="page-workout">
    <div id="quote-container"><p id="quote-text">"Caricamento..."</p></div>
    <nav id="navbar"></nav>
    <div id="workout-area"></div>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <h2 id="modalTitle" style="margin-top:0; font-size:1.2rem; color:var(--primary)">MODIFICA</h2>
        <div class="modal-field"><label>Nome Esercizio</label><input type="text" id="exNameInput"></div>
        <div style="display:flex; gap:15px">
            <div class="modal-field" style="flex:1"><label>Serie</label><input type="number" id="exSetsInput"></div>
            <div class="modal-field" style="flex:1"><label>Recupero (s)</label><input type="number" id="exRestInput"></div>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="saveChanges()" style="flex:2; padding:18px; border-radius:15px; background:var(--primary); font-weight:900; border:none;">SALVA</button>
            <button id="delBtn" onclick="deleteEx()" style="flex:1; padding:18px; border-radius:15px; background:#ff1100; color:#fff; font-weight:900; border:none;">ELIMINA</button>
        </div>
    </div>
</div>

<script>
const quotes = {
    zoro: ["Non è fortuna, è forza di volontà.", "Se morirò qui, significa che non potevo andare oltre.", "Il dolore è un'illusione della mente."],
    shanks: ["Non c'è gloria nel vincere una sfida facile.", "Scommetto questa forza sulla nuova era.", "Vivi la tua vita senza rimpianti."],
    luffy: ["Se non rischio la vita, non posso creare il mio futuro!", "Diventerò il più forte di tutti!", "Mangia, allenati, ripeti!"]
};

const defaultData = {
    lun: { char: 'zoro', icon: '⚔️', color: '#00ff88', ex: [{n:"Panca Piana", s:4, r:90}, {n:"Chest Press", s:3, r:60}], abs: {n:'Crunch', s:3, r:60}, cardio: {n:'Camminata', s:1, r:600} },
    mar: { char: 'shanks', icon: '🍷', color: '#ff1100', ex: [{n:"Trazioni", s:4, r:90}], abs: {n:'Plank', s:3, r:60}, cardio: {n:'Corsa', s:1, r:600} },
    mer: { char: 'luffy', icon: '🍖', ex: [{n:"Squat", s:4, r:120}], abs: {n:'Leg Raise', s:3, r:60}, cardio: {n:'Salti', s:1, r:600} }
};

let workoutData = JSON.parse(localStorage.getItem('OP_Fit_V4')) || defaultData;
let currentDay = 'lun';
let timers = {}; // OGGETTO PER TIMER INDIPENDENTI
let editingIdx = null;

function init() {
    const nav = document.getElementById('navbar');
    for(let day in workoutData) {
        nav.innerHTML += `<button onclick="setDay('${day}')" id="btn-${day}" class="nav-item">
            <div class="char-frame" id="frame-${day}">
                <div class="scar-container" id="scars-${day}"><div class="scar-line"></div><div class="scar-line"></div><div class="scar-line"></div></div>
                <span style="font-size:1.8rem">${workoutData[day].icon}</span>
            </div>
            <span style="font-size:0.6rem; font-weight:900; color:#555">${day.toUpperCase()}</span></button>`;
    }
    setDay('lun');
}

function setDay(day) {
    currentDay = day;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-'+day).classList.add('active');
    
    // Frasi Motivazionali
    const char = workoutData[day].char || 'luffy';
    const qList = quotes[char];
    document.getElementById('quote-text').innerText = `"${qList[Math.floor(Math.random()*qList.length)]}"`;
    document.getElementById('quote-container').style.borderColor = workoutData[day].color || '#ffcc00';

    if(char === 'shanks') {
        const sc = document.getElementById('scars-'+day);
        sc.classList.add('animate-scars');
        setTimeout(() => sc.classList.remove('animate-scars'), 800);
    }
    renderWorkout();
}

function renderWorkout() {
    const area = document.getElementById('workout-area');
    area.innerHTML = '';
    
    workoutData[currentDay].ex.forEach((ex, i) => area.appendChild(createCard(ex, i)));
    area.innerHTML += `<div style="text-align:center; color:#333; font-size:0.6rem; letter-spacing:4px; margin:20px 0; font-weight:900;">DAILY FINISHERS</div>`;
    area.appendChild(createCard(workoutData[currentDay].abs, 'abs'));
    area.appendChild(createCard(workoutData[currentDay].cardio, 'cardio'));
}

function createCard(ex, idx) {
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `<div class="card-header">
        <div class="edit-trigger" onclick="openEdit('${idx}')">✎</div>
        <h3 style="flex:1; margin:0 15px; font-size:0.9rem">${ex.n}</h3>
        <div class="timer-group">
            <button class="action-btn" onclick="resetT('${idx}', ${ex.r})">↺</button>
            <span class="timer-display" id="disp-${idx}">${ex.r}s</span>
            <button class="action-btn" id="btn-t-${idx}" onclick="toggleT('${idx}', ${ex.r})" style="color:var(--primary)">▶</button>
        </div>
    </div>`;
    
    for(let i=1; i<=ex.s; i++) {
        card.innerHTML += `<div style="display:flex; gap:10px; margin-bottom:10px; opacity:0.8">
            <div style="font-size:0.6rem; width:15px; color:#444">${i}</div>
            <div style="flex:1; background:#1a1a1c; border-radius:10px; padding:10px; text-align:right; font-size:0.9rem">--- KG</div>
            <div style="flex:1; background:#1a1a1c; border-radius:10px; padding:10px; text-align:right; font-size:0.9rem">--- REPS</div>
        </div>`;
    }
    return card;
}

// LOGICA TIMER INDIPENDENTI
function toggleT(id, sec) {
    if(timers[id]) {
        clearInterval(timers[id].int);
        delete timers[id];
        document.getElementById('btn-t-'+id).innerText = "▶";
    } else {
        const end = Date.now() + (sec * 1000);
        document.getElementById('btn-t-'+id).innerText = "Ⅱ";
        timers[id] = {
            int: setInterval(() => {
                let rem = Math.round((end - Date.now())/1000);
                document.getElementById('disp-'+id).innerText = (rem > 0 ? rem : sec) + "s";
                if(rem <= 0) {
                    toggleT(id, sec);
                    new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
                }
            }, 1000)
        };
    }
}

function resetT(id, sec) {
    if(timers[id]) toggleT(id, sec);
    document.getElementById('disp-'+id).innerText = sec + "s";
}

// GESTIONE MODIFICA
function openEdit(idx) {
    editingIdx = idx;
    const ex = (idx==='abs'||idx==='cardio') ? workoutData[currentDay][idx] : workoutData[currentDay].ex[idx];
    document.getElementById('exNameInput').value = ex.n;
    document.getElementById('exSetsInput').value = ex.s;
    document.getElementById('exRestInput').value = ex.r;
    document.getElementById('delBtn').style.display = (idx==='abs'||idx==='cardio') ? 'none' : 'block';
    document.getElementById('editModal').classList.add('active');
}

function closeModal() { document.getElementById('editModal').classList.remove('active'); }

function saveChanges() {
    const ex = (editingIdx==='abs'||editingIdx==='cardio') ? workoutData[currentDay][editingIdx] : workoutData[currentDay].ex[editingIdx];
    ex.n = document.getElementById('exNameInput').value;
    ex.s = parseInt(document.getElementById('exSetsInput').value);
    ex.r = parseInt(document.getElementById('exRestInput').value);
    localStorage.setItem('OP_Fit_V4', JSON.stringify(workoutData));
    closeModal(); renderWorkout();
}

function deleteEx() {
    if(confirm('Eliminare?')) {
        workoutData[currentDay].ex.splice(editingIdx, 1);
        localStorage.setItem('OP_Fit_V4', JSON.stringify(workoutData));
        closeModal(); renderWorkout();
    }
}

window.onload = init;
</script>
</body>
</html>

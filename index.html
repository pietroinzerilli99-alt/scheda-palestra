<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGNI SINGOLO GIORNO - TOTAL BODY & WORKOUT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card-bg: #0d0d0f; --primary: #00ffaa; --zoro: #00ff88; --shanks: #ff1100; --luffy: #ffcc00; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--bg); color: #fff; margin: 0; padding-bottom: 120px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* MENU LATERALE APPLE STYLE */
        #sideMenu { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: rgba(10, 10, 12, 0.98); backdrop-filter: blur(20px); z-index: 3000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-right: 1px solid #222; padding: 40px 20px; box-sizing: border-box; }
        #sideMenu.active { left: 0; }
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2500; display: none; }
        .menu-overlay.active { display: block; }
        .menu-item { display: flex; align-items: center; gap: 15px; padding: 18px; border-radius: 16px; color: #fff; text-decoration: none; font-weight: 700; font-size: 1.1rem; margin-bottom: 10px; transition: 0.2s; cursor: pointer; }
        .menu-item:active { background: #1a1a1c; }
        .menu-item i { font-size: 1.4rem; }

        /* HEADER & HAMBURGER */
        header { padding: 25px 20px; display: flex; align-items: center; justify-content: space-between; }
        .burger-btn { font-size: 1.8rem; cursor: pointer; background: none; border: none; color: #fff; z-index: 1001; }
        .main-title { font-weight: 900; letter-spacing: 5px; font-size: 0.9rem; text-transform: uppercase; opacity: 0.8; margin: 0 auto; }

        /* ANIMAZIONI & CARDS (Invariate) */
        @keyframes quake { 0% { transform: translate(0,0); } 25% { transform: translate(-3px, 3px); } 50% { transform: translate(3px, -3px); } 100% { transform: translate(0,0); } }
        .quake-active { animation: quake 0.08s infinite !important; }
        .week-select { background: #111; border: 1px solid #333; color: var(--primary); padding: 15px; border-radius: 16px; font-weight: 800; width: 92%; margin: 0 auto 20px; display: block; outline: none; appearance: none; font-size: 1rem; }
        nav { display: flex; gap: 15px; padding: 20px; overflow-x: auto; position: sticky; top: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid #1a1a1a; }
        nav::-webkit-scrollbar { display: none; }
        .nav-item { flex: 0 0 auto; background: transparent; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0.4; transition: 0.3s; }
        .nav-item.active { opacity: 1; transform: scale(1.1); }
        .char-frame { width: 70px; height: 95px; border-radius: 18px; border: 2px solid #222; background: #050505; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .active .char-frame { border-color: #fff; }
        .card { background: var(--card-bg); border-radius: 28px; padding: 22px; margin-bottom: 25px; border: 1px solid #1a1a1a; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .action-btn { background: #1a1a1c; border: 1px solid #333; color: #fff; width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .timer-group { display: flex; align-items: center; gap: 8px; background: #151518; padding: 6px; border-radius: 18px; border: 1px solid #222; }
        .timer-display { font-family: monospace; font-size: 1.2rem; font-weight: 800; color: var(--primary); min-width: 50px; text-align: center; }
        .input-box { flex: 1; background: #1a1a1c; border-radius: 16px; padding: 12px; display: flex; align-items: center; border: 1px solid #222; }
        .input-box input { background: transparent; border: none; color: #fff; width: 100%; text-align: right; outline: none; font-weight: 700; font-size: 1.2rem; }
        .input-box span { font-size: 0.65rem; color: #555; margin-left: 6px; font-weight: 800; }

        /* PAGINA BIO */
        #page-bio { display: none; padding: 20px; max-width: 500px; margin: 0 auto; }
        .bio-input-card { background: #111; border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; }
        .bio-field { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .bio-field label { font-weight: 700; color: #888; }
        .bio-field select, .bio-field input { background: #1a1a1c; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 12px; width: 100px; text-align: center; font-weight: 700; }
        .macro-ring-container { display: flex; justify-content: space-around; margin: 30px 0; text-align: center; }
        .macro-box { background: #1a1a1c; padding: 15px; border-radius: 20px; width: 28%; border: 1px solid #222; }
        .macro-val { display: block; font-size: 1.2rem; font-weight: 800; margin-bottom: 5px; }
        .macro-label { font-size: 0.6rem; color: #666; font-weight: 800; text-transform: uppercase; }

        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 4000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; align-items: flex-end; }
        .modal.active { bottom: 0; }
        .modal-content { background: #111; width: 100%; border-radius: 30px 30px 0 0; padding: 30px 20px 50px; border-top: 1px solid #333; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
<div id="sideMenu">
    <div style="font-weight: 900; font-size: 1.5rem; margin-bottom: 40px; color: var(--primary);">ONE PIECE FIT</div>
    <div class="menu-item" onclick="switchPage('workout')"><i>🏋️</i> WORKOUT</div>
    <div class="menu-item" onclick="switchPage('bio')"><i>🧬</i> BIO & MACROS</div>
</div>

<header>
    <button class="burger-btn" onclick="toggleMenu()">☰</button>
    <div class="main-title">OGNI SINGOLO GIORNO</div>
    <div style="width: 30px;"></div>
</header>

<div id="page-workout">
    <select id="weekSelector" class="week-select" onchange="renderWorkout()"></select>
    <nav id="navbar"></nav>
    <div id="shake-wrapper">
        <div class="container" id="workout-area"></div>
    </div>
</div>

<div id="page-bio">
    <h2 style="font-weight: 800; margin-bottom: 25px;">Il Mio Profilo Bio</h2>
    <div class="bio-input-card">
        <div class="bio-field">
            <label>Obiettivo</label>
            <select id="goal" onchange="calculateMacros()">
                <option value="cut">Definizione (Cut)</option>
                <option value="maintain">Mantenimento</option>
                <option value="bulk">Massa (Bulk)</option>
            </select>
        </div>
        <div class="bio-field"><label>Peso (kg)</label><input type="number" id="weight" value="75" oninput="calculateMacros()"></div>
        <div class="bio-field"><label>Altezza (cm)</label><input type="number" id="height" value="180" oninput="calculateMacros()"></div>
        <div class="bio-field"><label>Età</label><input type="number" id="age" value="25" oninput="calculateMacros()"></div>
        <div class="bio-field">
            <label>Attività</label>
            <select id="activity" onchange="calculateMacros()">
                <option value="1.2">Sedentario</option>
                <option value="1.375">Leggero (1-3gg)</option>
                <option value="1.55">Moderato (3-5gg)</option>
                <option value="1.725">Intenso (6-7gg)</option>
            </select>
        </div>
    </div>

    <div class="card" style="text-align: center; background: #00ffaa10; border-color: var(--primary);">
        <div style="font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase;">Fabbisogno Giornaliero</div>
        <div id="totalCalories" style="font-size: 2.5rem; font-weight: 900; margin: 10px 0;">2400</div>
        <div style="font-size: 0.8rem; color: #555;">KCAL / GIORNO</div>
    </div>

    <div class="macro-ring-container">
        <div class="macro-box">
            <span class="macro-val" id="p-val" style="color: #ff4444;">150g</span>
            <span class="macro-label">Proteine</span>
        </div>
        <div class="macro-box">
            <span class="macro-val" id="c-val" style="color: #44aaff;">300g</span>
            <span class="macro-label">Carbs</span>
        </div>
        <div class="macro-box">
            <span class="macro-val" id="f-val" style="color: #ffcc00;">70g</span>
            <span class="macro-label">Grassi</span>
        </div>
    </div>
</div>

<div class="modal" id="editModal">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-handle" onclick="closeModal()"></div>
        <div class="modal-title" id="modalTitle">Modifica</div>
        <div class="modal-input-group">
            <input type="text" id="exNameInput" class="modal-input" placeholder="Nome">
            <input type="number" id="exSetsInput" class="modal-input" placeholder="Serie">
        </div>
        <button class="modal-save-btn" id="modalActionBtn">Salva</button>
    </div>
</div>

<script>
// --- LOGICA MENU & PAGINE ---
function toggleMenu() {
    document.getElementById('sideMenu').classList.toggle('active');
    document.getElementById('menuOverlay').classList.toggle('active');
}

function switchPage(page) {
    document.getElementById('page-workout').style.display = (page === 'workout' ? 'block' : 'none');
    document.getElementById('page-bio').style.display = (page === 'bio' ? 'block' : 'none');
    if(page === 'bio') calculateMacros();
    toggleMenu();
}

// --- LOGICA CALCOLI BIO ---
function calculateMacros() {
    const w = parseFloat(document.getElementById('weight').value);
    const h = parseFloat(document.getElementById('height').value);
    const a = parseFloat(document.getElementById('age').value);
    const act = parseFloat(document.getElementById('activity').value);
    const goal = document.getElementById('goal').value;

    // Mifflin-St Jeor (Uomo default)
    let bmr = (10 * w) + (6.25 * h) - (5 * a) + 5;
    let tdee = bmr * act;

    if(goal === 'cut') tdee -= 400;
    if(goal === 'bulk') tdee += 300;

    document.getElementById('totalCalories').innerText = Math.round(tdee);

    // Ripartizione Macro
    const prot = w * 2.1; // 2.1g per kg
    const fat = w * 0.9;  // 0.9g per kg
    const carbs = (tdee - (prot * 4) - (fat * 9)) / 4;

    document.getElementById('p-val').innerText = Math.round(prot) + 'g';
    document.getElementById('c-val').innerText = Math.round(carbs) + 'g';
    document.getElementById('f-val').innerText = Math.round(fat) + 'g';

    localStorage.setItem('bio_data', JSON.stringify({w, h, a, act, goal}));
}

// --- LOGICA WORKOUT (Invariata ma pulita) ---
const defaultData = {
    lun: { char: 'zoro', icon: '⚔️', color: '#00ff88', abs: {n:'Leg Raises', s:3, r:60}, cardio: {n:'Cardio LISS', s:1, r:600}, ex: [{n:"Panca Inclinata", s:4, r:90}, {n:"Chest Press", s:3, r:60}] },
    mar: { char: 'shanks', icon: '🍷', color: '#ff1100', abs: {n:'Cable Crunch', s:3, r:60}, cardio: {n:'Cardio LISS', s:1, r:600}, ex: [{n:"Trazioni", s:5, r:120}, {n:"Rematore", s:3, r:90}] },
    mer: { char: 'luffy', icon: '🍖', color: '#ffcc00', abs: {n:'Ab Wheel', s:3, r:60}, cardio: {n:'Cardio LISS', s:1, r:600}, ex: [{n:"Squat", s:4, r:120}, {n:"Stacchi", s:4, r:120}] },
    gio: { char: 'zoro', icon: '⚔️', color: '#00ff88', abs: {n:'Leg Raises', s:3, r:60}, cardio: {n:'Cardio LISS', s:1, r:600}, ex: [{n:"Panca Piana", s:4, r:90}, {n:"Croci", s:3, r:60}] },
    ven: { char: 'shanks', icon: '🍷', color: '#ff1100', abs: {n:'Cable Crunch', s:3, r:60}, cardio: {n:'Cardio LISS', s:1, r:600}, ex: [{n:"Lat Machine", s:3, r:90}, {n:"Hammer Curl", s:3, r:60}] }
};

let workoutData = JSON.parse(localStorage.getItem('workout_structure_v9')) || defaultData;
let activeTimer = null;
let currentDay = 'lun';
let editingContext = null;

function init() {
    const nav = document.getElementById('navbar');
    for(let i=1; i<=16; i++) {
        let opt = document.createElement('option'); opt.value = i; opt.innerText = `SETTIMANA ${i}`;
        document.getElementById('weekSelector').appendChild(opt);
    }
    for(let day in workoutData) {
        nav.innerHTML += `<button onclick="setDay('${day}')" id="btn-${day}" class="nav-item">
            <div class="char-frame" id="frame-${day}">
                <div class="scar-container" id="scars-${day}"><div class="scar-line"></div></div>
                <span style="font-size:1.8rem">${workoutData[day].icon}</span>
            </div>
            <span style="font-size:0.6rem; font-weight:800; color:#555">${day.toUpperCase()}</span></button>`;
    }
    
    const savedBio = JSON.parse(localStorage.getItem('bio_data'));
    if(savedBio) {
        document.getElementById('weight').value = savedBio.w;
        document.getElementById('height').value = savedBio.h;
        document.getElementById('age').value = savedBio.a;
        document.getElementById('activity').value = savedBio.act;
        document.getElementById('goal').value = savedBio.goal;
    }
    
    setDay('lun');
    checkPersistentTimer();
}

// ... (Restanti funzioni Workout: setDay, renderWorkout, createCard, startTimer, drawChart rimangono identiche alla versione precedente) ...
function setDay(day) {
    currentDay = day;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-'+day).classList.add('active');
    renderWorkout(day);
}

function renderWorkout(day = currentDay) {
    const area = document.getElementById('workout-area');
    const week = document.getElementById('weekSelector').value;
    area.innerHTML = '';
    workoutData[day].ex.forEach((ex, idx) => area.appendChild(createCard(ex, idx, day)));
    area.innerHTML += `<div style="text-align:center; color:#222; font-size:0.6rem; letter-spacing:5px; margin:40px 0; font-weight:900;">DAILY FINISHERS</div>`;
    area.appendChild(createCard(workoutData[day].abs, 'abs', day));
    area.appendChild(createCard(workoutData[day].cardio, 'cardio', day));
    area.innerHTML += `<button class="add-ex-btn" onclick="openAddModal(event)">+ AGGIUNGI ESERCIZIO</button>`;
}

function createCard(ex, idx, day) {
    const week = document.getElementById('weekSelector').value;
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `<div class="card-header">
        <h3>${ex.n} <button class="action-btn" style="width:34px; height:34px; font-size:0.9rem; margin-left:10px;" onclick="openEditModal(event, '${idx}')">✎</button></h3>
        <div class="timer-group">
            <button class="action-btn" onclick="resetTimer('${idx}', ${ex.r})">↺</button>
            <span class="timer-display" id="t-val-${idx}">${ex.r}s</span>
            <button class="action-btn" id="t-btn-${idx}" onclick="startTimer('${idx}', ${ex.r})">▶</button>
        </div>
    </div>`;
    for(let i=1; i<=ex.s; i++) {
        const key = `w${week}-${day}-${idx}-s${i}`;
        const saved = JSON.parse(localStorage.getItem(key)) || {kg:'', reps:''};
        card.innerHTML += `<div class="set-row" style="display:flex; gap:10px; margin-bottom:10px;">
            <div class="input-box"><input type="number" value="${saved.kg}" oninput="saveSet('${day}','${idx}',${i},'kg',this.value)"><span>KG</span></div>
            <div class="input-box"><input type="number" value="${saved.reps}" oninput="saveSet('${day}','${idx}',${i},'reps',this.value)"><span>REPS</span></div>
        </div>`;
    }
    card.innerHTML += `<div class="chart-box"><canvas id="chart-${day}-${idx}"></canvas></div>`;
    setTimeout(() => drawChart(day, idx), 50);
    return card;
}

function saveSet(day, exIdx, setIdx, type, val) {
    const week = document.getElementById('weekSelector').value;
    const key = `w${week}-${day}-${exIdx}-s${setIdx}`;
    let d = JSON.parse(localStorage.getItem(key)) || {kg:'', reps:''};
    d[type] = val; localStorage.setItem(key, JSON.stringify(d)); drawChart(day, exIdx);
}

function drawChart(day, idx) {
    const canvas = document.getElementById(`chart-${day}-${idx}`); if(!canvas) return;
    const ctx = canvas.getContext('2d'); const pts = [];
    for(let w=1; w<=16; w++) {
        const d = JSON.parse(localStorage.getItem(`w${w}-${day}-${idx}-s1`));
        pts.push(d && d.kg ? parseFloat(d.kg) : 0);
    }
    if(window['c'+day+idx]) window['c'+day+idx].destroy();
    window['c'+day+idx] = new Chart(ctx, {
        type: 'line', data: { labels: Array.from({length:16},(_,i)=>i+1), datasets: [{ data: pts, borderColor: workoutData[day].color, borderWidth: 2, tension: 0.4, pointRadius: 0, fill: false }] },
        options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
    });
}

// Funzioni Modale
function openAddModal(e) { e.stopPropagation(); editingContext = 'add'; document.getElementById('editModal').classList.add('active'); }
function openEditModal(e, idx) { e.stopPropagation(); editingContext = idx; document.getElementById('editModal').classList.add('active'); }
function closeModal() { document.getElementById('editModal').classList.remove('active'); }
function handleGlobalClick(e) { if(e.target.id === 'editModal') closeModal(); }

// Timer persistence
function checkPersistentTimer() {
    const data = JSON.parse(localStorage.getItem('persistent_timer'));
    if(data) {
        const remaining = Math.round((data.endTime - Date.now()) / 1000);
        if(remaining > 0) startTimer(data.idx, remaining);
    }
}

function startTimer(idx, sec) {
    const display = document.getElementById(`t-val-${idx}`);
    if(activeTimer) clearInterval(activeTimer);
    let current = sec;
    activeTimer = setInterval(() => {
        current--;
        if(display) display.innerText = current + "s";
        if(current <= 0) { clearInterval(activeTimer); activeTimer = null; }
    }, 1000);
}

window.onload = init;
</script>
</body>
</html>

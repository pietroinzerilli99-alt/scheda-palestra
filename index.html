<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayleigh Workout - Haki System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010204;
            --glass: rgba(10, 15, 20, 0.7);
            --primary: #00ffaa; /* Verde Rayleigh Cyber */
            --silver: #e2e8f0; /* Argento "Silvers" */
            --text-dim: #4a5568;
            --glow: rgba(0, 255, 170, 0.15);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 170, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(100, 100, 255, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--silver);
            margin: 0; padding-bottom: 60px;
            -webkit-font-smoothing: antialiased;
        }

        /* Header Legendario */
        header { 
            padding: 50px 25px 10px; 
            max-width: 650px; margin: 0 auto; 
            display: flex; justify-content: space-between; align-items: center;
        }
        h1 { 
            font-size: 1.1rem; font-weight: 700; letter-spacing: 4px; margin: 0; 
            text-transform: uppercase; color: var(--silver);
            border-left: 3px solid var(--primary); padding-left: 15px;
        }

        .week-selector {
            background: transparent; border: 1px solid var(--text-dim);
            color: var(--primary); padding: 6px 12px; border-radius: 4px;
            font-size: 0.7rem; font-weight: 700; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Navigazione Nautica */
        nav {
            display: flex; gap: 25px; padding: 25px; overflow-x: auto;
            max-width: 650px; margin: 0 auto; scrollbar-width: none;
            justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        nav button {
            background: transparent; border: none; color: var(--text-dim);
            font-size: 0.7rem; font-weight: 700; cursor: pointer; transition: 0.4s;
            text-transform: uppercase; letter-spacing: 2px;
        }
        nav button.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        .container { padding: 15px; max-width: 650px; margin: 0 auto; }
        .day-section { display: none; animation: observationHaki 0.6s ease; }
        .active-day { display: block; }
        @keyframes observationHaki { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }

        /* Card "Vetro del Re" */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 2px; padding: 25px; margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.03);
            position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.3;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .card-header h3 { margin: 0; font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;}
        
        .timer-btn {
            background: transparent; color: var(--primary); 
            border: 1px solid var(--primary);
            padding: 4px 10px; font-weight: 700; font-size: 0.55rem; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }
        .timer-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }

        /* Grid Dati */
        .serie-row {
            display: grid; grid-template-columns: 80px 1fr; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .serie-label { font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        .inputs { display: flex; gap: 25px; }
        .input-group { display: flex; align-items: center; gap: 8px; }
        .inputs input {
            width: 45px; background: transparent; border: none; color: var(--silver);
            font-weight: 500; font-size: 1.2rem; text-align: right; outline: none;
        }
        .input-unit { color: var(--primary); font-size: 0.55rem; font-weight: 700; opacity: 0.6; }

        /* Grafico Spirituale */
        .chart-container { height: 70px; margin-top: 25px; opacity: 0.5; filter: grayscale(1); transition: 0.5s;}
        .card:hover .chart-container { opacity: 1; filter: grayscale(0); }

        /* Timer "King's Haki" */
        #timer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1, 2, 4, 0.98); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        #timer-val { 
            font-size: 8rem; font-weight: 300; color: var(--primary); 
            text-shadow: 0 0 40px var(--glow); 
        }
        .haki-flash { animation: flash 0.3s ease; }
        @keyframes flash { from { background: white; } to { background: rgba(1, 2, 4, 0.98); } }
    </style>
</head>
<body>

<div id="timer-overlay" onclick="closeTimer()">
    <div style="font-size: 0.6rem; letter-spacing: 8px; color: var(--text-dim); margin-bottom: 30px;">CONCENTRATION REQUIRED</div>
    <div id="timer-val">00:00</div>
    <div style="color:var(--text-dim); font-size: 0.5rem; margin-top: 40px; letter-spacing: 3px;">TAP TO ABORT</div>
</div>

<header>
    <h1>Rayleigh <span style="font-weight:300; opacity:0.6;">System</span></h1>
    <select class="week-selector" id="weekSelect" onchange="loadWeekData()">
        </select>
</header>

<nav id="dayNav">
    <button onclick="switchDay('lun')" id="n-lun" class="active">Lun</button>
    <button onclick="switchDay('mar')" id="n-mar">Mar</button>
    <button onclick="switchDay('mer')" id="n-mer">Mer</button>
    <button onclick="switchDay('gio')" id="n-gio">Gio</button>
    <button onclick="switchDay('ven')" id="n-ven">Ven</button>
</nav>

<div class="container" id="mainContainer"></div>

<script>
const weekSelect = document.getElementById('weekSelect');
for (let i = 1; i <= 16; i++) {
    const opt = document.createElement('option');
    opt.value = i; opt.innerHTML = `SETTIMANA ${i < 10 ? '0'+i : i}`;
    weekSelect.appendChild(opt);
}

const workout = {
    lun: { ex: [{n:"Panca Inclinata Manubri", s:4, r:90}, {n:"Chest Press", s:3, r:60}, {n:"Alzate Laterali", s:4, r:60}, {n:"Pushdown", s:4, r:60}, {n:"Addome", s:3, r:60, spec:true}] },
    mar: { ex: [{n:"Trazioni Zavorrate", s:5, r:120}, {n:"Rematore", s:3, r:90}, {n:"Curl Bilanciere", s:4, r:60}, {n:"Facepull", s:3, r:60}, {n:"Core Stability", s:3, r:60, spec:true}] },
    mer: { ex: [{n:"Hack Squat", s:4, r:120}, {n:"Leg Press", s:3, r:90}, {n:"Leg Curl", s:4, r:60}, {n:"Calf Raise", s:4, r:60}] },
    gio: { ex: [{n:"Panca Piana", s:4, r:90}, {n:"Croci ai Cavi", s:3, r:60}, {n:"Shoulder Press", s:3, r:90}, {n:"French Press", s:3, r:60}] },
    ven: { ex: [{n:"Trazioni Volume", s:4, r:120}, {n:"Lat Machine Inversa", s:3, r:90}, {n:"Hammer Curl", s:3, r:60}, {n:"Curl ai Cavi", s:3, r:60}] }
};

let charts = {};

function init() {
    const main = document.getElementById('mainContainer');
    for(let day in workout) {
        let section = `<div id="${day}" class="day-section ${day==='lun'?'active-day' : ''}">`;
        workout[day].ex.forEach((e, idx) => {
            const id = `${day}_${idx}`;
            section += `
            <div class="card">
                <div class="card-header">
                    <h3>${e.n}</h3>
                    <button class="timer-btn" onclick="startTimer(${e.r})">${e.r}s rest</button>
                </div>
                <div class="series-grid">
                    ${Array.from({length:e.s}).map((_, s) => `
                        <div class="serie-row">
                            <span class="serie-label">Serie ${s+1}</span>
                            <div class="inputs">
                                <div class="input-group">
                                    <input type="number" placeholder="0" id="${id}_w${s}" onchange="saveData('${id}')">
                                    <span class="input-unit">KG</span>
                                </div>
                                <div class="input-group">
                                    <input type="number" placeholder="0" id="${id}_r${s}" onchange="saveData('${id}')">
                                    <span class="input-unit">RE</span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                ${!e.spec ? `<div class="chart-container"><canvas id="c_${id}"></canvas></div>` : ''}
            </div>`;
        });
        section += `</div>`;
        main.innerHTML += section;
    }
    loadWeekData();
}

function saveData(exId) {
    const week = document.getElementById('weekSelect').value;
    const day = exId.split('_')[0];
    const idx = exId.split('_')[1];
    const sets = workout[day].ex[idx].s;
    let dataEntry = { w: [], r: [] };
    for(let i=0; i<sets; i++) {
        dataEntry.w.push(parseFloat(document.getElementById(`${exId}_w${i}`).value) || 0);
        dataEntry.r.push(parseFloat(document.getElementById(`${exId}_r${i}`).value) || 0);
    }
    localStorage.setItem(`Rayleigh_Haki_${week}_${exId}`, JSON.stringify(dataEntry));
    updateSingleChart(exId);
}

function loadWeekData() {
    const week = document.getElementById('weekSelect').value;
    for(let day in workout) {
        workout[day].ex.forEach((e, idx) => {
            const id = `${day}_${idx}`;
            const saved = JSON.parse(localStorage.getItem(`Rayleigh_Haki_${week}_${id}`));
            for(let i=0; i<e.s; i++) {
                const wIn = document.getElementById(`${id}_w${i}`);
                const rIn = document.getElementById(`${id}_r${i}`);
                if(saved) {
                    wIn.value = saved.w[i] || "";
                    rIn.value = saved.r[i] || "";
                } else {
                    wIn.value = ""; rIn.value = "";
                }
            }
            if(!e.spec) updateSingleChart(id);
        });
    }
}

function updateSingleChart(exId) {
    const historyVol = [];
    for(let w=1; w<=16; w++) {
        const d = JSON.parse(localStorage.getItem(`Rayleigh_Haki_${w}_${exId}`));
        let vol = 0;
        if(d) d.w.forEach((weight, i) => vol += (weight * (d.r[i] || 0)));
        historyVol.push(vol);
    }
    const ctx = document.getElementById(`c_${exId}`);
    if(!ctx) return;
    if(charts[exId]) charts[exId].destroy();
    charts[exId] = new Chart(ctx.getContext('2d'), {
        type: 'line',
        data: {
            labels: Array.from({length:16}, (_, i) => i+1),
            datasets: [{
                data: historyVol,
                borderColor: '#00ffaa',
                backgroundColor: 'transparent',
                fill: false, tension: 0.4, borderWidth: 1, pointRadius: 0
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { display: false }, y: { display: false } }
        }
    });
}

let tInterval;
function startTimer(s) {
    const ov = document.getElementById('timer-overlay');
    const val = document.getElementById('timer-val');
    ov.style.display = 'flex';
    let time = s;
    tInterval = setInterval(() => {
        let m = Math.floor(time/60); let sec = time%60;
        val.innerText = `${m}:${sec<10?'0':''}${sec}`;
        if(time <= 0) { 
            clearInterval(tInterval); 
            val.innerText = "GO!";
            ov.classList.add('haki-flash');
            setTimeout(() => ov.classList.remove('haki-flash'), 300);
        }
        time--;
    }, 1000);
}

function closeTimer() { clearInterval(tInterval); document.getElementById('timer-overlay').style.display = 'none'; }

function switchDay(id) {
    document.querySelectorAll('.day-section').forEach(d => d.classList.remove('active-day'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active-day');
    document.getElementById('n-'+id).classList.add('active');
}

window.onload = init;
</script>
</body>
</html>

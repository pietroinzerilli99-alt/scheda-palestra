<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayleigh Workout - Void Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020408;
            --glass: rgba(15, 20, 30, 0.6);
            --primary: #00f2ff; /* Ciano Olografico */
            --accent: #7000ff; /* Viola Profondo */
            --text: #e2e8f0;
            --text-dim: #475569;
            --border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text);
            margin: 0; padding-bottom: 50px;
            -webkit-font-smoothing: antialiased;
        }

        /* Header Futuristico */
        header { 
            padding: 50px 25px 20px; 
            max-width: 650px; margin: 0 auto; 
            display: flex; justify-content: space-between; align-items: center;
        }
        h1 { 
            font-size: 1.3rem; font-weight: 700; letter-spacing: 2px; margin: 0; 
            text-transform: uppercase; color: var(--text);
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .week-selector {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--primary); padding: 8px 15px; border-radius: 30px;
            font-size: 0.65rem; font-weight: 700; letter-spacing: 1px;
            outline: none; cursor: pointer; backdrop-filter: blur(10px);
        }

        /* Navigazione Olografica */
        nav {
            display: flex; gap: 20px; padding: 20px; overflow-x: auto;
            max-width: 650px; margin: 0 auto; scrollbar-width: none;
            justify-content: center;
        }
        nav button {
            background: transparent; border: none; color: var(--text-dim);
            font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.4s;
            text-transform: uppercase; letter-spacing: 2px; position: relative;
        }
        nav button.active { color: var(--primary); }
        nav button.active::after {
            content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px;
            background: var(--primary); box-shadow: 0 0 10px var(--primary);
        }

        .container { padding: 15px; max-width: 650px; margin: 0 auto; }
        .day-section { display: none; animation: slideFade 0.5s ease-out; }
        .active-day { display: block; }
        @keyframes slideFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Card Effetto Vetro */
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px; padding: 25px; margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .card-header h3 { margin: 0; font-size: 0.9rem; font-weight: 700; color: #fff; letter-spacing: 0.5px;}
        
        .timer-btn {
            background: rgba(0, 242, 255, 0.05); color: var(--primary); 
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 5px 12px; border-radius: 8px; font-weight: 700; font-size: 0.6rem; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }
        .timer-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }

        /* Input Grid HUD */
        .serie-row {
            display: grid; grid-template-columns: 70px 1fr; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .serie-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        .inputs { display: flex; gap: 20px; }
        .input-group { display: flex; align-items: baseline; gap: 6px; }
        .inputs input {
            width: 45px; background: transparent; border: none; color: var(--primary);
            font-weight: 700; font-size: 1.1rem; text-align: right; outline: none;
        }
        .input-unit { color: var(--text-dim); font-size: 0.6rem; font-weight: 700; }

        /* Grafico Neon */
        .chart-container { height: 80px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px;}

        /* Timer HUD Overlay */
        #timer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 4, 8, 0.95); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        #timer-val { 
            font-size: 7rem; font-weight: 200; color: var(--primary); 
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.4); 
        }
    </style>
</head>
<body>

<div id="timer-overlay" onclick="closeTimer()">
    <div style="font-size: 0.7rem; letter-spacing: 5px; color: var(--text-dim); margin-bottom: 20px;">SYNCING RECOVERY</div>
    <div id="timer-val">00:00</div>
    <div style="color:var(--primary); font-size: 0.6rem; margin-top: 30px; letter-spacing: 2px; cursor:pointer;">ABORT MISSION</div>
</div>

<header>
    <h1>Rayleigh <span style="font-weight:200">Workout</span></h1>
    <select class="week-selector" id="weekSelect" onchange="loadWeekData()">
        </select>
</header>

<nav id="dayNav">
    <button onclick="switchDay('lun')" id="n-lun" class="active">Lun</button>
    <button onclick="switchDay('mar')" id="n-mar">Mar</button>
    <button onclick="switchDay('mer')" id="n-mer">Mer</button>
    <button onclick="switchDay('gio')" id="n-gio">Gio</button>
    <button onclick="switchDay('ven')" id="n-ven">Ven</button>
</nav>

<div class="container" id="mainContainer"></div>

<script>
const weekSelect = document.getElementById('weekSelect');
for (let i = 1; i <= 16; i++) {
    const opt = document.createElement('option');
    opt.value = i; opt.innerHTML = `PHASE ${i < 10 ? '0'+i : i}`;
    weekSelect.appendChild(opt);
}

const workout = {
    lun: { ex: [{n:"Panca Inclinata Manubri", s:4, r:90}, {n:"Chest Press", s:3, r:60}, {n:"Alzate Laterali", s:4, r:60}, {n:"Pushdown", s:4, r:60}, {n:"Addome", s:3, r:60, spec:true}] },
    mar: { ex: [{n:"Trazioni Zavorrate", s:5, r:120}, {n:"Rematore", s:3, r:90}, {n:"Curl EZ", s:4, r:60}, {n:"Facepull", s:3, r:60}, {n:"Core", s:3, r:60, spec:true}] },
    mer: { ex: [{n:"Hack Squat", s:4, r:120}, {n:"Leg Press", s:3, r:90}, {n:"Leg Curl", s:4, r:60}, {n:"Calf", s:4, r:60}] },
    gio: { ex: [{n:"Panca Piana", s:4, r:90}, {n:"Croci", s:3, r:60}, {n:"Shoulder Press", s:3, r:90}, {n:"French Press", s:3, r:60}] },
    ven: { ex: [{n:"Trazioni Vol.", s:4, r:120}, {n:"Lat Machine", s:3, r:90}, {n:"Hammer Curl", s:3, r:60}, {n:"Curl Cavi", s:3, r:60}] }
};

let charts = {};

function init() {
    const main = document.getElementById('mainContainer');
    for(let day in workout) {
        let section = `<div id="${day}" class="day-section ${day==='lun'?'active-day' : ''}">`;
        workout[day].ex.forEach((e, idx) => {
            const id = `${day}_${idx}`;
            section += `
            <div class="card">
                <div class="card-header">
                    <h3>${e.n}</h3>
                    <button class="timer-btn" onclick="startTimer(${e.r})">${e.r}s rest</button>
                </div>
                <div class="series-grid">
                    ${Array.from({length:e.s}).map((_, s) => `
                        <div class="serie-row">
                            <span class="serie-label">Set ${s+1}</span>
                            <div class="inputs">
                                <div class="input-group">
                                    <input type="number" placeholder="0" id="${id}_w${s}" onchange="saveData('${id}')">
                                    <span class="input-unit">kg</span>
                                </div>
                                <div class="input-group">
                                    <input type="number" placeholder="0" id="${id}_r${s}" onchange="saveData('${id}')">
                                    <span class="input-unit">re</span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                ${!e.spec ? `<div class="chart-container"><canvas id="c_${id}"></canvas></div>` : ''}
            </div>`;
        });
        section += `</div>`;
        main.innerHTML += section;
    }
    loadWeekData();
}

function saveData(exId) {
    const week = document.getElementById('weekSelect').value;
    const day = exId.split('_')[0];
    const idx = exId.split('_')[1];
    const sets = workout[day].ex[idx].s;
    let dataEntry = { w: [], r: [] };
    for(let i=0; i<sets; i++) {
        dataEntry.w.push(parseFloat(document.getElementById(`${exId}_w${i}`).value) || 0);
        dataEntry.r.push(parseFloat(document.getElementById(`${exId}_r${i}`).value) || 0);
    }
    localStorage.setItem(`Rayleigh_Void_${week}_${exId}`, JSON.stringify(dataEntry));
    updateSingleChart(exId);
}

function loadWeekData() {
    const week = document.getElementById('weekSelect').value;
    for(let day in workout) {
        workout[day].ex.forEach((e, idx) => {
            const id = `${day}_${idx}`;
            const saved = JSON.parse(localStorage.getItem(`Rayleigh_Void_${week}_${id}`));
            for(let i=0; i<e.s; i++) {
                const wIn = document.getElementById(`${id}_w${i}`);
                const rIn = document.getElementById(`${id}_r${i}`);
                if(saved) {
                    wIn.value = saved.w[i] || "";
                    rIn.value = saved.r[i] || "";
                } else {
                    wIn.value = ""; rIn.value = "";
                }
            }
            if(!e.spec) updateSingleChart(id);
        });
    }
}

function updateSingleChart(exId) {
    const historyVol = [];
    for(let w=1; w<=16; w++) {
        const d = JSON.parse(localStorage.getItem(`Rayleigh_Void_${w}_${exId}`));
        let vol = 0;
        if(d) d.w.forEach((weight, i) => vol += (weight * (d.r[i] || 0)));
        historyVol.push(vol);
    }
    const ctx = document.getElementById(`c_${exId}`);
    if(!ctx) return;
    if(charts[exId]) charts[exId].destroy();
    charts[exId] = new Chart(ctx.getContext('2d'), {
        type: 'line',
        data: {
            labels: Array.from({length:16}, (_, i) => i+1),
            datasets: [{
                data: historyVol,
                borderColor: '#00f2ff',
                backgroundColor: 'transparent',
                fill: false, tension: 0.4, borderWidth: 2, pointRadius: 0
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { 
                x: { display: false }, 
                y: { display: false } 
            }
        }
    });
}

let tInterval;
function startTimer(s) {
    const ov = document.getElementById('timer-overlay');
    const val = document.getElementById('timer-val');
    ov.style.display = 'flex';
    let time = s;
    tInterval = setInterval(() => {
        let m = Math.floor(time/60); let sec = time%60;
        val.innerText = `${m}:${sec<10?'0':''}${sec}`;
        if(time <= 0) { clearInterval(tInterval); val.innerText = "ACTION"; }
        time--;
    }, 1000);
}

function closeTimer() { clearInterval(tInterval); document.getElementById('timer-overlay').style.display = 'none'; }

function switchDay(id) {
    document.querySelectorAll('.day-section').forEach(d => d.classList.remove('active-day'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active-day');
    document.getElementById('n-'+id).classList.add('active');
}

window.onload = init;
</script>
</body>
</html>

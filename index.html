<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Track Pro - 2026 Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0f1a;
            --card: #161e2d;
            --primary: #38bdf8;
            --accent: #f472b6;
            --success: #22c55e;
            --text: #f8fafc;
            --border: #2d3748;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 50px;
        }

        /* Top Bar & Timer */
        .header-sticky {
            position: sticky;
            top: 0;
            background: rgba(10, 15, 26, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 15px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        #timer-display {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            display: none;
            font-variant-numeric: tabular-nums;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            font-size: 0.8rem;
            color: var(--primary);
            margin-top: 5px;
        }

        /* Navigation */
        nav {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 15px;
            scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }

        nav button {
            background: var(--card);
            border: 1px solid var(--border);
            color: #94a3b8;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        nav button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        /* Exercise Cards */
        .container { padding: 0 15px; }
        .day-section { display: none; animation: slideUp 0.4s ease; }
        .active-day { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-header h3 { margin: 0; font-size: 1.1rem; }
        
        .rec-btn {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* Grid per le Serie */
        .series-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .serie-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px;
            text-align: center;
        }

        .serie-box label { display: block; font-size: 0.7rem; color: #64748b; margin-bottom: 4px; }
        
        .serie-box input {
            width: 80%;
            background: transparent;
            border: none;
            color: white;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
            outline: none;
        }

        /* Mini Chart */
        .chart-wrap {
            height: 120px;
            margin-top: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="header-sticky">
    <div id="main-title">GYM LOG <b>2026</b></div>
    <div id="timer-display">00:00</div>
    <div class="stats-bar">
        <span>Volume Sessione: <b id="total-vol">0</b> kg</span>
    </div>
</div>

<nav>
    <button onclick="switchDay('lun')" id="nav-lun" class="active">LUN - PUSH</button>
    <button onclick="switchDay('mar')" id="nav-mar">MAR - PULL</button>
    <button onclick="switchDay('mer')" id="nav-mer">MER - LEGS</button>
    <button onclick="switchDay('gio')" id="nav-gio">GIO - PUSH</button>
    <button onclick="switchDay('ven')" id="nav-ven">VEN - PULL</button>
</nav>

<div class="container" id="days-container">
    </div>

<script>
// Database Esercizi
const workoutData = {
    lun: { title: "Push Day 1", exercises: [
        { name: "Panca Inclinata Manubri", sets: 4, rec: 90 },
        { name: "Croci ai Cavi", sets: 3, rec: 60 },
        { name: "Alzate Laterali", sets: 4, rec: 60 },
        { name: "Dips", sets: 3, rec: 90 },
        { name: "Pushdown Tricipiti", sets: 3, rec: 60 }
    ]},
    mar: { title: "Pull Day 1", exercises: [
        { name: "Trazioni Zavorrate", sets: 5, rec: 120 },
        { name: "Rematore Manubrio", sets: 4, rec: 90 },
        { name: "Lat Machine", sets: 3, rec: 90 },
        { name: "Curl Inclinata", sets: 3, rec: 60 },
        { name: "Curl Martello", sets: 3, rec: 60 }
    ]},
    mer: { title: "Legs Day", exercises: [
        { name: "Hack Squat", sets: 4, rec: 120 },
        { name: "Leg Press", sets: 4, rec: 90 },
        { name: "Romanian Deadlift", sets: 3, rec: 90 },
        { name: "Leg Curl", sets: 3, rec: 60 },
        { name: "Calf Raise", sets: 4, rec: 60 }
    ]},
    gio: { title: "Push Day 2", exercises: [
        { name: "Panca Piana", sets: 4, rec: 90 },
        { name: "Military Press", sets: 3, rec: 90 },
        { name: "Croci Cavi", sets: 3, rec: 60 },
        { name: "Alzate Laterali", sets: 4, rec: 60 },
        { name: "French Press", sets: 3, rec: 60 }
    ]},
    ven: { title: "Pull Day 2", exercises: [
        { name: "Trazioni", sets: 4, rec: 120 },
        { name: "Pulley Basso", sets: 4, rec: 90 },
        { name: "Facepull", sets: 3, rec: 60 },
        { name: "Curl Bilanciere", sets: 3, rec: 60 },
        { name: "Hammer Curl", sets: 3, rec: 60 }
    ]}
};

// Generazione Dinamica HTML
const container = document.getElementById('days-container');
for (const [dayKey, dayObj] of Object.entries(workoutData)) {
    let dayHtml = `<div id="${dayKey}" class="day-section ${dayKey === 'lun' ? 'active-day' : ''}">`;
    dayObj.exercises.forEach((ex, exIdx) => {
        const exId = `${dayKey}_ex${exIdx}`;
        dayHtml += `
            <div class="card">
                <div class="card-header">
                    <div>
                        <h3>${ex.name}</h3>
                        <small style="color:#64748b">${ex.sets} serie</small>
                    </div>
                    <button class="rec-btn" onclick="startTimer(${ex.rec})">⏱ ${ex.rec}s</button>
                </div>
                <div class="series-row">
                    ${Array.from({length: ex.sets}).map((_, s) => `
                        <div class="serie-box">
                            <label>S${s+1}</label>
                            <input type="number" placeholder="kg" 
                                id="${exId}_s${s}" 
                                onchange="saveWeight('${exId}', ${s}, this.value)">
                        </div>
                    `).join('')}
                </div>
                <div class="chart-wrap">
                    <canvas id="chart_${exId}"></canvas>
                </div>
            </div>`;
    });
    dayHtml += `</div>`;
    container.innerHTML += dayHtml;
}

// Logica Timer
let timerInterval;
function startTimer(sec) {
    clearInterval(timerInterval);
    const display = document.getElementById('timer-display');
    const title = document.getElementById('main-title');
    display.style.display = 'block';
    title.style.display = 'none';
    
    let timeLeft = sec;
    timerInterval = setInterval(() => {
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        display.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            display.innerText = "VIA!";
            setTimeout(() => {
                display.style.display = 'none';
                title.style.display = 'block';
            }, 2000);
        }
        timeLeft--;
    }, 1000);
}

// Logica Salvataggio e Grafici
const charts = {};
function initCharts() {
    for (const [dayKey, dayObj] of Object.entries(workoutData)) {
        dayObj.exercises.forEach((ex, exIdx) => {
            const exId = `${dayKey}_ex${exIdx}`;
            const canvas = document.getElementById(`chart_${exId}`);
            // Carichiamo i dati storici (se non ci sono, usiamo dati finti per mostrare il grafico inizialmente)
            const history = JSON.parse(localStorage.getItem(`hist_${exId}`)) || [0, 0, 0, 0, 0];
            
            charts[exId] = new Chart(canvas, {
                type: 'line',
                data: {
                    labels: ['-4', '-3', '-2', '-1', 'Oggi'],
                    datasets: [{
                        data: history,
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 2,
                        pointRadius: 3
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { ticks: { color: '#475569', font: { size: 9 } } } }
                }
            });

            // Carichiamo anche i valori attuali negli input
            for(let s=0; s<ex.sets; s++) {
                const val = localStorage.getItem(`${exId}_s${s}`);
                if(val) document.getElementById(`${exId}_s${s}`).value = val;
            }
        });
    }
    calcVolume();
}

function saveWeight(exId, setIdx, value) {
    localStorage.setItem(`${exId}_s${setIdx}`, value);
    
    // Aggiorna il valore "Oggi" nel grafico
    const chart = charts[exId];
    chart.data.datasets[0].data[4] = parseFloat(value) || 0;
    chart.update();
    
    // Salva lo storico (per semplicità usiamo l'ultimo valore inserito come picco della giornata)
    const history = chart.data.datasets[0].data;
    localStorage.setItem(`hist_${exId}`, JSON.stringify(history));
    
    calcVolume();
}

function calcVolume() {
    let total = 0;
    document.querySelectorAll('input').forEach(input => {
        total += parseFloat(input.value) || 0;
    });
    document.getElementById('total-vol').innerText = total;
}

function switchDay(dayId) {
    document.querySelectorAll('.day-section').forEach(d => d.classList.remove('active-day'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(dayId).classList.add('active-day');
    document.getElementById('nav-' + dayId).classList.add('active');
}

window.onload = initCharts;
</script>
</body>
</html>
